// ==================== 跨屏幕自适应缩放 ====================
(function() {
    const wrapper = document.getElementById('scale-wrapper');
    let resizeTimer = null;

    // 设计基准尺寸：在此分辨率下以 1:1 原始尺寸显示
    const DESIGN_W = 1400;
    const DESIGN_H = 900;
    // body padding: top=10 right=20 bottom=20 left=20
    const BODY_PAD_W = 40;  // 左右 padding 之和
    const BODY_PAD_H = 30;  // 上下 padding 之和

    function applyScale() {
        const isPortraitPhone = window.innerWidth <= 800 && window.innerHeight > window.innerWidth;

        // ===== 手机竖屏：不用 transform scale，由 CSS 媒体查询处理布局 =====
        if (isPortraitPhone) {
            // 清空所有桌面端设置的 inline style，让 CSS 媒体查询接管
            wrapper.style.transform = '';
            wrapper.style.transformOrigin = '';
            wrapper.style.width = '';
            wrapper.style.height = '';
            wrapper.style.marginTop = '';

            const container = document.querySelector('.container');
            container.style.minHeight = '';
            container.style.display = '';
            container.style.flexDirection = '';
            container.style.justifyContent = '';

            const keyboard = document.getElementById('wubi-keyboard');
            if (keyboard) keyboard.style.marginTop = '';

            // 标题：CSS 媒体查询已改为 static，清空 inline style
            const tc = document.querySelector('.title-container');
            if (tc) { tc.style.transform = ''; tc.style.left = ''; tc.style.top = ''; }

            // toggle：清空 inline scale，由 CSS 媒体查询处理
            const toggle = document.getElementById('lib-toggle');
            if (toggle) { toggle.style.transform = ''; toggle.style.right = ''; toggle.style.top = ''; }

            // input：CSS 已设 font-size:16px，清空 inline style
            const ci = document.getElementById('char-input');
            if (ci) { ci.style.fontSize = ''; }

            // 面板：清空 inline style
            const leftPanel = document.getElementById('lib-panel-left');
            const rightPanel = document.getElementById('lib-panel-right');
            if (leftPanel) { leftPanel.style.top = ''; leftPanel.style.maxHeight = ''; leftPanel.style.height = ''; }
            if (rightPanel) { rightPanel.style.top = ''; rightPanel.style.maxHeight = ''; rightPanel.style.height = ''; }

            return; // 不执行任何 scale
        }

        // ===== 桌面端：用 transform scale 缩放 =====
        const availW = window.innerWidth - BODY_PAD_W;
        const availH = window.innerHeight - BODY_PAD_H;
        const ratio = Math.min(availW / DESIGN_W, availH / DESIGN_H);
        const contentOffsetY = 0;

        const container = document.querySelector('.container');
        const keyboard = document.getElementById('wubi-keyboard');
        wrapper.style.transformOrigin = 'top left';
        wrapper.style.transform = 'scale(' + ratio + ')';
        wrapper.style.marginTop = contentOffsetY + 'px';
        wrapper.style.width = (availW / ratio) + 'px';
        wrapper.style.height = (availH / ratio) + 'px';
        container.style.minHeight = '';
        container.style.display = '';
        container.style.flexDirection = '';
        container.style.justifyContent = '';
        if (keyboard) keyboard.style.marginTop = '';

        // 面板：清空手机端 inline style
        const leftPanel = document.getElementById('lib-panel-left');
        const rightPanel = document.getElementById('lib-panel-right');
        if (leftPanel) { leftPanel.style.top = ''; leftPanel.style.maxHeight = ''; leftPanel.style.height = ''; }
        if (rightPanel) { rightPanel.style.top = ''; rightPanel.style.maxHeight = ''; rightPanel.style.height = ''; }

        // 标题缩放
        const tc = document.querySelector('.title-container');
        if (tc) {
            tc.style.transform = 'scale(' + ratio + ')';
            tc.style.transformOrigin = 'top left';
            tc.style.left = (20 * ratio) + 'px';
            tc.style.top = (20 * ratio) + 'px';
        }

        // lib-toggle 缩放
        const toggle = document.getElementById('lib-toggle');
        if (toggle) {
            toggle.style.transform = 'scale(' + ratio + ')';
            toggle.style.transformOrigin = 'top right';
            toggle.style.right = (12 * ratio) + 'px';
            toggle.style.top = (12 * ratio) + 'px';
        }

        // input：清空手机端 inline style
        const ci = document.getElementById('char-input');
        if (ci) ci.style.fontSize = '';

        wrapper.offsetHeight; // force reflow
    }

    // 手机竖屏默认收起字库侧边栏（仅初始化一次，用户可手动展开）
    const _isPortraitInit = window.innerWidth <= 800 && window.innerHeight > window.innerWidth;
    if (_isPortraitInit && typeof libExpanded !== 'undefined' && libExpanded) {
        libExpanded = false;
        const _lp = document.getElementById('lib-panel-left');
        const _rp = document.getElementById('lib-panel-right');
        const _btn = document.getElementById('lib-toggle');
        if (_lp) _lp.classList.add('collapsed');
        if (_rp) _rp.classList.add('collapsed');
        if (_btn) { _btn.textContent = '📚'; _btn.title = '展开字库'; }
    }

    // 页面加载时执行
    applyScale();

    // 手机端/桌面端：多字拆分卡片定位
    function adjustMobileLayout() {
        const multiCards = document.getElementById('multi-char-cards');
        const keyboard = document.getElementById('wubi-keyboard');
        if (!multiCards || !keyboard) return;
        // 始终保持多汉字拆分在键盘上方
        if (multiCards.nextElementSibling !== keyboard) {
            keyboard.parentNode.insertBefore(multiCards, keyboard);
        }
    }
    adjustMobileLayout();
    window.addEventListener('load', function() { adjustMobileLayout(); });

    // 页面完全加载后兜底重算一次
    window.addEventListener('load', function() {
        setTimeout(applyScale, 100);
    });

    // 窗口大小变化时自适应缩放
    let lastIsPortrait = (window.innerWidth <= 800 && window.innerHeight > window.innerWidth);
    window.addEventListener('resize', function() {
        const isPortrait = window.innerWidth <= 800 && window.innerHeight > window.innerWidth;
        if (isPortrait !== lastIsPortrait) {
            lastIsPortrait = isPortrait;
            adjustMobileLayout();
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(applyScale, 100);
        } else if (!isPortrait) {
            // 桌面端：窗口尺寸变化时重算缩放
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(applyScale, 100);
        }
        // 手机端竖屏内（键盘弹收）：不触发
    });
})();

// ==================== 改进的输入处理 (declared above) ====================


// ==================== 多汉字拆分卡片（V20 新增） ====================
// 所有函数/变量均加 multi 前缀，避免与现有逻辑冲突。
// 卡片使用独立的 SVG 元素，不复用 #char-svg。

// 计算字根笔画数（支持复合字根递归展开）
function multiRootStrokeCount(root) {
    if (RADICAL_STROKES[root] !== undefined) return RADICAL_STROKES[root];
    const w = WUBI[root];
    if (w && w.r && w.r.length >= 2 && w.r[0] !== root) {
        const expanded = recursivelyExpandRoots([...w.r], root);
        return expanded.reduce((s, r) => s + (RADICAL_STROKES[r] || 1), 0);
    }
    return 1;
}

// 计算编码与字根的颜色（简化版：字根>4时前3+末，补码用青色）
// 返回 { rootColors: 按字根索引, codeColors: 按编码索引 }
function multiComputeColors(wubiData) {
    const roots = wubiData.r || [];
    const code = wubiData.c || '';
    const sup = wubiData.sup || [];
    const codeLen = code.length;
    const rootColors = [];
    const codeColors = [];

    // 字根索引 -> 编码索引（与主显示规则一致：>4字根取前3+末）
    const rootToCode = [];
    if (roots.length > 4) {
        for (let i = 0; i < 3; i++) rootToCode.push(i);
        for (let i = 3; i < roots.length - 1; i++) rootToCode.push(-1);
        rootToCode.push(codeLen - 1);
    } else {
        for (let i = 0; i < roots.length; i++) rootToCode.push(i < codeLen ? i : -1);
        // 字根数 < 编码数：末字根对应末位编码（识别码），前面的字根按序对应
        if (roots.length < codeLen && roots.length > 0) {
            rootToCode[roots.length - 1] = codeLen - 1;
        }
    }

    // 非补码编码位置的颜色索引（从0递增）
    function nonSupColorIdx(ci) {
        let n = 0;
        for (let k = 0; k < ci; k++) if (!sup.includes(k)) n++;
        return n;
    }

    for (let ri = 0; ri < roots.length; ri++) {
        const ci = rootToCode[ri];
        if (ci === -1) {
            rootColors.push('#888'); // 中间跳过的字根（>4字根时）
        } else if (sup.includes(ci)) {
            rootColors.push('#00BCD4');
        } else {
            rootColors.push(ROOT_COLORS[nonSupColorIdx(ci) % ROOT_COLORS.length]);
        }
    }
    for (let ci = 0; ci < codeLen; ci++) {
        if (sup.includes(ci)) {
            codeColors.push('#00BCD4');
        } else {
            codeColors.push(ROOT_COLORS[nonSupColorIdx(ci) % ROOT_COLORS.length]);
        }
    }
    return { rootColors, codeColors };
}

// 简化版 strokeRootMap（回退用）：按字根顺序和笔画数依次分配笔画颜色
function multiBuildStrokeColors(strokeList, wubiData) {
    if (!wubiData || !wubiData.r || wubiData.r.length === 0) {
        return strokeList.map(() => '#555');
    }
    const { rootColors } = multiComputeColors(wubiData);
    const roots = wubiData.r;
    const colors = [];
    let strokeIdx = 0;
    for (let ri = 0; ri < roots.length; ri++) {
        const n = multiRootStrokeCount(roots[ri]);
        const color = rootColors[ri] || '#555';
        for (let k = 0; k < n && strokeIdx < strokeList.length; k++) {
            colors.push(color);
            strokeIdx++;
        }
    }
    while (colors.length < strokeList.length) colors.push('#555');
    return colors;
}

// 获取笔画数据（含特殊字符替换，委托给 getStrokeData）
async function fetchMultiCardStrokes(ch) {
    const data = await getStrokeData(ch);
    return data.strokes;
}

// 计算卡片字根列表和对应颜色（在全局变量仍为卡片字数据时调用）
// 返回 [{ root, color, keyLetter }] 数组
function computeMultiCardRootsInfo(ch) {
    const wubiData = WUBI[ch];
    if (!wubiData || !roots || roots.length === 0) return [];

    const supIndices = wubiData.sup || [];
    const codeLen = rootCode ? rootCode.length : 0;
    const colorIdxMap = rootCode ? rootCode.split('').map((_, i) => i) : [];

    // 字根→编码索引映射（与 renderInfo 逻辑完全一致）
    const rootToCodeIndex = [];
    if (roots.length > 4) {
        // 检查重复字根索引
        const rootMapCounts = {};
        for (const ri of strokeRootMap) {
            rootMapCounts[ri] = (rootMapCounts[ri] || 0) + 1;
        }
        const hasRepeatedRoots = Object.values(rootMapCounts).some(c => c > 1);
        if (hasRepeatedRoots && roots.length <= codeLen) {
            const uniqueRootIndices = Array.from(new Set(strokeRootMap.filter(r => r >= 0))).sort((a, b) => a - b);
            const rootIndexToCodeIndex = {};
            let codePos = 0;
            for (const uri of uniqueRootIndices) {
                rootIndexToCodeIndex[uri] = codePos < codeLen ? codePos : -1;
                codePos++;
            }
            for (let i = 0; i < roots.length; i++) {
                rootToCodeIndex.push(rootIndexToCodeIndex[i] !== undefined ? rootIndexToCodeIndex[i] : -1);
            }
        } else {
            for (let i = 0; i < 3; i++) rootToCodeIndex.push(colorIdxMap[i]);
            for (let i = 3; i < roots.length - 1; i++) rootToCodeIndex.push(-1);
            rootToCodeIndex.push(colorIdxMap[colorIdxMap.length - 1]);
        }
    } else if (roots.length < codeLen) {
        // 字根数 < 编码数：按非补码编码位置映射，末字根对应末位编码
        const rootCodeIndices = [];
        for (let i = 0; i < codeLen; i++) {
            if (!supIndices.includes(i)) rootCodeIndices.push(i);
        }
        for (let i = 0; i < roots.length - 1; i++) rootToCodeIndex.push(colorIdxMap[rootCodeIndices[i]]);
        rootToCodeIndex.push(colorIdxMap[rootCodeIndices[rootCodeIndices.length - 1]]);
    } else {
        for (let i = 0; i < roots.length; i++) rootToCodeIndex.push(colorIdxMap[i]);
    }

    // swapLast 字根顺序调整
    const rootCustom = CUSTOM_STROKE_ORDER[ch];
    let displayRoots = [...roots];
    let displayCodeIdx = [...rootToCodeIndex];
    if (rootCustom && rootCustom.swapLast && wubiData && rootCustom.condition(wubiData, ch) && displayRoots.length > 2) {
        const n = displayRoots.length;
        [displayRoots[n-2], displayRoots[n-1]] = [displayRoots[n-1], displayRoots[n-2]];
        [displayCodeIdx[n-2], displayCodeIdx[n-1]] = [displayCodeIdx[n-1], displayCodeIdx[n-2]];
    }

    // 二次展开（与主显示一致）
    const _expDisp = [];
    const _expCodeIdx = [];
    for (let _di = 0; _di < displayRoots.length; _di++) {
        const _dr = displayRoots[_di];
        const _ci = displayCodeIdx[_di];
        if (WUBI[_dr] && WUBI[_dr].r && WUBI[_dr].r.length > 1 && WUBI[_dr].r[0] !== _dr && _dr !== ch) {
            if (NON_CONTINUOUS_CHARS.has(_dr)) {
                // NC字根：使用NC字符自身的rootToCodeIndex
                const _ncCodeIndices = computeNcRootToCodeIndex(_dr);
                for (let j = 0; j < WUBI[_dr].r.length; j++) {
                    _expDisp.push(WUBI[_dr].r[j]);
                    _expCodeIdx.push(_ncCodeIndices[j] !== undefined ? _ncCodeIndices[j] : -1);
                }
            } else {
                for (const _sub of WUBI[_dr].r) {
                    _expDisp.push(_sub);
                    _expCodeIdx.push(_ci);
                }
            }
        } else {
            _expDisp.push(_dr);
            _expCodeIdx.push(_ci);
        }
    }

    // 构建结果：跳过不参与编码的字根
    const result = [];
    for (let i = 0; i < _expDisp.length; i++) {
        const r = _expDisp[i];
        if (r === '') continue;
        const codeIdx = _expCodeIdx[i];
        if (codeIdx === -1 || codeIdx >= codeLen) continue;
        const color = rootColorMap[codeIdx] || '#555';
        const keyLetter = rootCode[codeIdx] || '';
        result.push({ root: r, color, keyLetter });
    }
    return result;
}

// 计算补码小框信息（在全局变量仍为卡片字数据时调用）
// 返回 { hasSup, supStrokeIdx } 或 null
function computeMultiCardSupInfo(ch, strokeList) {
    const wubiData = WUBI[ch];
    if (!wubiData) return null;
    const supIndices = wubiData.sup || [];
    const hasSup = supIndices.length > 0;
    if (!hasSup) return { hasSup: false, supStrokeIdx: -1 };

    // 与 renderSVG 中的补码定位逻辑保持一致
    const endStrokeIdx = wubiData.endStroke;
    let actualEndStroke = strokes.length - 1;

    if (endStrokeIdx !== undefined) {
        actualEndStroke = endStrokeIdx;
    } else if (wubiData.r && Array.isArray(wubiData.r)) {
        const charRoots = wubiData.r;
        // 囗结构
        if (charRoots.includes('囗')) {
            const weiIdx = charRoots.indexOf('囗');
            for (let i = strokes.length - 1; i >= 0; i--) {
                if (strokeRootMap[i] !== undefined && strokeRootMap[i] !== weiIdx && strokeRootMap[i] >= 0) {
                    actualEndStroke = i;
                    break;
                }
            }
        }
        // 匚结构
        if ((roots || []).includes('匚')) {
            const fuIdx = roots.indexOf('匚');
            for (let i = strokes.length - 1; i >= 0; i--) {
                if (strokeRootMap[i] !== undefined && strokeRootMap[i] !== fuIdx && strokeRootMap[i] >= 0) {
                    actualEndStroke = i;
                    break;
                }
            }
        }
    }

    // 辶/廴 半包围结构
    const walkRoots = (roots || []);
    const walkIdx = walkRoots.indexOf('辶') !== -1 ? walkRoots.indexOf('辶') :
                    (walkRoots.indexOf('廴') !== -1 ? walkRoots.indexOf('廴') : -1);
    if (walkIdx !== -1 && strokeRootMap && strokeRootMap.length > 0) {
        for (let i = strokes.length - 1; i >= 0; i--) {
            if (strokeRootMap[i] !== undefined && strokeRootMap[i] !== walkIdx && strokeRootMap[i] >= 0) {
                actualEndStroke = i;
                break;
            }
        }
    }

    // swap 后补码定位修正
    if (strokeRootMap && strokeRootMap.length > 0 && (roots || []).length > 0) {
        const lastRootIdx = roots.length - 1;
        const lastRootChar = roots[lastRootIdx];
        if (lastRootChar !== '辶' && lastRootChar !== '廴') {
            let lastRootStrokes = [];
            for (let i = 0; i < strokes.length; i++) {
                if (strokeRootMap[i] === lastRootIdx) lastRootStrokes.push(i);
            }
            const originalRoots = wubiData.r || [];
            const lastOriginalRoot = originalRoots.length > 0 ? originalRoots[originalRoots.length - 1] : lastRootChar;
            const checkWubi = WUBI[lastOriginalRoot];
            const hasGeHouPattern = checkWubi && checkWubi.r && checkWubi.r.length >= 3
                && (checkWubi.r.includes('㇂') || checkWubi.r.includes('乚'))
                && checkWubi.r[checkWubi.r.length - 2] === '丶'
                && checkWubi.r[checkWubi.r.length - 1] === '丿'
                && ch !== '线';
            if (hasGeHouPattern) {
                if (lastRootStrokes.length >= 2) {
                    actualEndStroke = lastRootStrokes[lastRootStrokes.length - 2];
                }
            } else if (lastRootStrokes.length >= 2) {
                actualEndStroke = lastRootStrokes[lastRootStrokes.length - 1];
            } else if (lastRootStrokes.length === 1) {
                actualEndStroke = lastRootStrokes[0];
            }
        }
    }

    return { hasSup: true, supStrokeIdx: actualEndStroke };
}

// 使用与主显示完全相同的拆分逻辑计算笔画颜色
// 通过保存/恢复全局变量来复用 initStrokeRootMap + renderInfo 管线
function computeMultiCardColors(ch, strokeList) {
    const wubi = WUBI[ch];
    if (!wubi || !wubi.r || strokeList.length === 0) return null;

    // 保存全局状态
    const _saved = {
        currentChar, strokes, roots, rootCode,
        strokeRootMap, strokeRootMapForDisplay,
        highlightStroke, rootColorMap, strokeColorMap, radStrokes
    };

    try {
        currentChar = ch;
        strokes = [...strokeList];
        radStrokes = [];
        highlightStroke = -1;

        // 自定义笔画顺序检测（与 loadAndRender 一致）
        let customOrder = null;
        if (CUSTOM_STROKE_ORDER[ch] && CUSTOM_STROKE_ORDER[ch].condition(wubi)) {
            customOrder = CUSTOM_STROKE_ORDER[ch];
        }
        if (!customOrder && wubi.r) {
            for (const root of wubi.r) {
                const rootWubi = WUBI[root];
                if (rootWubi && CUSTOM_STROKE_ORDER[root] &&
                    CUSTOM_STROKE_ORDER[root].condition(rootWubi) &&
                    CUSTOM_STROKE_ORDER[root].swapScope !== 'roots') {
                    customOrder = CUSTOM_STROKE_ORDER[root];
                    break;
                }
            }
            if (!customOrder) {
                let expandedRoots = [...wubi.r];
                const KEY_NAMES_SET = new Set(Object.values(KEY_NAMES));
                let changed = true, iterations = 0;
                while (changed && iterations < 5) {
                    changed = false; iterations++;
                    const next = [];
                    for (const root of expandedRoots) {
                        const wubiEntry = WUBI[root];
                        if (wubiEntry && wubiEntry.r && wubiEntry.r.length >= 2
                            && !KEY_NAMES_SET.has(root) && !RADICAL_CHARS.has(root)
                            && root !== ch) {
                            next.push(...wubiEntry.r);
                            changed = true;
                        } else {
                            next.push(root);
                        }
                    }
                    expandedRoots = next;
                }
                for (const key in CUSTOM_STROKE_ORDER) {
                    const entry = CUSTOM_STROKE_ORDER[key];
                    if (entry.swapScope === 'roots' && entry.condition({ r: expandedRoots })) {
                        customOrder = entry;
                        break;
                    }
                }
            }
        }

        // 应用自定义笔画顺序
        if (customOrder) {
            const originalStrokes = [...strokes];
            const n = originalStrokes.length;
            if (customOrder.swapLast && n >= 2 && customOrder.swapScope !== 'roots') {
                strokes = [...originalStrokes.slice(0, n - 2), originalStrokes[n - 1], originalStrokes[n - 2]];
            } else if (customOrder.strokeRemap) {
                strokes = customOrder.strokeRemap.map(i => originalStrokes[i]);
            }
        }

        // 递归展开字根
        roots = recursivelyExpandRoots([...wubi.r], ch);
        if (customOrder && customOrder.rootsRemap) {
            roots = customOrder.rootsRemap.map(idx => roots[idx]);
        }
        rootCode = wubi.c;

        // 自动检测补码
        if (!wubi.sup || wubi._supAuto) {
            const detected = autoDetectSupplement(ch, roots);
            if (detected && detected.sup.length > 0) {
                wubi.sup = detected.sup;
                wubi._supAuto = true;
            } else if (wubi._supAuto) {
                wubi.sup = [];
                delete wubi._supAuto;
            }
        }

        // 初始化笔画→字根映射
        if (customOrder && customOrder.strokeRootMap) {
            strokeRootMap = [...customOrder.strokeRootMap];
            strokeRootMapForDisplay = [...strokeRootMap];
            applyShaDianPieSwap();
        } else {
            initStrokeRootMap();
            applyShaDianPieSwap();
        }

        // swapScope:'roots' 交换（力、方、戋等）
        if (customOrder && customOrder.swapLast && customOrder.swapScope === 'roots' && strokes.length >= 2) {
            const n = strokes.length;
            [strokes[n - 2], strokes[n - 1]] = [strokes[n - 1], strokes[n - 2]];
            if (NON_CONTINUOUS_CHARS.has(currentChar)) {
                [strokeRootMap[n - 2], strokeRootMap[n - 1]] = [strokeRootMap[n - 1], strokeRootMap[n - 2]];
                strokeRootMapForDisplay = [...strokeRootMap];
            } else if (strokeRootMap[n - 2] === strokeRootMap[n - 1]) {
                [strokeRootMap[n - 2], strokeRootMap[n - 1]] = [strokeRootMap[n - 1], strokeRootMap[n - 2]];
                strokeRootMapForDisplay = [...strokeRootMap];
            }
        }

        // 复合字交换（基字部分末两笔交换）
        if (wubi.r) {
            let strokeOffset = 0;
            for (let ri = 0; ri < wubi.r.length; ri++) {
                const rootChar = wubi.r[ri];
                let rootStrokeCount = RADICAL_STROKES[rootChar] || 1;
                const rootWubi = WUBI[rootChar];
                if (rootWubi && rootWubi.r && !RADICAL_CHARS.has(rootChar) &&
                    rootWubi.r[0] !== rootChar && rootChar !== currentChar) {
                    const supSet = new Set(rootWubi.sup || []);
                    const expandedSubRoots = rootWubi.r.filter((_, idx) => !supSet.has(idx));
                    rootStrokeCount = 0;
                    for (const sr of expandedSubRoots) {
                        rootStrokeCount += RADICAL_STROKES[sr] || 1;
                    }
                }
                const rootCustomOrder = CUSTOM_STROKE_ORDER[rootChar];
                if (rootCustomOrder && rootCustomOrder.swapLast && rootWubi &&
                    rootCustomOrder.condition(rootWubi, currentChar) && rootChar !== currentChar &&
                    rootStrokeCount >= 2) {
                    const i1 = strokeOffset + rootStrokeCount - 2;
                    const i2 = strokeOffset + rootStrokeCount - 1;
                    if (strokeRootMap[i1] === ri && strokeRootMap[i2] === ri) {
                        [strokes[i1], strokes[i2]] = [strokes[i2], strokes[i1]];
                        [strokeRootMap[i1], strokeRootMap[i2]] = [strokeRootMap[i2], strokeRootMap[i1]];
                        strokeRootMapForDisplay = [...strokeRootMap];
                    }
                }
                strokeOffset += rootStrokeCount;
            }
        }

        // 通过 renderInfo 构建颜色映射（同时更新DOM，稍后恢复）
        renderInfo();

        // 捕获笔画颜色和swap后的笔画路径（颜色与strokes一一对应）
        const colors = [...strokeColorMap];
        const swappedStrokes = [...strokes];

        // 捕获字根列表和对应颜色（与主显示字根图例逻辑一致）
        const cardRootsInfo = computeMultiCardRootsInfo(ch);

        // 捕获补码小框信息
        const supInfo = computeMultiCardSupInfo(ch, strokeList);

        // 恢复全局状态
        currentChar = _saved.currentChar;
        strokes = _saved.strokes;
        roots = _saved.roots;
        rootCode = _saved.rootCode;
        strokeRootMap = _saved.strokeRootMap;
        strokeRootMapForDisplay = _saved.strokeRootMapForDisplay;
        highlightStroke = _saved.highlightStroke;
        rootColorMap = _saved.rootColorMap;
        strokeColorMap = _saved.strokeColorMap;
        radStrokes = _saved.radStrokes;

        // 重新渲染主显示以恢复DOM
        renderInfo();
        renderSVG();
        renderKeyboard();

        return { colors, swappedStrokes, cardRootsInfo, supInfo };
    } catch (e) {
        // 出错时恢复
        currentChar = _saved.currentChar;
        strokes = _saved.strokes;
        roots = _saved.roots;
        rootCode = _saved.rootCode;
        strokeRootMap = _saved.strokeRootMap;
        strokeRootMapForDisplay = _saved.strokeRootMapForDisplay;
        highlightStroke = _saved.highlightStroke;
        rootColorMap = _saved.rootColorMap;
        strokeColorMap = _saved.strokeColorMap;
        radStrokes = _saved.radStrokes;
        renderInfo();
        renderSVG();
        renderKeyboard();
        return null;
    }
}

// 在卡片的小 SVG 上渲染着色笔画
function renderMultiCardSVG(svg, strokeList, colors) {
    svg.innerHTML = '';
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('width', '1024');
    bg.setAttribute('height', '1024');
    bg.setAttribute('fill', '#fff');
    svg.appendChild(bg);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', 'translate(0, 900) scale(1, -1)');
    svg.appendChild(g);
    strokeList.forEach((d, i) => {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('fill', colors[i] || '#555');
        path.setAttribute('stroke', '#333');
        path.setAttribute('stroke-width', '0.5');
        g.appendChild(path);
    });
}

// 在卡片的小 SVG 上渲染补码小框（末笔高亮，其余灰色）
function renderMultiCardSupSVG(svg, strokeList, supStrokeIdx) {
    svg.innerHTML = '';
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('width', '1024');
    bg.setAttribute('height', '1024');
    bg.setAttribute('fill', '#fff');
    svg.appendChild(bg);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', 'translate(0, 900) scale(1, -1)');
    svg.appendChild(g);
    strokeList.forEach((d, i) => {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        if (i === supStrokeIdx) {
            path.setAttribute('fill', '#00BCD4');
            path.setAttribute('stroke', '#0097A7');
            path.setAttribute('stroke-width', '10');
            path.setAttribute('stroke-linejoin', 'round');
            path.setAttribute('stroke-linecap', 'round');
        } else {
            path.setAttribute('fill', '#ccc');
            path.setAttribute('stroke', '#aaa');
            path.setAttribute('stroke-width', '0.5');
        }
        g.appendChild(path);
    });
}

// 创建单张卡片占位元素
function createMultiCardElement(ch) {
    const card = document.createElement('div');
    card.className = 'multi-card';
    card.dataset.char = ch;
    card.innerHTML =
        '<div class="multi-card-svg-wrap">' +
            '<svg class="multi-card-svg" viewBox="0 0 1024 1024"></svg>' +
            '<div class="multi-card-loading">加载中…</div>' +
            '<div class="multi-card-sup-box" style="display:none;position:absolute;top:1px;right:1px;background:rgba(0,0,0,0.75);border-radius:2px;padding:1px;">' +
                '<svg class="multi-card-sup-svg" viewBox="0 0 1024 1024" style="width:18px;height:18px;display:block;"></svg>' +
            '</div>' +
        '</div>' +
        '<div class="multi-card-code"></div>' +
        '<div class="multi-card-roots"></div>';
    card.addEventListener('click', () => {
        const c = card.dataset.char;
        // 更新多字循环模式的索引，使"下一个"从当前点击的字继续
        if (multiCharList.length > 0 && multiCharList.includes(c)) {
            multiCharIndex = multiCharList.indexOf(c);
        }
        // 跳转到该字的主显示
        if (CHAR_LIST.includes(c)) {
            charIndex = CHAR_LIST.indexOf(c);
        }
        appReady = true;
        loadAndRender(c);
        const target = document.querySelector('.char-display');
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
    return card;
}

// 异步填充单张卡片（编码/字根同步，SVG 异步获取笔画数据+同步计算颜色）
async function fillMultiCard(card, ch) {
    const wubiData = WUBI[ch];
    const codeDiv = card.querySelector('.multi-card-code');
    const rootsDiv = card.querySelector('.multi-card-roots');
    const svg = card.querySelector('.multi-card-svg');
    const loading = card.querySelector('.multi-card-loading');

    // 编码着色（同步，不需要笔画数据）
    if (!wubiData || !wubiData.c) {
        codeDiv.innerHTML = '<span style="color:#e67e22;font-size:13px">未收录</span>';
        rootsDiv.innerHTML = '<span style="color:#888">—</span>';
    } else {
        const { codeColors } = multiComputeColors(wubiData);
        codeDiv.innerHTML = wubiData.c.split('').map((c, i) =>
            '<span style="color:' + (codeColors[i] || '#ddd') + ';font-weight:bold">' + c + '</span>'
        ).join('');
    }

    // SVG 着色：异步获取笔画数据 → 同步用完整拆分逻辑计算颜色
    try {
        const strokeList = await fetchMultiCardStrokes(ch);
        const supBox = card.querySelector('.multi-card-sup-box');
        const supSvg = card.querySelector('.multi-card-sup-svg');
        // 优先使用完整拆分逻辑，失败时回退到简化版
        const result = computeMultiCardColors(ch, strokeList);
        if (result && result.colors && result.colors.length === strokeList.length) {
            // 使用swap后的笔画路径，确保颜色与路径一一对应
            const renderStrokes = result.swappedStrokes || strokeList;
            renderMultiCardSVG(svg, renderStrokes, result.colors);
            // 渲染补码小框（也用swap后的笔画）
            if (result.supInfo && result.supInfo.hasSup && supBox && supSvg) {
                renderMultiCardSupSVG(supSvg, renderStrokes, result.supInfo.supStrokeIdx);
                supBox.style.display = 'block';
            } else if (supBox) {
                supBox.style.display = 'none';
            }
            // 渲染字根列表（用展开后的字根和对应颜色）
            if (result.cardRootsInfo && result.cardRootsInfo.length > 0) {
                rootsDiv.innerHTML = result.cardRootsInfo.map(info =>
                    '<span class="multi-root-tag" style="color:' + info.color +
                    ';border-color:' + info.color + '">' + info.root + '</span>'
                ).join('');
            }
        } else {
            const fallbackColors = multiBuildStrokeColors(strokeList, wubiData);
            renderMultiCardSVG(svg, strokeList, fallbackColors);
            if (supBox) supBox.style.display = 'none';
            // 回退字根显示
            if (wubiData && wubiData.r) {
                const { rootColors } = multiComputeColors(wubiData);
                rootsDiv.innerHTML = wubiData.r.map((r, ri) =>
                    '<span class="multi-root-tag" style="color:' + (rootColors[ri] || '#888') +
                    ';border-color:' + (rootColors[ri] || '#888') + '">' + r + '</span>'
                ).join('');
            }
        }
        if (loading) loading.style.display = 'none';
    } catch (err) {
        if (loading) { loading.textContent = '无笔画数据'; loading.style.color = '#888'; }
        svg.innerHTML = '';
    }
}

// 清除多汉字卡片区域
function clearMultiCharCards() {
    const container = document.getElementById('multi-char-cards');
    if (container) {
        container.style.display = 'none';
        container.innerHTML = '';
    }
    // 清除多字循环模式
    multiCharList = [];
    multiCharIndex = -1;
}

// 渲染多汉字拆分卡片
function renderMultiCharCards(chars) {
    const container = document.getElementById('multi-char-cards');
    if (!container) return;
    container.style.display = 'flex';
    container.innerHTML = '';

    // 标题栏
    const header = document.createElement('div');
    header.className = 'multi-cards-header';
    const title = document.createElement('span');
    title.textContent = '多汉字拆分（共 ' + chars.length + ' 字）· 点击卡片可跳转到大框';
    header.appendChild(title);
    const clearBtn = document.createElement('button');
    clearBtn.className = 'multi-clear-btn';
    clearBtn.textContent = '✕ 清除';
    clearBtn.addEventListener('click', clearMultiCharCards);
    header.appendChild(clearBtn);
    container.appendChild(header);

    // 创建所有卡片占位
    const cards = chars.map(ch => {
        const card = createMultiCardElement(ch);
        container.appendChild(card);
        return card;
    });

    // 顺序异步填充每张卡片（避免全局变量竞争）
    (async () => {
        for (let i = 0; i < chars.length; i++) {
            await fillMultiCard(cards[i], chars[i]);
        }
    })();

    // 滚动到卡片区域
    setTimeout(() => {
        container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
}


</script>
