    }

    // 武字模式：r=['一','弋','止']，弋非连续包围
    // 标准笔顺：一(1) 弋横(2) 止(3-6) 弋斜钩+点(7-8)
    // 第1笔→一(0)，第2笔→弋(1)，第3-6笔→止(2)，第7-8笔→弋(1)
    if (currentChar === '武') {
        if (n === 8) {
            result[0] = firstRootIdx;       // 第1笔(一) → 一(索引0) 红色
            result[1] = firstRootIdx + 1;   // 第2笔(弋横) → 弋(索引1) 橙色
            result[2] = firstRootIdx + 2;   // 第3笔(止) → 止(索引2) 绿色
            result[3] = firstRootIdx + 2;   // 第4笔(止) → 止(索引2) 绿色
            result[4] = firstRootIdx + 2;   // 第5笔(止) → 止(索引2) 绿色
            result[5] = firstRootIdx + 2;   // 第6笔(止) → 止(索引2) 绿色
            result[6] = firstRootIdx + 1;   // 第7笔(弋斜钩) → 弋(索引1) 橙色
            result[7] = firstRootIdx + 1;   // 第8笔(弋点) → 弋(索引1) 橙色
        } else if (n === 7) {
            result[0] = firstRootIdx;       // 第1笔 → 一(索引0)
            result[1] = firstRootIdx + 1;   // 第2笔 → 弋(索引1)
            result[2] = firstRootIdx + 2;   // 第3笔 → 止(索引2)
            result[3] = firstRootIdx + 2;   // 第4笔 → 止(索引2)
            result[4] = firstRootIdx + 2;   // 第5笔 → 止(索引2)
            result[5] = firstRootIdx + 2;   // 第6笔 → 止(索引2)
            result[6] = firstRootIdx + 1;   // 第7笔 → 弋(索引1)
        }
        return result;
    }

    // 式字模式：r=['弋','工']，6笔首尾包裹 [0,1,1,1,0,0]
    // 标准笔顺：弋(0) 工(1,2,3) 弋(4,5)
    // 第1、5、6笔属于弋(索引0)，第2、3、4笔属于工(索引1)
    if (currentChar === '式' && roots[0] === '弋' && roots[1] === '工' && n === 6) {
        result[0] = firstRootIdx;       // 第1笔(一) → 弋(索引0)
        result[1] = firstRootIdx + 1;   // 第2笔(一) → 工(索引1)
        result[2] = firstRootIdx + 1;   // 第3笔(丨) → 工(索引1)
        result[3] = firstRootIdx + 1;   // 第4笔(一) → 工(索引1)
        result[4] = firstRootIdx;       // 第5笔(斜钩) → 弋(索引0)
        result[5] = firstRootIdx;       // 第6笔(丶) → 弋(索引0)
        return result;
    }

    // 來字模式：r=['木','人','人']，8笔包裹 [0,1,1,2,2,0,0,0]
    // 第1、6、7、8笔属于木(索引0)，第2-3笔属于第一个(索引1)，第4-5笔属于第二个(索引2)
    // 來字自身或含來的复合字（如麥=來+夂）都需要此映射
    // 麥: roots展开后=['木','人','人','夂']，來部分8笔NC映射 + 夂部分连续分配
    const _laiMatch = currentChar === '來'
        || (roots.includes('木') && roots.filter(r => r === '人').length === 2);
    if (_laiMatch && n >= 8) {
        console.log(`[DEBUG來NC] currentChar=${currentChar}, roots=${JSON.stringify(roots)}, n=${n}, firstRootIdx=${firstRootIdx}`);
        // 來字独立时：NC映射 [0,1,1,2,2,0,0,0]
        // 來作为复合字子字根时（如麥=來+夂）：NC映射 [0,0,1,1,2,2,0,0]
        // 通过 currentChar 区分：currentChar==='來' 为独立字，否则为子字根
        // 复合字基字调用时传入 isEmbedded=true，即使 currentChar==='來' 也走非独立映射
        const _isStandaloneLai = currentChar === '來' && !isEmbedded;
        if (_isStandaloneLai) {
            result[0] = firstRootIdx;       // 第1笔 → 木
            result[1] = firstRootIdx + 1;   // 第2笔 → 人
            result[2] = firstRootIdx + 1;   // 第3笔 → 人
            result[3] = firstRootIdx + 2;   // 第4笔 → 人
            result[4] = firstRootIdx + 2;   // 第5笔 → 人
            result[5] = firstRootIdx;       // 第6笔 → 木
            result[6] = firstRootIdx;       // 第7笔 → 木
            result[7] = firstRootIdx;       // 第8笔 → 木
        } else {
            // 來作为子字根（如麥中的來），n=8只处理來的8笔
            result[0] = firstRootIdx;       // 第1笔 → 木
            result[1] = firstRootIdx;       // 第2笔 → 木
            result[2] = firstRootIdx + 1;   // 第3笔 → 人
            result[3] = firstRootIdx + 1;   // 第4笔 → 人
            result[4] = firstRootIdx + 2;   // 第5笔 → 人
            result[5] = firstRootIdx + 2;   // 第6笔 → 人
            result[6] = firstRootIdx;       // 第7笔 → 木
            result[7] = firstRootIdx;       // 第8笔 → 木
        }
        // 來后面的字根按连续分配（如麥的夂）
        if (n > 8) {
            let _nextIdx = firstRootIdx + 3;
            let _strokeOff = 8;
            for (let _i = 3; _i < roots.length; _i++) {
                const _sc = RADICAL_STROKES[roots[_i]] || 1;
                for (let _j = 0; _j < _sc; _j++) {
                    result[_strokeOff++] = _nextIdx;
                }
                _nextIdx++;
            }
        }
        return result;
    }

    // 酉字模式：r=['西','一']，7笔 [0,0,0,0,0,1,0]
    // 标准笔顺 西6笔+一1笔 → 五笔"一"字根取第6笔（西最后一横之前）
    if (currentChar === '酉' && roots[0] === '西' && roots[1] === '一' && n === 7) {
        result[0] = firstRootIdx;       // 第1笔(一) → 西(索引0)
        result[1] = firstRootIdx;       // 第2笔(丨) → 西(索引0)
        result[2] = firstRootIdx;       // 第3笔(𠃍) → 西(索引0)
        result[3] = firstRootIdx;       // 第4笔(丨) → 西(索引0)
        result[4] = firstRootIdx;       // 第5笔(𠃋) → 西(索引0)
        result[5] = firstRootIdx + 1;   // 第6笔(一) → 一(索引1)
        result[6] = firstRootIdx;       // 第7笔(一) → 西(索引0)
        return result;
    }

    // 臤字模式：r=['匚','丨','コ','丨','又']，8笔 [0,1,2,2,3,0,4,4]
    // 匚为左框非包围结构，竖(第1笔)和底横(第6笔)分居首尾，中间被丨コ丨隔开
    // 又为右偏旁，最后2笔（第7,8笔）
    if (currentChar === '臤' && n === 8 && roots.length >= 5 && roots[0] === '匚' && roots[1] === '丨' && roots[2] === 'コ' && roots[3] === '丨' && roots[4] === '又') {
        result[0] = firstRootIdx;       // 第1笔(竖) → 匚(索引0) 红
        result[1] = firstRootIdx + 1;   // 第2笔(横折) → 丨(索引1) 橙
        result[2] = firstRootIdx + 2;   // 第3笔(横) → コ(索引2) 绿
        result[3] = firstRootIdx + 2;   // 第4笔(竖) → コ(索引2) 绿
        result[4] = firstRootIdx + 3;   // 第5笔(竖) → 丨(索引3) 灰
        result[5] = firstRootIdx;       // 第6笔(横) → 匚(索引0) 红
        result[6] = firstRootIdx + 4;   // 第7笔(横撇) → 又(索引4)
        result[7] = firstRootIdx + 4;   // 第8笔(捺) → 又(索引4)
        return result;
    }

    // 韋字模式：r=['コ','丨','口','匸','丨']，9笔 [1,0,0,2,2,2,3,3,4]
    // 第2、3笔属于第一个字根コ(索引0)，第1笔属于第二个字根丨(索引1)
    // 第4-6笔→口(2)，第7-8笔→匸(3)，第9笔→丨(4)
    if (currentChar === '韋' && n === 9 && roots.length >= 5 && roots[0] === 'コ' && roots[1] === '丨' && roots[2] === '口' && roots[3] === '匸' && roots[4] === '丨') {
        result[0] = firstRootIdx + 1;   // 第1笔 → 丨(索引1)
        result[1] = firstRootIdx + 0;   // 第2笔 → コ(索引0)
        result[2] = firstRootIdx + 0;   // 第3笔 → コ(索引0)
        result[3] = firstRootIdx + 2;   // 第4笔 → 口(索引2)
        result[4] = firstRootIdx + 2;   // 第5笔 → 口(索引2)
        result[5] = firstRootIdx + 2;   // 第6笔 → 口(索引2)
        result[6] = firstRootIdx + 3;   // 第7笔 → 匸(索引3)
        result[7] = firstRootIdx + 3;   // 第8笔 → 匸(索引3)
        result[8] = firstRootIdx + 4;   // 第9笔 → 丨(索引4)
        return result;
    }

    // 戈字非连续映射：五笔编码AGNT，报户口结构 r=['戈','一','㇂','丶','丿']
    // 标准笔顺：一→㇂→丿→丶，五笔编码：A(报户口)+G(一)+N(㇂)+T(丿，第3笔非末笔)
    // 非连续映射 [1,2,4,3] 使第3笔(丿)对应root4(T编码)、第4笔(丶)对应root3(灰色被跳过)
    // 两种roots情况：独立戈字(含报户口5根)和复合字中戈(已过滤报户口4根)
    if (currentChar === '戈' && n === 4 && roots.length >= 4 && 
        ((roots.length === 5 && roots[1] === '一' && roots[2] === '㇂') || 
         (roots.length === 4 && roots[0] === '一' && roots[1] === '㇂'))) {
        const hasReportRoot = (roots.length === 5);
        result[0] = firstRootIdx + (hasReportRoot ? 1 : 0);   // 第1笔(一)
        result[1] = firstRootIdx + (hasReportRoot ? 2 : 1);   // 第2笔(㇂)
        result[2] = firstRootIdx + (hasReportRoot ? 4 : 3);   // 第3笔(丿) → root4/T编码
        result[3] = firstRootIdx + (hasReportRoot ? 3 : 2);   // 第4笔(丶) → root3/灰色
        return result;
    }

    // 舞字模式：r=['𠂉','四竖','一','夕','匸','丨']，14笔
    // 标准笔顺：𠂉(1-2) → 一(3) → 四竖(4-7) → 夕(8-10) → 匸(11-12) → 丨(13-14)
    if (currentChar === '舞' && roots[0] === '𠂉' && roots[1] === '四竖' && roots[2] === '一' && n === 14) {
        result[0] = firstRootIdx;       // 第1笔(撇) → 𠂉(索引0) 红
        result[1] = firstRootIdx;       // 第2笔(横) → 𠂉(索引0) 红
        result[2] = firstRootIdx + 2;   // 第3笔(横) → 一(索引2) 绿
        result[3] = firstRootIdx + 1;   // 第4笔(竖) → 四竖(索引1) 橙
        result[4] = firstRootIdx + 1;   // 第5笔(竖) → 四竖(索引1) 橙
        result[5] = firstRootIdx + 1;   // 第6笔(竖) → 四竖(索引1) 橙
        result[6] = firstRootIdx + 1;   // 第7笔(竖) → 四竖(索引1) 橙
        result[7] = firstRootIdx + 3;   // 第8笔(撇) → 夕(索引3) 蓝
        result[8] = firstRootIdx + 3;   // 第9笔(横撇) → 夕(索引3) 蓝
        result[9] = firstRootIdx + 3;   // 第10笔(点) → 夕(索引3) 蓝
        result[10] = firstRootIdx + 4;  // 第11笔(横) → 匸(索引4) 灰
        result[11] = firstRootIdx + 4;  // 第12笔(竖折) → 匸(索引4) 灰
        result[12] = firstRootIdx + 4;  // 第13笔(竖) → 匸(索引4) 灰
        result[13] = firstRootIdx + 5;  // 第14笔(竖) → 丨(索引5)
        return result;
    }

    // 凸字模式：r=['丨','一','凸头','一']，5笔，第一笔和第三笔交换
    // 标准笔顺：丨(1) 一(2) 凸头(3,4) 一(5)
    // 五笔映射：第1笔→第3笔位置(凸头首笔)，第2笔→第2笔，第3笔→第1笔位置(丨)，第4笔→凸头，第5笔→一
    if (currentChar === '凸' && roots[0] === '丨' && roots[1] === '一' && roots[2] === '凸头' && n === 5) {
        result[0] = firstRootIdx + 2;   // 第1笔(丨) → 凸头(索引2)
        result[1] = firstRootIdx + 1;   // 第2笔(一) → 一(索引1)
        result[2] = firstRootIdx;       // 第3笔(横) → 丨(索引0)
        result[3] = firstRootIdx + 2;   // 第4笔(竖) → 凸头(索引2)
        result[4] = firstRootIdx + 3;   // 第5笔(一) → 一(索引3)
        return result;
    }

    // ===== 甴字特殊处理 =====
    // 甴：r=['曰','丨']，5笔
    // 第3笔(竖)属于字根丨，其它笔划属于字根曰
    if (currentChar === '甴' && roots[0] === '曰' && roots[1] === '丨' && n === 5) {
        const result = new Array(5);
        result[0] = strokeOffset + 0;  // 第1笔(丨左竖) → 曰
        result[1] = strokeOffset + 0;  // 第2笔(𠃍横折) → 曰
        result[2] = strokeOffset + 1;  // 第3笔(丨中竖) → 丨
        result[3] = strokeOffset + 0;  // 第4笔(一底横) → 曰
        result[4] = strokeOffset + 0;  // 第5笔(一中横) → 曰
        return result;
    }

    if (r === 2) {
        // 两字根非连续映射：首尾包裹模式
        // 仅对白名单字本身/匚结构/非字生效，避免含非连续子字根的复合字（如步含止）误入
        if (!NON_CONTINUOUS_CHARS.has(currentChar) && !hasKuang && !hasFei) return null;
        // 验证：万 [0,1,0] ✓ 亡 [0,1,0] ✓ 沤(基字部分) ✓ 区（去掉特殊处理后）✓
        result[0] = firstRootIdx;
        result[n - 1] = firstRootIdx;
        for (let i = 1; i <= n - 2; i++) {
            result[i] = lastRootIdx;
        }
    } else if (hasKuang && hasFei) {
        // 匚+非组合：如匪 = 匚+非，匚占首尾，内部非走硬编码8笔
        const feiIdx = roots.indexOf('〢');
        const san1Idx = feiIdx - 1;
        const san2Idx = feiIdx + 1;
        if (san1Idx < 0 || san2Idx >= r) return null;

        // 匚占首尾（position 0 和 n-1）
        result[0] = firstRootIdx;
        result[n - 1] = firstRootIdx;

        // 计算非之前的笔划数（在 position 1 之后）
        let preSc = 0;
        for (let i = 1; i < san1Idx; i++) {
            preSc += (RADICAL_STROKES[roots[i]] || 1);
        }
        const nonStart = 1 + preSc; // 非组件起始位置（匚第一笔之后）
        if (nonStart + 8 > n - 1) {
            console.warn('非组件超出匚内部:', currentChar);
            return null;
        }

        // 填充匚之后、非之前的字根 [1, nonStart)
        let pos = 1;
        for (let ri = 1; ri < san1Idx; ri++) {
            const sc = RADICAL_STROKES[roots[ri]] || 1;
            for (let j = 0; j < sc; j++) {
                if (pos < nonStart) result[pos++] = firstRootIdx + ri;
            }
        }

        // 硬编码非8笔：〢-三-〢-三
        result[nonStart] = firstRootIdx + feiIdx;
        result[nonStart + 1] = firstRootIdx + san1Idx;
        result[nonStart + 2] = firstRootIdx + san1Idx;
        result[nonStart + 3] = firstRootIdx + san1Idx;
        result[nonStart + 4] = firstRootIdx + feiIdx;
        result[nonStart + 5] = firstRootIdx + san2Idx;
        result[nonStart + 6] = firstRootIdx + san2Idx;
        result[nonStart + 7] = firstRootIdx + san2Idx;

        // 填充非之后、匚最后一笔之前的字根 [nonStart+8, n-1)
        pos = nonStart + 8;
        for (let ri = san2Idx + 1; ri < r; ri++) {
            const sc = RADICAL_STROKES[roots[ri]] || 1;
            for (let j = 0; j < sc; j++) {
                if (pos < n - 1) result[pos++] = firstRootIdx + ri;
            }
        }
    } else if (hasKuang && !hasFei) {
        const kuangIdx = roots.indexOf('匚');
        if (kuangIdx > 0) {
            // 匚不是首字根（如惬=忄+匚+夹），前缀+匚首笔+内容+匚末笔
            let pos = 0;
            for (let ri = 0; ri < kuangIdx; ri++) {
                const sc = RADICAL_STROKES[roots[ri]] || 1;
                for (let j = 0; j < sc && pos < n - 1; j++) {
                    result[pos++] = firstRootIdx + ri;
                }
            }
            if (pos < n) result[pos++] = firstRootIdx + kuangIdx;
            for (let ri = kuangIdx + 1; ri < r; ri++) {
                const sc = RADICAL_STROKES[roots[ri]] || 1;
                for (let j = 0; j < sc && pos < n - 1; j++) {
                    result[pos++] = firstRootIdx + ri;
                }
            }
            if (pos < n) result[pos++] = firstRootIdx + kuangIdx;
        } else {
            // 匚是首字根 — 匚占其包围部分的首尾两笔
            // 简单字（如医=匚+矢）：匚占[0, n-1]
            // 复合字（如欧=区+欠）：匚只占区部分的首尾，不占整个字的末笔
            // 判断方法：检查原始WUBI字根是否为复合结构（如欧的r=['区','欠']）
            const _origWubiRoots = WUBI[currentChar]?.r || [];
            const _isKuangCompound = _origWubiRoots.length >= 2 && _origWubiRoots[0] !== '匚' &&
                WUBI[_origWubiRoots[0]] && WUBI[_origWubiRoots[0]].r &&
                WUBI[_origWubiRoots[0]].r[0] === '匚';

            let kuangEndIdx; // 匚部分的末笔索引（在n中的位置）
            if (_isKuangCompound) {
                // 复合字：匚部分 = 第一个原始字根（如区）展开后的笔画数
                const _firstOrigRoot = _origWubiRoots[0];
                const _firstOrigExpanded = recursivelyExpandRoots([_firstOrigRoot]);
                kuangEndIdx = _firstOrigExpanded.reduce((s, r) => s + (RADICAL_STROKES[r] || 1), 0) - 1;
            } else {
                // 简单字：匚占整个字的首尾
                kuangEndIdx = n - 1;
            }

            result[0] = firstRootIdx;
            result[kuangEndIdx] = firstRootIdx;

            // 匚内部字根（匚之后到kuangEndIdx之前的字根）
            const lastSc = RADICAL_STROKES[roots[lastRootIdx]] || 1;
            // 匚部分内部的笔画数（不含匚的首尾两笔）
            const midStrokes = kuangEndIdx - 1; // [1, kuangEndIdx-1]
            if (midRootCount >= 1 && midStrokes >= 1) {
                // 计算匚之后、匚末笔之前的字根（在展开roots中）
                // 匚是roots[0]，内部字根从roots[1]开始
                let midActualTotal = 0;
                let midCount = 0;
                for (let ri = 1; ri < r; ri++) {
                    const sc = RADICAL_STROKES[roots[ri]] || 1;
                    if (midActualTotal + sc <= midStrokes) {
                        midActualTotal += sc;
                        midCount++;
                    } else break;
                }
                if (midCount > 0 && midActualTotal === midStrokes) {
                    // 精确匹配：每个中间字根按笔画数分配
                    let pos = 1;
                    for (let ri = 0; ri < midCount; ri++) {
                        const midRoot = roots[firstRootIdx + 1 + ri];
                        const sc = RADICAL_STROKES[midRoot] || 1;
                        for (let j = 0; j < sc; j++) {
                            result[pos++] = firstRootIdx + 1 + ri;
                        }
                    }
                } else if (midCount > 0) {
                    // 近似分配
                    const eachMid = Math.floor(midStrokes / midCount);
                    const midExtra = midStrokes - eachMid * midCount;
                    let pos = 1;
                    for (let mid = 0; mid < midCount; mid++) {
                        const count = eachMid + (mid < midExtra ? 1 : 0);
                        for (let j = 0; j < count; j++) {
                            result[pos++] = firstRootIdx + 1 + mid;
                        }
                    }
                }
            }

            // 匚部分之后的字根（连续分配）
            if (_isKuangCompound) {
                // 从kuangEndIdx+1开始，分配剩余字根
                let pos = kuangEndIdx + 1;
                // 找到匚部分之后开始的roots索引
                const _firstOrigRoot = _origWubiRoots[0];
                const _firstOrigExpanded = recursivelyExpandRoots([_firstOrigRoot]);
                const _kuangRootCount = _firstOrigExpanded.length; // 匚部分在展开roots中的字根数
                for (let ri = _kuangRootCount; ri < r; ri++) {
                    const sc = RADICAL_STROKES[roots[ri]] || 1;
                    for (let j = 0; j < sc; j++) {
                        if (pos < n) result[pos++] = firstRootIdx + ri;
                    }
                }
            } else {
                // 简单字：末尾字根
                let pos = n - lastSc;
                // 修正：如果匚占了n-1，末尾字根从n-lastSc开始
                if (kuangEndIdx === n - 1) {
                    pos = n - lastSc;
                    // 但n-1已被匚占用，需要调整
                    // 末尾字根占[n-lastSc, n-2]，n-1是匚
                    for (let i = 0; i < lastSc - 1 && pos < n - 1; i++) {
                        result[pos++] = lastRootIdx;
                    }
                } else {
                    for (let i = 0; i < lastSc; i++) {
                        if (pos < n) result[pos++] = lastRootIdx;
                    }
                }
            }
        }
    } else if (hasShaDianPie) {
        // 末尾三字根为 ㇂+丶+丿 的模式（如"成""戊""臧""戊"基字）
        // 此分支负责正确分配笔画映射，末两笔交换由 applyShaDianPieSwap 统一处理
        const last3Start = r - 3;
        let preSc = 0;
        for (let i = 0; i < last3Start; i++) {
            preSc += (RADICAL_STROKES[roots[i]] || 1);
        }
        const nonStart = preSc;
        const nonEnd = preSc + 3; // ㇂+丶+丿 = 3笔
        if (nonEnd > n) {
            console.warn('㇂+丶+丿组件笔划超出总笔划数:', currentChar);
            return null;
        }
        // 填充前面的字根（连续分配）
        let p = 0;
        for (let ri = 0; ri < last3Start; ri++) {
            const sc = RADICAL_STROKES[roots[ri]] || 1;
            for (let j = 0; j < sc; j++) {
                if (p < nonStart) result[p++] = firstRootIdx + ri;
            }
        }
        // ㇂+丶+丿 各自独立分配（交换由 applyShaDianPieSwap 统一处理）
        result[nonStart] = lastRootIdx - 2;     // ㇂
        result[nonStart + 1] = lastRootIdx - 1;  // 丶
        result[nonStart + 2] = lastRootIdx;      // 丿
        // 填充后面的字根（如果有）
        p = nonEnd;
        for (let ri = last3Start + 3; ri < r; ri++) {
            const sc = RADICAL_STROKES[roots[ri]] || 1;
            for (let j = 0; j < sc; j++) {
                if (p < n) result[p++] = firstRootIdx + ri;
            }
        }
    } else if (hasFei) {
        // 非字模式："非"组件固定8笔，标准笔划顺序：〢-三-〢-三
        const feiIdx = roots.indexOf('〢');
        const san1Idx = feiIdx - 1; // 第一个三
        const san2Idx = feiIdx + 1; // 第二个三
        if (san1Idx < 0 || san2Idx >= r) return null;

        // 计算"非"组件之前的笔划数
        let preSc = 0;
        for (let i = 0; i < san1Idx; i++) {
            preSc += (RADICAL_STROKES[roots[i]] || 1);
        }
        const nonStart = preSc;
        const nonEnd = preSc + 8; // 非=8笔
        if (nonEnd > n) {
            console.warn('非组件笔划超出总笔划数:', currentChar);
            return null;
        }

        // 填充"非"组件之前的字根 [0, nonStart)
        let pos = 0;
        for (let ri = 0; ri < san1Idx; ri++) {
            const sc = RADICAL_STROKES[roots[ri]] || 1;
            for (let j = 0; j < sc; j++) {
                if (pos < nonStart) result[pos++] = firstRootIdx + ri;
            }
        }

        // 硬编码"非"组件8笔：〢(0)-三(1,2,3)-〢(4)-三(5,6,7)
        result[nonStart] = firstRootIdx + feiIdx;
        result[nonStart + 1] = firstRootIdx + san1Idx;
        result[nonStart + 2] = firstRootIdx + san1Idx;
        result[nonStart + 3] = firstRootIdx + san1Idx;
        result[nonStart + 4] = firstRootIdx + feiIdx;
        result[nonStart + 5] = firstRootIdx + san2Idx;
        result[nonStart + 6] = firstRootIdx + san2Idx;
        result[nonStart + 7] = firstRootIdx + san2Idx;

        // 填充"非"组件之后的字根 [nonEnd, n)
        pos = nonEnd;
        for (let ri = san2Idx + 1; ri < r; ri++) {
            const sc = RADICAL_STROKES[roots[ri]] || 1;
            for (let j = 0; j < sc; j++) {
                if (pos < n) result[pos++] = firstRootIdx + ri;
            }
        }
                } else if (currentChar === '丧' && roots[0] === '土' && roots[1] === '丷' && roots[2] === '艮下') {
        // 丧：标准笔顺 横竖点撇横竖提撇捺 → 土(0,1,4) 丷(2,3) 艮下(5,6,7)
        // 土3笔分两段(0-1, 4)，丷2笔插中间(2-3)，艮下3笔尾部连续(5-7)
        result[0] = firstRootIdx;   // 横 → 土
        result[1] = firstRootIdx;   // 竖 → 土
        result[2] = firstRootIdx + 1; // 点 → 丷
        result[3] = firstRootIdx + 1; // 撇 → 丷
        result[4] = firstRootIdx;   // 横 → 土(第3笔)
        result[5] = lastRootIdx;    // 竖提 → 艮下
        result[6] = lastRootIdx;    // 撇 → 艮下
        result[7] = lastRootIdx;    // 捺 → 艮下
    } else if (currentChar === '喪' && roots[0] === '土' && roots[1] === '口' && roots[2] === '口' && roots[3] === '艮下' && n === 12) {
        // 喪：标准笔顺 横竖(土) 竖横折一(口) 竖横折一(口) 横(土第3笔) 竖提撇捺(艮下)
        // 土3笔分散在0,1,8（非连续），两个口各3笔连续，艮下3笔尾部连续
        result[0] = firstRootIdx;        // 0:横 → 土
        result[1] = firstRootIdx;        // 1:竖 → 土
        result[2] = firstRootIdx + 1;    // 2:竖 → 口1
        result[3] = firstRootIdx + 1;    // 3:横折 → 口1
        result[4] = firstRootIdx + 1;    // 4:横 → 口1
        result[5] = firstRootIdx + 2;    // 5:竖 → 口2
        result[6] = firstRootIdx + 2;    // 6:横折 → 口2
        result[7] = firstRootIdx + 2;    // 7:横 → 口2
        result[8] = firstRootIdx;        // 8:横 → 土(第3笔)
        result[9] = lastRootIdx;         // 9:竖提 → 艮下
        result[10] = lastRootIdx;        // 10:撇 → 艮下
        result[11] = lastRootIdx;        // 11:捺 → 艮下
    } else if (currentChar === '啬' && roots[0] === '土' && roots[1] === '丷') {
        // 啬：标准笔顺 横竖点撇横 竖横折竖横折横横
        // 土(0,1,4) 丷(2,3) 囗(5,6,10 包围结构，封底在最后) 口(7,8,9)
        result[0] = firstRootIdx;     // 0:横 → 土
        result[1] = firstRootIdx;     // 1:竖 → 土
        result[2] = firstRootIdx + 1; // 2:点 → 丷
        result[3] = firstRootIdx + 1; // 3:撇 → 丷
        result[4] = firstRootIdx;     // 4:横 → 土(第3笔)
        result[5] = firstRootIdx + 2; // 5:竖   → 囗(外框)
        result[6] = firstRootIdx + 2; // 6:横折 → 囗(外框)
        result[7] = lastRootIdx;      // 7:竖   → 口(内框)
        result[8] = lastRootIdx;      // 8:横折 → 口(内框)
        result[9] = lastRootIdx;      // 9:横   → 口(内框)
        result[10] = firstRootIdx + 2; // 10:横  → 囗(封底)
    } else {
        // r >= 3: 通用算法
        // 验证：那 [0,1,1,0,2,2] → 刀占[0,3], 二占[1,2], 阝占[4,5]
        // 规律：first占position 0和n-sc0-1，middle填[1,n-sc0-2]，last填[n-sc0,n-1]
        const boundary = n - sc0; // 边界position
        result[0] = firstRootIdx;
        result[boundary - 1] = firstRootIdx; // first root在position 0和boundary-1
        
        // middle roots填[1, boundary-2]
        if (midRootCount >= 1) {
            const midStrokes = boundary - 2; // 中间区域大小
            const eachMid = Math.floor(midStrokes / midRootCount);
            const midExtra = midStrokes - eachMid * midRootCount;
            let pos = 1;
            for (let mid = 0; mid < midRootCount; mid++) {
                const count = eachMid + (mid < midExtra ? 1 : 0);
                for (let j = 0; j < count && pos <= boundary - 2; j++) {
                    result[pos++] = firstRootIdx + 1 + mid;
                }
            }
        }
        
        // last root填[boundary, n-1]
        const lastStrokes = n - boundary;
        for (let i = boundary; i < n; i++) {
            result[i] = lastRootIdx;
        }
    }

    // ========== 尝试「末字根夹心」模式 ==========
    // 仅对已知需要此模式的字生效（白名单）
    // 例：母 [母框,一,冫] → 母框[0,1] 冫[2,4] 一[3]
    // 注意：那[刀,二,阝]不应走此路径，那走的是首字根包裹模式
    const LAST_WRAP_CHARS = new Set(['母']);
    const lastRoot = roots[r - 1];
    const lastSc = RADICAL_STROKES[lastRoot] || 0;
    if (LAST_WRAP_CHARS.has(currentChar) && lastSc >= 2 && r >= 3) {
        // 计算前(r-2)个字根的笔画总和
        let prefixSc = 0;
        for (let i = 0; i < r - 2; i++) {
            prefixSc += RADICAL_STROKES[roots[i]] || 1;
        }
        // 倒数第2个字根的笔画数
        const mid2Root = roots[r - 2];
        const mid2Sc = RADICAL_STROKES[mid2Root] || 1;
        // 验证：prefixSc + 1(末字根首笔) + mid2Sc + (lastSc-1)(末字根末笔) = n
        if (prefixSc + 1 + mid2Sc + (lastSc - 1) === n) {
            const result2 = new Array(n);
            let pos = 0;
            // 前(r-2)个字根连续填充
            for (let i = 0; i < r - 2; i++) {
                const sc = RADICAL_STROKES[roots[i]] || 1;
                for (let j = 0; j < sc; j++) {
                    result2[pos++] = strokeOffset + i;
                }
            }
            // 末字根首笔
            result2[pos++] = strokeOffset + r - 1;
            // 倒数第2字根填充夹心
            for (let j = 0; j < mid2Sc; j++) {
                result2[pos++] = strokeOffset + r - 2;
            }
            // 末字根剩余笔画
            for (let j = 0; j < lastSc - 1; j++) {
                result2[pos++] = strokeOffset + r - 1;
            }
            if (pos === n && result2.every(v => v !== undefined)) {
                return result2;
            }
        }
    }

    // 验证结果
    if (result.length === n && result.every(v => v !== undefined)) {
        return result;
    }
    return null;
}

/**
 * 自动生成成字字根（RADICAL_CHARS）的笔画映射
 * 
 * 适用范围：仅限 RADICAL_CHARS 中的「成字字根」，即该字本身就是一个可作为键名字的字根。
 * 规则：第一个编码是键名本身（报户口），从第二个编码开始依次对应笔画。
 * 
 * 示例：
 * - 了(BNH): B是报户口(了自身)，N→第1笔(乛)，H→第2笔(亅)
 * - 七(AGN): A是报户口(七自身)，G→第1笔(一)，N→第2笔(乚)
 * - 上(HHGG): H是报户口(上自身)，H→第1笔(丨)，G→第2笔(一)，G→第3笔(一)
 * 
 * 注意：对于不在 RADICAL_CHARS 中的独体字（如「而」），不应使用此规则，
 *       应在硬编码中显式定义笔画映射（如 '而': [0,1,1,2,2,2]）
 * 
 * @param {string} char - 汉字
 * @param {string} code - 全码（如 'RTGH'）
 * @param {number} totalStrokes - 总笔画数
 * @returns {array} 笔画映射数组
 */
function autoGenerateSingleRootMap(char, code, totalStrokes, rootCount) {
    const map = [];
    const r = rootCount || totalStrokes;
    
    // 成字字根编码规则：报户口(字根0) + 第1笔(字根1) + 第2笔(字根2) + 末笔(字根r-1)
    // 报户口不占笔画，笔画从字根1开始分配
    // 当笔画数 > (字根数-1) 时，中间笔画标灰（跳过）
    
    const strokeRootCount = r - 1; // 扣掉报户口，实际对应笔画的字根数
    
    if (totalStrokes <= strokeRootCount) {
        // 笔画数 ≤ 字根数-1：顺序映射，末笔不超过最后一个字根
        for (let i = 0; i < totalStrokes; i++) {
            map.push(Math.min(i + 1, r - 1));
        }
    } else {
        // 笔画数 > 字根数-1：第1笔→字根1，第2笔→字根2，末笔→字根r-1，中间灰色
        for (let i = 0; i < totalStrokes; i++) {
            if (i === 0) {
                map.push(1); // 第1笔 → 字根1
            } else if (i === 1) {
                map.push(2); // 第2笔 → 字根2
            } else if (i === totalStrokes - 1) {
                map.push(r - 1); // 末笔 → 最后一个字根
            } else {
                map.push(-1); // 中间笔画跳过，灰色
            }
        }
    }
    
    return map;
}

/**
 * 批量生成所有独体字根字的笔画映射
 */
function generateAllSingleRootMaps() {
    const results = {};
    
    for (const char in WUBI) {
        const wubi = WUBI[char];
        
        // 只处理成字字根（RADICAL_CHARS）
        if (!RADICAL_CHARS.has(char)) continue;
        
        const code = wubi.c;
        const strokeCount = STROKE_COUNT[char] || 0;
        
        if (strokeCount === 0) {
            console.warn(`[跳过] ${char}: 缺少笔画数`);
            continue;
        }
        
        const map = autoGenerateSingleRootMap(char, code, strokeCount);
        results[char] = map;
    }
    
    return results;
}

// ==================== 统一颜色获取 ====================
// 获取编码位置对应的颜色（确保编码区、字根区、大框颜色一致）
function getCodeColor(codeIndex) {
    return ROOT_COLORS[codeIndex % ROOT_COLORS.length];
}

// 获取字根索引对应的颜色（与编码位置同步）
function getRootColor(rootIndex) {
    return ROOT_COLORS[rootIndex % ROOT_COLORS.length];
}

// 获取笔画对应的颜色（使用strokeColorMap，确保与编码区一致）
function getStrokeColor(strokeIndex) {
    // 优先使用strokeColorMap（由renderInfo构建）
    if (strokeColorMap.length > 0 && strokeColorMap[strokeIndex]) {
        return strokeColorMap[strokeIndex];
    }
    // 回退到原始逻辑
    const ri = strokeRootMapForDisplay[strokeIndex];
    if (ri === undefined || ri < 0) return '#555'; // 非编码笔画灰色
    return getRootColor(ri);
}

// ==================== NC字根编码索引计算 ====================
// 计算NC字符自身的rootToCodeIndex（前3+末1规则）
// 用于复合字中NC子字根展开时，让各子字根获得不同颜色
function computeNcRootToCodeIndex(ncChar) {
    const ncWubi = WUBI[ncChar];
    if (!ncWubi || !ncWubi.r) return [];
    const ncRoots = ncWubi.r;
    const ncCode = ncWubi.c || '';
    const ncCodeLen = ncCode.length;
    const ncSupIndices = ncWubi.sup || [];
    const result = [];
    // 韋特殊处理：r=['コ','丨','口','匸','丨']，5子字根4编码位(NHKH)
    // 编码对应：N=コ+丨, H=口, K=匸, H=丨 → [0,0,1,2,3]
    if (ncChar === '韋' && ncRoots.length === 5 && ncCodeLen === 4) {
        return [0, 0, 1, 2, 3];
    }
    if (ncRoots.length > 4) {
        for (let i = 0; i < 3; i++) result.push(i);
        for (let i = 3; i < ncRoots.length - 1; i++) result.push(-1);
        result.push(ncCodeLen - 1);
    } else if (ncRoots.length < ncCodeLen) {
        const ncRootCodeIndices = [];
        for (let i = 0; i < ncCodeLen; i++) {
            if (!ncSupIndices.includes(i)) ncRootCodeIndices.push(i);
        }
        for (let i = 0; i < ncRoots.length - 1; i++) result.push(ncRootCodeIndices[i]);
        result.push(ncRootCodeIndices[ncRootCodeIndices.length - 1]);
    } else {
        for (let i = 0; i < ncRoots.length; i++) result.push(i < ncCodeLen ? i : -1);
    }
    return result;
}

// ==================== 自定义笔画顺序 ====================
// 当五笔拆分与标准笔顺冲突时，按条件重映射笔画顺序
// 使用方式：修改 WUBI 字典中 r 数组的顺序（如 ['丿','扌','乚','丶','丿']）
// 条件自动检测并应用重映射，不满足条件时使用原数据
const CUSTOM_STROKE_ORDER = {
    '方': {
        // 方：标准笔顺 丶一㇆㇒，五笔需要 丶一㇒㇆（交换最后两笔）
        condition: (wubi) => {
            const r = wubi.r;
            return r.length >= 2 && r[r.length-2] === '一' && r[r.length-1] === '㇆';
        },
        swapLast: true,
        swapScope: 'roots'  // 只交换方字根部分的末两笔，不交换整体字的末两笔
    },
    '力': {
        // 力：标准笔顺 横折钩(㇆)→撇(丿)，五笔拆分 报户口(力)+第1笔(㇆)+第2笔(丿)，交换最后两笔
        condition: (wubi, currentChar) => {
            const r = wubi.r;
            return r.length >= 2 && r[r.length-2] === '㇆' && r[r.length-1] === '丿';
        },
        swapLast: true,
        swapScope: 'roots'  // 只交换力字根部分的末两笔，不交换整体字的末两笔
    },
    '弋': {
        // 弋：末位两笔交换（标准笔顺 一㇟丶，与五笔顺序一致，但作为部首时统一处理）
        condition: (wubi) => {
            const r = wubi.r;
            return r.length >= 2 && r[r.length-2] === '㇟' && r[r.length-1] === '丶';
        },
        swapLast: true
    },
    '夜': {
        // 夜：标准笔顺 亠(点横)亻(撇竖)夂(撇横撇)丶(点)夂(捺)
        // 连续分配 [0,0,1,1,2,2,2,3] 把第7笔(夂捺)分给root2、第8笔(丶)分给root3
        // 但标准笔顺第7笔是丶(点)，第8笔是夂(捺)→ 需交换末两位root索引
        strokeRootMap: [0,0,1,1,2,2,3,2],
        condition: (wubi) => wubi.c === 'YWTY'
    },
    '戋': {
        // 戋：标准笔顺 一→一→乚→丿→丶，五笔编码GGGT末笔为T(丿)
        // WUBI分解：r=['戋','一','一','乚','丶','丿']，末两子根为丶+丿，需交换使丿变为末笔
        // 与戈字末两笔交换规则一致（含钩笔画+末两子根丶丿）
        condition: (wubi) => {
            const r = wubi.r;
            return r.length >= 2 && r[0] === '戋' && r[r.length-2] === '丶' && r[r.length-1] === '丿';
        },
        swapLast: true,
        swapScope: 'roots'  // 只交换戋字根部分的末两笔，不交换整字末两笔
    },
    '乶': {
        // 乶：r=['甫','乙']，展开后['一','冃','丨','丶','乙']，8笔
        // 标准笔顺第7笔=丶(3), 第8笔=乙(4)，需交换末两笔
        // swapLast交换strokes路径，strokeRootMap指定交换后的字根映射
        condition: (wubi) => wubi.c === 'GEHN',
        swapLast: true,
        strokeRootMap: [0,1,1,1,1,2,4,3]  // 一(0),冃(1)x4,丨(2),乙(4),丶(3)
    },
    '瓦': {
        // 瓦：标准笔顺 一→𠄌→乙(横折弯钩)→丶(点)
        // WUBI分解：r=['一','𠄌','丶','乙']，末两子根为丶+乙，需交换使乙(横折弯钩)在前丶(点)在后
        condition: (wubi) => {
            const r = wubi.r;
            return r.length >= 2 && r[r.length-2] === '丶' && r[r.length-1] === '乙';
        },
        swapLast: true,
        swapScope: 'roots'  // 只交换瓦字根部分的末两笔，不交换整字末两笔
    },
};

// ==================== 加载笔画数据 ====================
// 调整SVG路径中所有X坐标（用于多段拼接时水平对齐）
function shiftPathX(pathStr, dx) {
    return pathStr.replace(/([MLCQHVSmlcqhvs])([^MLCQHVSZmlcqhvsz]*)/g, (match, cmd, params) => {
        const isRelative = cmd === cmd.toLowerCase() && cmd !== cmd.toUpperCase();
        if (isRelative) return match;
        const nums = params.trim().split(/[\s,]+/).filter(s => s.length > 0).map(Number);
        if (nums.length === 0) return match;
        const cmdUpper = cmd.toUpperCase();
        if (cmdUpper === 'V') return match;
        if (cmdUpper === 'H') {
            nums[0] += dx;
            return cmd + ' ' + nums.map(n => n.toFixed(2)).join(' ');
        }
        for (let i = 0; i < nums.length; i += 2) {
            nums[i] += dx;
        }
        return cmd + ' ' + nums.map(n => n.toFixed(2)).join(' ');
    });
}

// 调整SVG路径中所有Y坐标（用于多段拼接时对齐高度）
function shiftPathY(pathStr, dy) {
    return pathStr.replace(/([MLCQHVSmlcqhvs])([^MLCQHVSZmlcqhvsz]*)/g, (match, cmd, params) => {
        const isRelative = cmd === cmd.toLowerCase() && cmd !== cmd.toUpperCase();
        if (isRelative) return match; // 相对坐标不偏移
        const nums = params.trim().split(/[\s,]+/).filter(s => s.length > 0).map(Number);
        if (nums.length === 0) return match;
        const cmdUpper = cmd.toUpperCase();
        // H/V 只有一个坐标
        if (cmdUpper === 'H') return match; // 只有X，不偏移
        if (cmdUpper === 'V') {
            nums[0] += dy;
            return cmd + ' ' + nums.map(n => n.toFixed(2)).join(' ');
        }
        // M/L/C/Q：每对(x,y)中的y偏移
        for (let i = 1; i < nums.length; i += 2) {
            nums[i] += dy;
        }
        return cmd + ' ' + nums.map(n => n.toFixed(2)).join(' ');
    });
}

const dataSource = {}; // 'bundle'、'local' 或 'cdn'
async function fetchCharData(char) {
    if (cachedData[char]) return cachedData[char];
    // 1. 优先从bundle（内联数据，file://也可用）
    if (window.STROKE_DATA && window.STROKE_DATA[char]) {
        cachedData[char] = window.STROKE_DATA[char];
        dataSource[char] = 'bundle';
        return cachedData[char];
    }
    // 2. 尝试本地data目录（需HTTP服务器）
    const localUrl = `../data/${encodeURIComponent(char)}.json`;
    try {
        const localResp = await fetch(localUrl);
        if (localResp.ok) {
            const data = await localResp.json();
            cachedData[char] = data;
            dataSource[char] = 'local';
            return data;
        }
    } catch (_) {}
    // 3. 回退到CDN
    const url = `https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0.1/${encodeURIComponent(char)}.json`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`未找到"${char}"的笔画数据`);
    const data = await resp.json();
    cachedData[char] = data;
    dataSource[char] = 'cdn';
    return data;
}

function isCdnData(char) {
    return dataSource[char] === 'cdn' || dataSource[char] === undefined;
}

// 笔画来源映射：无CDN数据的CJK扩展字 → 从父字提取笔画
const STROKE_SOURCES = {
    '㝉': { parent: '伫', offset: 2, count: 4 },
    '𠃓': { parent: '汤', offset: 3, count: 3 },
    '𢀖': { parent: '经', offset: 3, count: 5 },
    '𠬤': { parent: '泽', offset: 3, count: 5 },
    '㣊': { parent: '修', offset: 3, count: 6 },
    '䏌': { parent: '佾', offset: 2, count: 6 },
    '𠬶': { parent: '浸', offset: 3 },
    '牜': { parent: '牧', offset: 0, count: 4 },
    '𧾷': { parent: '跑', offset: 0, count: 7 },
    '⻊': { parent: '跑', offset: 0, count: 7 },
    '': { parent: '卷', offset: 0, count: 6 },
    '': { parent: '跑', offset: 0, count: 7 },
    '龸': { parent: '学', offset: 0, count: 5 },
    '': { parent: '学', offset: 0, count: 5 },
    '龺': { parent: '朝', offset: 0, count: 8 },
    '𠦝': { parent: '朝', offset: 0, count: 8 },
    '': { parent: '朝', offset: 0, count: 8 },
    '蓺': { parent: '藝', offset: 0, count: 15 },
    '䂞': { parent: '橐', offset: 7 },
    '晞': { parts: [{ parent: '晒', offset: 0, count: 4 }, { parent: '稀', offset: 5, count: 7 }] },
    '焜': { parts: [{ parent: '烤', offset: 0, count: 4, yOffset: -30 }, { parent: '馄', offset: 3, count: 8, yOffset: 30 }] },
};

// 获取笔画数据并应用所有特殊字符替换（溦/叀/鶻/髕/嘜/鯗）
// 大框渲染和多字卡片共享此函数
async function getStrokeData(char) {
    let data;
    try {
        data = await fetchCharData(char);
    } catch (e) {
        // CDN/local无此字笔画数据，尝试从父字提取
        const src = STROKE_SOURCES[char];
        if (!src) throw e;
        const radStrokes = [];
        if (src.parts) {
            const allStrokes = [];
            let accumOffset = 0;
            for (const part of src.parts) {
                const parentData = await fetchCharData(part.parent);
                const start = part.offset;
                const end = part.count ? start + part.count : parentData.strokes.length;
                let partStrokes = parentData.strokes.slice(start, end);
                if (part.yOffset) partStrokes = partStrokes.map(s => shiftPathY(s, part.yOffset));
                const origRad = parentData.radStrokes || [];
                radStrokes.push(...origRad.filter(r => r >= start && r < end).map(r => r - start + accumOffset));
                allStrokes.push(...partStrokes);
                accumOffset += partStrokes.length;
            }
            console.log(`[Fallback] ${char} 多段拼接 ${allStrokes.length} 笔`);
            return { strokes: allStrokes, radStrokes };
        }
        const parentData = await fetchCharData(src.parent);
        const start = src.offset;
        const end = src.count ? start + src.count : parentData.strokes.length;
        const strokes = parentData.strokes.slice(start, end);
        const origRad = parentData.radStrokes || [];
        radStrokes.push(...origRad.filter(r => r >= start).map(r => r - start));
        console.log(`[Fallback] ${char} 从 ${src.parent}[${start}:${end}] 提取 ${strokes.length} 笔`);
        return { strokes, radStrokes };
    }
    let strokes = [...(data.strokes || [])];

    // 只有从CDN加载的数据才需运行时修正（本地已有修正JSON则跳过）
    if (isCdnData(char)) {
        if (char === '溦') {
            const weiData = await fetchCharData('微');
            strokes = [...strokes.slice(0, 3), ...weiData.strokes.slice(3)];
        }
        if (char === '叀') {
            const zhuanData = await fetchCharData('專');
            const xianData = await fetchCharData('县');
            strokes = [
                ...zhuanData.strokes.slice(0, 6).map(s => shiftPathY(s, -60)),
                ...xianData.strokes.slice(5).map(s => shiftPathY(s, 55))
            ];
        }
        if (char === '鶻') {
            const angData = await fetchCharData('骯');
            const yaData = await fetchCharData('鴨');
            strokes = [...angData.strokes.slice(0, 10), ...yaData.strokes.slice(5, 16)];
        }
        if (char === '髕') {
            const angData = await fetchCharData('骯');
            const pinData = await fetchCharData('嬪');
            strokes = [...angData.strokes.slice(0, 10), ...pinData.strokes.slice(3).map(s => shiftPathX(s, 60))];
        }
        if (char === '嘜') {
            const quData = await fetchCharData('麴');
            strokes = [...strokes.slice(0, 3), ...quData.strokes.slice(0, 11).map(s => shiftPathX(s, 200))];
        }
        if (char === '鯗') {
            const yangData = await fetchCharData('养');
            const topStrokes = yangData.strokes.slice(0, 7).map(s => shiftPathX(shiftPathY(s, 60), 15));
            const bottomStrokes = strokes.slice(8);
            strokes = [...topStrokes, ...bottomStrokes];
        }
        if (char === '鑽') {
            // 鑽CDN数据只有26笔（釒8+贊18），贊少1笔
            // 用讚字(言7+贊19)的贊部分替换，拼成正确的27笔(釒8+贊19)
            const zanData = await fetchCharData('讚');
            // 贊部分向右偏移，使其与釒部间距更合理
            const zanStrokes = zanData.strokes.slice(7).map(s => shiftPathX(s, 40));
            strokes = [...strokes.slice(0, 8), ...zanStrokes];
        }
        if (char === '鋩') {
            // 鋩右侧芒（笔画8-14）替换为铓右侧芒（笔画5-11）
            const mangData = await fetchCharData('铓');
            strokes = [...strokes.slice(0, 8), ...mangData.strokes.slice(5)];
        }
        if (char === '曠') {
            // 曠原CDN日字根只有3笔（有误），用旷的日字根（前4笔）替换曠的前3笔
            const kuangData = await fetchCharData('旷');
            strokes = [...kuangData.strokes.slice(0, 4), ...strokes.slice(3)];
        }
        if (char === '隉') {
            // 隉末3笔（工）笔划数据有误，用经字末3笔（工）替换，并左移对齐
            const jingData = await fetchCharData('经');
            const gongStrokes = jingData.strokes.slice(jingData.strokes.length - 3).map(s => shiftPathY(shiftPathX(s, -80), -50));
            strokes = [...strokes.slice(0, strokes.length - 3), ...gongStrokes];
        }
        if (char === '蠹') {
            // 蠹前7笔笔划数据有误，用囊的前7笔替换
            const nangData = await fetchCharData('囊');
            strokes = [...nangData.strokes.slice(0, 7), ...strokes.slice(7)];
        }
    }
    return { strokes, radStrokes: data.radStrokes || [] };
}

// ==================== 主渲染入口 ====================
async function loadAndRender(ch) {
    const char = ch || document.getElementById('char-input').value.trim()[0];
    if (!char) return;
    currentChar = char;

    // 显示加载
    const svg = document.getElementById('char-svg');
    svg.innerHTML = '<text x="512" y="512" text-anchor="middle" dominant-baseline="central" fill="#999" font-size="24">加载中...</text>';

    try {
        const strokeData = await getStrokeData(char);
        strokes = strokeData.strokes;
        radStrokes = strokeData.radStrokes;
        if (char === '酱') console.log('[DEBUG酱] data.strokes.length=', strokes.length);

        // 应用自定义笔画顺序（解决五笔与标准笔顺冲突）
        let customOrder = null;
        const wubi = WUBI[char];
        let customOrderSource = null; // 'char' 或 'component'
        
        // 先检查字符本身
        if (wubi && CUSTOM_STROKE_ORDER[char] && CUSTOM_STROKE_ORDER[char].condition(wubi)) {
            customOrder = CUSTOM_STROKE_ORDER[char];
            customOrderSource = 'char';
        }
        
        // 如果字符本身没有匹配，检查其部件是否有
        if (!customOrder && wubi && wubi.r) {
            // 检查字符的每个部件是否在 CUSTOM_STROKE_ORDER 中有定义
            // 如果有，则使用该部件的配置（复用该部件的笔画顺序调整逻辑）
            for (const root of wubi.r) {
                const rootWubi = WUBI[root];
                if (rootWubi && CUSTOM_STROKE_ORDER[root] && CUSTOM_STROKE_ORDER[root].condition(rootWubi) && CUSTOM_STROKE_ORDER[root].swapScope !== 'roots') {
                    customOrder = CUSTOM_STROKE_ORDER[root];
                    customOrderSource = 'component';
                    break;
                }
            }
            
            // 如果直接检查部件未匹配，尝试展开 roots 后再检查
            if (!customOrder) {
                let expandedRoots = [...wubi.r];
                const KEY_NAMES_SET = new Set(Object.values(KEY_NAMES));
                let changed = true;
                let iterations = 0;
                while (changed && iterations < 5) {
                    changed = false;
                    iterations++;
                    const next = [];
                    for (const root of expandedRoots) {
                        const wubiEntry = WUBI[root];
                        if (wubiEntry && wubiEntry.r && wubiEntry.r.length >= 2
                            && !KEY_NAMES_SET.has(root)
                            && !RADICAL_CHARS.has(root)
                            && !RADICAL_CHARS.has(root)
                            && root !== char) {
                            next.push(...wubiEntry.r);
                            changed = true;
                        } else {
                            next.push(root);
                        }
                    }
                    expandedRoots = next;
                }
                
                // 检查展开后的 roots 是否匹配任何 CUSTOM_STROKE_ORDER 条件
                // 注意：只匹配 swapScope:'roots' 的条目（部件级交换），
                // 不匹配整体 swapLast 条目（否则会误触发不含该字根的字符）
                for (const key in CUSTOM_STROKE_ORDER) {
                    const entry = CUSTOM_STROKE_ORDER[key];
                    if (entry.swapScope === 'roots' && entry.condition({ r: expandedRoots })) {
                        customOrder = entry;
                        customOrderSource = 'component';
                        break;
                    }
                }
            }
        }
        
        // 应用自定义笔画顺序
        if (customOrder) {
            const originalStrokes = [...strokes];
            const n = originalStrokes.length;
            
            if (customOrder.swapLast && n >= 2 && customOrder.swapScope !== 'roots') {
                // 交换最后两笔
                // swapScope:'roots' 的字不做整体交换，留给复合字逻辑按字根范围处理
                strokes = [...originalStrokes.slice(0, n-2), originalStrokes[n-1], originalStrokes[n-2]];
            } else if (customOrder.strokeRemap) {
                // 使用自定义重映射
                strokes = customOrder.strokeRemap.map(i => originalStrokes[i]);
            }
            
        }

        // ========== 通用递归展开字根 ==========
        // 如果某个字根本身是WUBI字典中的字（且有多个子字根），递归展开
        // 例如：洋=['氵','羊'] → ['氵','丷','龵']（羊→丷+龵）


        // 查找五笔信息
        if (wubi) {
            roots = wubi.r;

            // 配合 strokeRemap 同步更新 roots 数组顺序
            if (customOrder && customOrder.rootsRemap) {
                const originalRoots = roots;
                roots = customOrder.rootsRemap.map(idx => originalRoots[idx]);
            }
            
            // 调试：追踪 recursivelyExpandRoots 的入参
            console.log('[DEBUG' + char + '] 调用 recursivelyExpandRoots 前', { roots, currentChar, wubi_r: wubi && wubi.r });
            try {
                roots = recursivelyExpandRoots(roots, char);
            } catch(e) {
                console.error('[DEBUG] recursivelyExpandRoots 报错', { error: e.message, roots, currentChar });
                roots = [];
            }
        if (char === '酱') console.log('[DEBUG酱] 展开后roots=', JSON.stringify(roots));
            if (char === '迈') console.log('[DEBUG迈] 展开后roots=', JSON.stringify(roots), 'strokes.length=', strokes.length);
            if (char === '戊') console.log('[DEBUG戊] 展开后roots=', JSON.stringify(roots), 'strokes.length=', strokes.length);
            if (char === '成' || char === '戳') console.log('[DEBUG' + char + '] 展开后roots=', JSON.stringify(roots), 'strokes.length=', strokes.length, 'rootCode=', wubi.c);
            
            rootCode = wubi.c;
            
            // 自动判断补码（如果没有手动设置）
            // 使用拆分后的 roots 而不是原始 wubi.r
            if (!wubi.sup || wubi._supAuto) {
                const detected = autoDetectSupplement(char, roots);
                if (detected && detected.sup.length > 0) {
                    // 自动设置补码索引
                    wubi.sup = detected.sup;
                    wubi._supAuto = true;  // 标记为自动判断
                    // endStroke 不再自动设置，由 renderChar 中的倒查逻辑正确计算
                    // 原因：囗结构的字（如恩=囗+大+心）封口位置不固定，不能用硬编码
                } else if (wubi._supAuto) {
                    // 自动设置的sup与当前检测结果矛盾，清除
                    wubi.sup = [];
                    delete wubi._supAuto;
                }
            }
        } else {
            roots = [];
            rootCode = '—';
        }

        // 手动指定的 strokeRootMap（优先级最高，覆盖自动计算）
        if (customOrder && customOrder.strokeRootMap) {
            strokeRootMap = [...customOrder.strokeRootMap];
            strokeRootMapForDisplay = [...strokeRootMap];
            applyShaDianPieSwap();
        } else {
            initStrokeRootMap();
            applyShaDianPieSwap();
        }
        if (char === '酱') console.log('[DEBUG酱] strokes.length=', strokes.length, 'strokeRootMap=', JSON.stringify(strokeRootMap));
        if (char === '迈') console.log('[DEBUG迈] init后 strokeRootMap=', JSON.stringify(strokeRootMap));
        if (char === '戊') console.log('[DEBUG戊] init后 strokeRootMap=', JSON.stringify(strokeRootMap), 'roots=', JSON.stringify(roots));
        if (char === '成') console.log('[DEBUG成] init后 strokeRootMap=', JSON.stringify(strokeRootMap), 'roots=', JSON.stringify(roots));
        // ========== swapScope:'roots' 的单字整体末两笔交换 ==========
        // 此分支仅处理报户口字符（力），报户口字根覆盖全部笔画，
        // 物理交换后所有笔画仍同色，不影响颜色分配
        // 非连续字根已通过 autoDetectNonContinuous 统一处理，不走此路径
        if (customOrder && customOrder.swapLast && customOrder.swapScope === 'roots' && strokes.length >= 2) {
            const n = strokes.length;
            [strokes[n-2], strokes[n-1]] = [strokes[n-1], strokes[n-2]];
            if (NON_CONTINUOUS_CHARS.has(currentChar)) {
                [strokeRootMap[n-2], strokeRootMap[n-1]] = [strokeRootMap[n-1], strokeRootMap[n-2]];
                strokeRootMapForDisplay = [...strokeRootMap];
            } else if (strokeRootMap[n-2] === strokeRootMap[n-1]) {
                [strokeRootMap[n-2], strokeRootMap[n-1]] = [strokeRootMap[n-1], strokeRootMap[n-2]];
                strokeRootMapForDisplay = [...strokeRootMap];
            }
        }

        // ========== 复合字：基字部分末两笔交换 ==========
        // 如果当前字的某个字根本身是 CUSTOM_STROKE_ORDER 中的 swapLast 字，
        // 则只交换该字根部分的末两笔，不交换整体字的末两笔
        // 例：利=禾+刂，力有swapLast → 只交换力部分的末两笔
        if (wubi && wubi.r) {
            // 构建原始字根索引→展开后字根索引的映射
            // strokeRootMap 用的是展开后的字根索引，而循环用 wubi.r 的原始索引
            // 当前置字根被展开时（如歹→一+夕），后续字根的展开索引会偏移
            const _origToExpIndices = {};
            let _expIdxCounter = 0;
            const _KEY_NAMES_SET_SWAP = new Set(Object.values(KEY_NAMES));
            for (let _ori = 0; _ori < wubi.r.length; _ori++) {
                const _origRoot = wubi.r[_ori];
                const _origWubi = WUBI[_origRoot];
                if (_origWubi && _origWubi.r && _origWubi.r.length >= 2
                    && _origWubi.r[0] !== _origRoot
                    && !_KEY_NAMES_SET_SWAP.has(_origRoot)
                    && !RADICAL_CHARS.has(_origRoot)
                    && _origRoot !== currentChar) {
                    const _expanded = recursivelyExpandRoots([_origRoot], currentChar);
                    const _indices = [];
                    for (let _k = 0; _k < _expanded.length; _k++) {
                        _indices.push(_expIdxCounter++);
                    }
                    _origToExpIndices[_ori] = _indices;
                } else {
                    _origToExpIndices[_ori] = [_expIdxCounter++];
                }
            }

            let strokeOffset = 0;  // 当前笔画偏移量
            for (let ri = 0; ri < wubi.r.length; ri++) {
                const rootChar = wubi.r[ri];
                let rootStrokeCount = RADICAL_STROKES[rootChar] || 1;
                // 但字根可能进一步递归展开，需要算完整笔画数
                const rootWubi = WUBI[rootChar];
                if (rootWubi && rootWubi.r  && !RADICAL_CHARS.has(rootChar) && rootWubi.r[0] !== rootChar && !RADICAL_CHARS.has(rootChar) && rootChar !== currentChar) {
                    const supSet = new Set(rootWubi.sup || []);
                    // 用展开后的子字根算笔画数
                    const expandedSubRoots = rootWubi.r.filter((_, idx) => !supSet.has(idx));
                    rootStrokeCount = 0;
                    for (const sr of expandedSubRoots) {
                        rootStrokeCount += RADICAL_STROKES[sr] || 1;
                    }
                }
                // 检查该字根是否有 swapLast（只处理非当前字本身的字根，避免双重交换）
                const rootCustomOrder = CUSTOM_STROKE_ORDER[rootChar];
                let needsSwap = false;
                if (rootCustomOrder && rootCustomOrder.swapLast && rootWubi && rootCustomOrder.condition(rootWubi, currentChar) && rootChar !== currentChar) {
                    needsSwap = true;
                }
                if (needsSwap) {
                    // 交换该字根部分的末两笔
                    if (rootStrokeCount >= 2) {
                        const i1 = strokeOffset + rootStrokeCount - 2;
                        const i2 = strokeOffset + rootStrokeCount - 1;
                        if (rootChar === '戈') console.log('[DEBUG戈swap] currentChar=', currentChar, 'strokeOffset=', strokeOffset, 'rootStrokeCount=', rootStrokeCount, 'i1=', i1, 'i2=', i2, 'strokesLen=', strokes.length);
                        // 交换 strokes
                        if (currentChar === '迈') console.log('[DEBUG迈] rootChar=', rootChar, 'rootStrokeCount=', rootStrokeCount, 'i1=', i1, 'i2=', i2, 'strokeRootMap[i1,i2]=', strokeRootMap[i1], strokeRootMap[i2], 'strokes[i1,i2].id前=', strokes[i1]?.id, strokes[i2]?.id);
                        // 交换 strokes 和 strokeRootMap（使颜色映射与物理笔画顺序一致）
                        // 仅当两笔都属于当前字根时才交换（非连续字根会分散到其他位置）
                        // 注意：strokeRootMap 用的是展开后的字根索引，需用映射转换
                        const _expIdxForRi = _origToExpIndices[ri] || [ri];
                        if (_expIdxForRi.includes(strokeRootMap[i1]) && _expIdxForRi.includes(strokeRootMap[i2])) {
                            [strokes[i1], strokes[i2]] = [strokes[i2], strokes[i1]];
                            [strokeRootMap[i1], strokeRootMap[i2]] = [strokeRootMap[i2], strokeRootMap[i1]];
                            strokeRootMapForDisplay = [...strokeRootMap];
                        }
                        if (currentChar === '迈') console.log('[DEBUG迈] strokes[i1,i2].id后=', strokes[i1]?.id, strokes[i2]?.id);
                    }
                }
                // 字根被展开时，递归检查子字根是否有 swapLast
                // 例：励=['厉','力']，力有swapLast，在力部分交换
                // 注意：NON_CONTINUOUS_CHARS 中的字根（如或）已走非连续映射，不触发 swapLast
                if (rootWubi && rootWubi.r && !RADICAL_CHARS.has(rootChar) && rootWubi.r[0] !== rootChar && rootChar !== currentChar
                    && !NON_CONTINUOUS_CHARS.has(rootChar)) {
                    const supSet2 = new Set(rootWubi.sup || []);
                    const subRoots = rootWubi.r.filter((_, idx) => !supSet2.has(idx));
                    let subOffset = strokeOffset;
                    for (const sr of subRoots) {
                        // 如果 sr 本身是 WUBI 字典中的可拆分汉字，递归展开子字根算笔画
                        const srWubi = WUBI[sr];
                        let srStrokeCount = RADICAL_STROKES[sr];
                        if (srStrokeCount === undefined && srWubi && srWubi.r && !RADICAL_CHARS.has(sr)) {
                            srStrokeCount = 0;
                            for (const subSr of srWubi.r) {
                                srStrokeCount += RADICAL_STROKES[subSr] || 1;
                            }
                        }
                        srStrokeCount = srStrokeCount || 1;
                        const srCustom = CUSTOM_STROKE_ORDER[sr];
                        let srNeedsSwap = false;
                        // 检查CUSTOM_STROKE_ORDER配置
                        if (srCustom && srCustom.swapLast && srWubi && srCustom.condition(srWubi, currentChar) && sr !== currentChar) {
                            srNeedsSwap = true;
                        }
                        if (srNeedsSwap && srStrokeCount >= 2) {
                                const i1 = subOffset + srStrokeCount - 2;
                                const i2 = subOffset + srStrokeCount - 1;
                                // 交换strokes数组和strokeRootMap，使颜色映射与物理笔画顺序一致
                                [strokes[i1], strokes[i2]] = [strokes[i2], strokes[i1]];
                                [strokeRootMap[i1], strokeRootMap[i2]] = [strokeRootMap[i2], strokeRootMap[i1]];
                                strokeRootMapForDisplay = [...strokeRootMap];
                            }
                        }
                }
                strokeOffset += rootStrokeCount;
            }
        }

        // 渲染
        highlightStroke = -1;
        // 渲染之前才标记就绪，防止页面加载时的默认值触发跳转
        appReady = true;

        renderInfo();  // 先构建strokeColorMap
        
        // 检查字根着色区与五笔编码区的一致性
        checkRootCodeConsistency();
        
        renderSVG();   // 再渲染SVG
        renderAssignment();
        renderKeyboard();
        renderCharLibrary();

        // 记录当前目标字，等待用户验证
        clearFeedback();

    } catch (e) {
        svg.innerHTML = `<text x="512" y="512" text-anchor="middle" dominant-baseline="central" fill="#e74c3c" font-size="18">${e.message}</text>`;
        pendingChar = '';
        clearFeedback();
    }
}


// ==================== 递归展开字根（全局） ====================
function recursivelyExpandRoots(rootList, excludeChar) {
    // 防御：确保 rootList 是可迭代的数组
    if (!Array.isArray(rootList)) {
        console.error('[recursivelyExpandRoots] rootList 不是数组！', { rootList, excludeChar, currentChar });
        return [];
    }
    const KEY_NAMES_SET = new Set(Object.values(KEY_NAMES));
    let changed = true;
    let iterations = 0;
    while (changed && iterations < 5) {
        changed = false;
        iterations++;
        const next = [];
        for (const root of rootList) {
            const wubiEntry = WUBI[root];
            if (wubiEntry && wubiEntry.r && wubiEntry.r.length >= 2
                && wubiEntry.r[0] !== root
                && !KEY_NAMES_SET.has(root)
                && !RADICAL_CHARS.has(root)
                && root !== excludeChar) {
                // 不根据组件自身的sup过滤子字根
                // sup只对该字本身有意义（识别码），不影响其在其他字中的展开
                // 例如母=XGUI有sup=[3](识别码I)，但在海=氵+每中展开时⺀仍应保留
                next.push(...wubiEntry.r);
                changed = true;
            } else {
                next.push(root);
            }
        }
        rootList = next;
    }
    return rootList;
}

// ==================== 支持非连续字根递归嵌入的笔画映射 ====================
/**
 * 构建笔画→字根映射，支持递归处理非连续字根（如可、兆等）
 * 当字根列表中含有 NON_CONTINUOUS_CHARS 中的字符时，
 * 自动调用 autoDetectNonContinuous 生成正确的非连续映射，
 * 而非简单的连续分配。
 * @param {string[]} rootList - 字根列表（未展开，含非连续字根）
 * @param {number} startIndex - 起始索引（全局 expandedRoots 中的起始位置）
 * @returns {number[]} strokeRootMap 片段
 */
function buildEmbeddedMap(rootList, startIndex) {
    const map = [];
    let idx = startIndex;
    const KEY_NAMES_SET = new Set(Object.values(KEY_NAMES));

    // 递归处理单个字根：在每一层都检查NC字符（如母、酉），
    // 确保嵌套在复合字根中的NC子字根也能正确应用非连续映射。
    // 例如：繁=敏+糸，敏→每+攵，每→𠂉+母，母是NC字符需要夹心映射
    function processRoot(root) {
        // 检查是否为非连续字根（如可、兆、万、母等）
        // 止：单独成字时走非连续；作为复合字的一部分时按4笔连续分配
        if (root !== '止' && NON_CONTINUOUS_CHARS.has(root) && WUBI[root] && WUBI[root].r && WUBI[root].r.length >= 2) {
            let subRoots = recursivelyExpandRoots(WUBI[root].r);
            // 报户口字（如戈=r[0]===root）：过滤掉报户口自身，只取实际笔画子根
            if (subRoots.length > 0 && subRoots[0] === root) {
                subRoots = subRoots.slice(1);
            }
            const subN = subRoots.reduce((s, r) => s + (RADICAL_STROKES[r] || 1), 0);
            const subMap = autoDetectNonContinuous(root, subRoots, subN, (WUBI[root].sup || []), idx, false);
            if (subMap && subMap.length === subN) {
                for (const v of subMap) map.push(v);
                idx += subRoots.length;  // 增加字根数（非笔画数），确保后续字根索引正确
                return;
            }
        }
        // 检查是否为可展开的复合字根（一层展开后递归处理）
        const wubiEntry = WUBI[root];
        if (wubiEntry && wubiEntry.r && wubiEntry.r.length >= 2
            && wubiEntry.r[0] !== root
            && !KEY_NAMES_SET.has(root)
            && !RADICAL_CHARS.has(root)) {
            // 复合字根：展开一层，对每个子字根递归处理
            let oneLevel = wubiEntry.r;
            // 报户口字根：过滤掉自身
            if (oneLevel.length > 1 && oneLevel[0] === root) {
                oneLevel = oneLevel.slice(1);
            }
            for (const subRoot of oneLevel) {
                processRoot(subRoot);
            }
            return;
        }
        // 简单字根：按笔画数连续分配
        const sc = RADICAL_STROKES[root] || 1;
        for (let j = 0; j < sc; j++) map.push(idx);
        idx++;
    }

    for (const root of rootList) {
        processRoot(root);
    }
    return map;
}

// ==================== ㇂+丶+丿 末两笔交换（统一处理）====================
// 当展开后的 roots 末三字根为 ㇂+丶+丿 时，交换末两个字根的笔画映射
// 适用于所有路径：成、戊、臧、茂、藏、篾 等
// 排除成字字根（戈、戋、戊等），它们由 CUSTOM_STROKE_ORDER 或 autoDetectNonContinuous 单独处理
function applyShaDianPieSwap() {
    if (!strokeRootMap || strokeRootMap.length === 0) return;
    if (!roots || roots.length < 2) return;
    // 排除成字字根：戈、戋、戊 有独立的交换逻辑（CUSTOM_STROKE_ORDER 或 autoDetectNonContinuous）
    if (RADICAL_CHARS.has(currentChar)) return;

    // 情况1：roots末三位是 ㇂+丶+丿（字根已展开的情况）
    const last3 = roots.slice(-3);
    if (last3.length >= 3 && last3[0] === '㇂' && last3[1] === '丶' && last3[2] === '丿') {
        const lastRootIdx = roots.length - 1;
        const secondLastRootIdx = roots.length - 2;
        for (let si = 0; si < strokeRootMap.length; si++) {
            if (strokeRootMap[si] === lastRootIdx) {
                strokeRootMap[si] = secondLastRootIdx;
            } else if (strokeRootMap[si] === secondLastRootIdx) {
                strokeRootMap[si] = lastRootIdx;
            }
        }
        strokeRootMapForDisplay = [...strokeRootMap];
        return;
    }

}

// ==================== 初始化笔画→字根映射 ====================
// 判断base+suffix复合字是否为左右结构（基字在左）
// 通过DOM获取笔画实际渲染边界框，比较基字与后缀的X质心
function isLeftRightCompound(strokes, baseStrokeCount) {
    // 先查已知左右结构字（來+貝=賚是左右，來+夂=麥是上下）
    const LR_SET = new Set(['賚']);
    if (LR_SET.has(currentChar)) return true;
    const TB_SET = new Set(['麥']);
    if (TB_SET.has(currentChar)) return false;
    // 后备：通过DOM的getBBox比较基字与后缀的X质心
    const pathElems = document.querySelectorAll('#char-svg path');
    if (pathElems.length < strokes.length) return false;
    let baseXSum = 0, baseXCount = 0, suffixXSum = 0, suffixXCount = 0;
    for (let i = 0; i < pathElems.length && i < strokes.length; i++) {
        const bb = pathElems[i].getBBox();
        const cx = bb.x + bb.width / 2;
        if (i < baseStrokeCount) {
            baseXSum += cx * bb.width * bb.height;
            baseXCount += bb.width * bb.height;
        } else {
            suffixXSum += cx * bb.width * bb.height;
            suffixXCount += bb.width * bb.height;
        }
    }
    if (baseXCount === 0 || suffixXCount === 0) return false;
    const baseCentroidX = baseXSum / baseXCount;
    const suffixCentroidX = suffixXSum / suffixXCount;
    // 后缀X质心明显在基字右侧 → 左右结构
    return suffixCentroidX > baseCentroidX + 100;
}

function initStrokeRootMap() {
    
    // 防御：确保 roots 是数组
    if (!Array.isArray(roots)) {
        console.warn('[initStrokeRootMap] roots 不是数组，已重置为空数组。currentChar=' + currentChar);
        roots = [];
    }
    // 防御：确保 currentChar 有值
    if (!currentChar) {
        strokeRootMap = [];
        strokeRootMapForDisplay = [];
        return;
    }

    const n = strokes.length;
    const rootCount = roots.length;
    const wubiData = WUBI[currentChar];
    const supIndices = wubiData?.sup || [];

    if (rootCount === 0) {
        strokeRootMap = strokes.map((_, i) => i % ROOT_COLORS.length);
        strokeRootMapForDisplay = [...strokeRootMap];
        return;
    }

    if (rootCount === 1) {
        strokeRootMap = strokes.map(() => 0);
        strokeRootMapForDisplay = [...strokeRootMap];
        return;
    }

    // ========== 非连续白名单提前处理 ==========
    // 如啬=土+丷+回、丧=土+丷+艮下，虽然部分字根有包围/复合结构，
    // 但整体笔顺是非连续的，必须在复合检测之前处理，避免被囗检测或prefix+base拦截
    // 注：十+戈仅在字首（索引0或1）相邻时才视为包围结构（哉/栽/截/戴）；
    // 戰=口+口+曰+十+戈 中十在索引3、戈在索引4，属字尾正常顺序，不应触发非连续映射
    // 戈非末字根模式（如職=耳+立头+戈+日）：戈在中间位置（非首字根）包裹后续字根，也需走非连续映射
    // 注：仅在戈不是首字根时触发，避免划(戈+刂)等左右结构误判
    
    // ===== 韱系列字专用处理 =====
    // 韱=从+戈+韭，戈包裹韭（末3笔是戈，中间是韭的笔画）
    // 含韱作为基字的复合字（懺/殲/籤/纖/讖/谶）也需同样的非连续映射
    // 条件：展开后的roots含 三+〢+三（韭的展开特征）且含戈
    const _xExpandedRoots = recursivelyExpandRoots(roots);
    if (_xExpandedRoots.includes('戈') && _xExpandedRoots.some((_, i) => i + 2 < _xExpandedRoots.length && _xExpandedRoots[i] === '三' && _xExpandedRoots[i+1] === '〢' && _xExpandedRoots[i+2] === '三')) {
        // 直接复用韱字的autoDetectNonContinuous，再按前缀偏移
        const _zanExpanded = recursivelyExpandRoots(['韱']);
        const _zanN = _zanExpanded.reduce((s, r) => s + (RADICAL_STROKES[r] || 1), 0);
        const _zanMap = autoDetectNonContinuous('韱', _zanExpanded, _zanN, [], 0);
        if (_zanMap && _zanMap.length === _zanN && !_zanMap.includes(-1)) {
            // 前缀处理：找到韱部分（从+戈+韭）在原始roots中的起始位置
            const _origRoots = WUBI[currentChar]?.r || roots;
            const _congIdx = _origRoots.indexOf('从');
            if (_congIdx >= 0) {
                // 前缀roots = 从之前的所有原始roots
                const _prefixRoots = _origRoots.slice(0, _congIdx);
                const _prefixExpanded = recursivelyExpandRoots(_prefixRoots);
                // 前缀srm：用buildEmbeddedMap正确分配每个字根的笔画
                const _prefixMap = buildEmbeddedMap(_prefixExpanded, 0);
                // 偏移 = 前缀使用的最大字根索引 + 1（韱本身无前缀，offset=0）
                const _offset = _prefixMap.length > 0 ? (Math.max(..._prefixMap) + 1) : 0;
                const fullMap = [];
                for (const v of _prefixMap) fullMap.push(v);
                // 韱部分：复用韱的映射，加上前缀偏移
                for (let i = 0; i < _zanMap.length; i++) {
                    fullMap.push(_zanMap[i] + _offset);
                }
                if (fullMap.length === n) {
                    strokeRootMap = fullMap;
                    strokeRootMapForDisplay = [...strokeRootMap];
                    return;
                }
            }
        }
    }
    
    if (NON_CONTINUOUS_CHARS.has(currentChar) ||
        roots.some((_, i) => i <= 1 && i + 1 < roots.length && roots[i] === '十' && roots[i+1] === '戈') ||
        (roots.includes('戈') && roots.indexOf('戈') >= 1 && roots.indexOf('戈') < roots.length - 1 &&
         !roots.some((_, i) => i <= 1 && roots[i] === '十' && roots[i+1] === '戈'))) {
        const _expandedRootsNC = recursivelyExpandRoots(roots);
        const supIndices = WUBI[currentChar]?.sup || [];
        const nonConMap = autoDetectNonContinuous(currentChar, _expandedRootsNC, n, supIndices, 0);
        if (nonConMap && nonConMap.length === n && !nonConMap.includes(-1)) {
            strokeRootMap = [...nonConMap];
            strokeRootMapForDisplay = [...strokeRootMap];
            return;
        }
    }




    // ========== 囗结构检测 ==========
    // 如果原始字根中包含NC字符（如嗇），跳过囗检测，走复合字检测路径
    // 因为NC字符内部的囗应由NC处理逻辑负责，不应被囗检测拦截
    const _origRootsForWeiCheck = wubiData?.r || [];
    // 只有当NC字根内部展开含囗时才跳过囗检测（如嗇=土+丷+回，回含囗）
    // 如果囗是独立的原始字根（如圍=囗+韋），NC字根在囗内部，不应跳过
    const _hasNCSubRoot = _origRootsForWeiCheck.some(r => {
        if (!NON_CONTINUOUS_CHARS.has(r) || r === currentChar) return false;
        const _expR = recursivelyExpandRoots([r], currentChar);
        return _expR.includes('囗');
    });
    // 如果是囗结构字，跳过复合字检测，使用专门的处理函数
    // 注意：传入已展开的 roots（而非 wubiData.r），确保笔画索引与最终字根一致
    // 排除囗字本身（囗是成字字根，应走报户口路径，不是囗包围结构）
    const hasWeiRaw = wubiData?.r?.includes('囗');
    const hasWeiExpanded = roots?.includes('囗');
    const hasWeiBounds = wubiData?.weiStart !== undefined && wubiData?.weiEnd !== undefined;
    // 原始r含囗：直接走 detectWeiStructureSimple
    // 展开后含囗且手动标注了 weiStart/weiEnd：也走（如恩=因+心）
    // 展开后含囗但未标注边界：尝试自动检测含囗结构的原始字根，自动计算边界
    let effectiveWubiData = wubiData;
    if (!hasWeiRaw && hasWeiExpanded && !hasWeiBounds) {
        const origRoots = wubiData?.r || [];
        let prefixSc = 0;
        for (const origRoot of origRoots) {
            const origEntry = WUBI[origRoot];
            // 尝试继承手动标注的 weiStart/weiEnd
            if (origEntry && origEntry.weiStart !== undefined && origEntry.weiEnd !== undefined) {
                effectiveWubiData = Object.assign({}, wubiData, {
                    weiStart: prefixSc + origEntry.weiStart,
                    weiEnd: prefixSc + origEntry.weiEnd
                });
                break;
            }
            // 自动检测：展开该字根，检查是否包含囗
            if (origEntry && origEntry.r) {
                const expanded = recursivelyExpandRoots(origEntry.r, currentChar);
                if (expanded.includes('囗')) {
                    const weiIdx = expanded.indexOf('囗');
                    // 囗之前在字根内部的笔画偏移
                    let insideOffset = 0;
                    for (let j = 0; j < weiIdx; j++) {
                        insideOffset += RADICAL_STROKES[expanded[j]] || 1;
                    }
                    // 囗内部内容（默认到该字根结束；遇到“囗+㐅+外部后续字根”时，只把㐅判为框内）
                    let weiInnerEnd = expanded.length;
                    const weiTailAfterCross = expanded.slice(weiIdx + 2);
                    const crossOnlyInWei =
                        expanded[weiIdx + 1] === '㐅' &&
                        ((weiTailAfterCross[0] === '八' && weiTailAfterCross[1] === '夂') ||
                         (weiTailAfterCross[0] === '𠄌' && weiTailAfterCross[1] === '⺀'));
                    // 昷结构：囗+人+皿，囗只包围人，皿在框外
                    const renMinInWei =
                        expanded[weiIdx + 1] === '人' && expanded[weiIdx + 2] === '皿';
                    // 恩/因结构：囗+大+心，囗只包围大，心在框外
                    const daXinInWei =
                        expanded[weiIdx + 1] === '大' && expanded[weiIdx + 2] === '心';
                    // 囱结构：囗+𠚤+心，囗只包围𠚤，心在框外（悤=囱+心，及含悤的复合字如傯熜璁總聰蔥骢）
                    const congXinInWei =
                        expanded[weiIdx + 1] === '𠚤' && expanded[weiIdx + 2] === '心';
                    if (crossOnlyInWei || renMinInWei || daXinInWei || congXinInWei) {
                        weiInnerEnd = weiIdx + 2;
                    }
                    let insideContent = 0;
                    for (let j = weiIdx + 1; j < weiInnerEnd; j++) {
                        insideContent += RADICAL_STROKES[expanded[j]] || 1;
                    }
                    effectiveWubiData = Object.assign({}, wubiData, {
                        weiStart: prefixSc + insideOffset,
                        weiEnd: prefixSc + insideOffset + 2 + insideContent
                    });
                    break;
                }
            }
            // 修正：如果 origRoot 不在 RADICAL_STROKES 中但有展开子字根，从子字根累加
            let origRootSc = RADICAL_STROKES[origRoot];
            if (origRootSc === undefined && origEntry && origEntry.r && origEntry.r.length >= 2) {
                origRootSc = 0;
                for (const subRoot of origEntry.r) {
                    origRootSc += RADICAL_STROKES[subRoot] || 1;
                }
            }
            prefixSc += (origRootSc || 1);
        }
    }
    const hasEffectiveBounds = effectiveWubiData?.weiStart !== undefined && effectiveWubiData?.weiEnd !== undefined;
    const shouldDetectWei = (hasWeiRaw || (hasWeiExpanded && hasEffectiveBounds)) && !_hasNCSubRoot;
    if (shouldDetectWei && currentChar !== '囗') {
        const weiMap = detectWeiStructureSimple(currentChar, effectiveWubiData, n, roots);
        if (weiMap && weiMap.length) {
            strokeRootMap = [...weiMap];
            strokeRootMapForDisplay = [...strokeRootMap];
            return;
        }
    }
    
    // 自动扫描原始roots，找到本身是WUBI字的root作为基字
    // 前面的root作为前缀，后面的作为后缀
    // 注意：基字+基字模式（如题=是+页）不走此逻辑，由后面的通用精确推断处理
    // 注意：含匚的字不走复合字拆分，匚是非连续外框，必须走 autoDetectNonContinuous 的 hasKuang 分支
    const originalRoots = wubiData?.r || [];
    const _expandedForKuang = recursivelyExpandRoots(originalRoots);
    const _hasKuangInOriginal = _expandedForKuang.includes('匚');
    let compInfo = null;
    if (!_hasKuangInOriginal) {
    for (let i = 0; i < originalRoots.length; i++) {
        const root = originalRoots[i];
        const wubiEntry = WUBI[root];
        if (wubiEntry && wubiEntry.r && root !== currentChar) {
