            // roots 中没有直接匹配的字根，但可能是展开后的子字根
            // 从 roots 中找出哪些字根是由 NON_CONTINUOUS_CHARS 字根展开而来的
            // 方法：对每个 roots[ri]，检查 WUBI 中是否有某个白名单字根的 r 数组包含它
            const coveredStarts = new Set(); // 避免对同一字根重复处理
            for (let ri = 0; ri < rootCount; ri++) {
                if (coveredStarts.has(ri)) continue;
                for (const ncChar of NON_CONTINUOUS_CHARS) {
                    const ncWubi = WUBI[ncChar];
                    if (ncWubi && ncWubi.r && ncWubi.r.includes(roots[ri])) {
                        // roots[ri] 是白名单字根 ncChar 展开的子字根之一
                        // 找 ncChar 在 ncWubi.r 中的位置
                        const ncRoots = [...ncWubi.r];
                        const ncRootIndex = ncRoots.indexOf(roots[ri]);
                        if (ncRootIndex < 0) continue;

                        // 计算 ncChar 所有子字根在 roots 中的笔画范围
                        // 先收集 ncChar 所有子字根在 roots 中的索引
                        const ncChildRoots = [];
                        for (let ci = 0; ci < rootCount; ci++) {
                            if (ncRoots.includes(roots[ci])) {
                                ncChildRoots.push(ci);
                                coveredStarts.add(ci);
                            }
                        }

                        // 找出这些子字根在 strokeRootMap 中的笔画范围
                        let minStroke = n, maxStroke = -1;
                        for (const ci of ncChildRoots) {
                            const offset = ci + strokeOffset;
                            for (let si = 0; si < n; si++) {
                                if (strokeRootMap[si] === offset) {
                                    if (si < minStroke) minStroke = si;
                                    if (si > maxStroke) maxStroke = si;
                                }
                            }
                        }
                        const actualCount = maxStroke - minStroke + 1;
                        if (actualCount >= 2) {
                            const ncMap = autoDetectNonContinuous(ncChar, ncRoots, actualCount, ncWubi.sup || [], 0, false);
                            if (ncMap && ncMap.length === actualCount) {
                                // ncMap[i] 映射回 ncRoots 中的字根，再找到该字根在当前 roots 中的索引
                                for (let i = 0; i < actualCount; i++) {
                                    const mappedRoot = ncRoots[ncMap[i]]; // 如 '丁' 或 '口'
                                    // 在当前 roots 中找 mappedRoot 的索引
                                    let targetRootIdx = -1;
                                    for (const ci of ncChildRoots) {
                                        if (roots[ci] === mappedRoot) {
                                            targetRootIdx = ci;
                                            break;
                                        }
                                    }
                                    if (targetRootIdx >= 0) {
                                        strokeRootMap[minStroke + i] = targetRootIdx + strokeOffset;
                                        strokeRootMapForDisplay[minStroke + i] = targetRootIdx + strokeOffset;
                                    }
                                }
                            }
                        }
                        break;
                    }
                }
            }
        } else {
            // 非连续字根在 roots 中未展开
            // 遍历所有 NON_CONTINUOUS_CHARS 字根，逐个修正
            for (let idx = 0; idx < rootCount; idx++) {
                if (!NON_CONTINUOUS_CHARS.has(roots[idx])) continue;
                const ncRootIdx = idx;
                const offset = ncRootIdx + strokeOffset;
                let startStroke = -1, endStroke = -1;
                for (let si = 0; si < n; si++) {
                    if (strokeRootMap[si] === offset) {
                        if (startStroke === -1) startStroke = si;
                        endStroke = si;
                    }
                }
                if (startStroke >= 0 && endStroke >= 0) {
                    const ncCount = endStroke - startStroke + 1;
                    if (ncCount >= 2) {
                        const ncWubi = WUBI[roots[ncRootIdx]];
                        if (ncWubi && ncWubi.r && ncWubi.r.length >= 2) {
                            const ncRoots = [...ncWubi.r];
                            const ncMap = autoDetectNonContinuous(currentChar, ncRoots, ncCount, ncWubi.sup || [], 0);
                            if (ncMap && ncMap.length === ncCount) {
                                for (let i = 0; i < ncCount; i++) {
                                    const actualIdx = ncRootIdx + ncMap[i];
                                    if (actualIdx < rootCount) {
                                        strokeRootMap[startStroke + i] = actualIdx + strokeOffset;
                                        strokeRootMapForDisplay[startStroke + i] = actualIdx + strokeOffset;
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
    }


    // 部分已知：两种策略都未能精确匹配，尝试用已知字根推断未知字根
    for (const strategy of strategies) {
        const counts = [];
        let totalKnown = 0;
        const unknownRoots = [];

        for (let i = 0; i < rootCount; i++) {
            if (roots[i] === '') { counts.push(0); continue; }
            if (supIndices.includes(i) && !strategy.includeSup) { counts.push(0); continue; }
            // 查标准表
            let count = -1;
            if (RADICAL_STROKES[roots[i]] !== undefined) {
                count = RADICAL_STROKES[roots[i]];
            }
            if (count >= 0) {
                counts.push(count);
                totalKnown += count;
            } else {
                counts.push(-1);
                unknownRoots.push(i);
            }
        }

        if (totalKnown > 0 && totalKnown < n && unknownRoots.length > 0) {
            const unknownTotal = n - totalKnown;
            const perUnknown = Math.floor(unknownTotal / unknownRoots.length);
            const extra = unknownTotal % unknownRoots.length;
            let extraIdx = 0;

            const finalCounts = counts.map(c => {
                if (c === -1) {
                    const val = perUnknown + (extraIdx < extra ? 1 : 0);
                    extraIdx++;
                    return val;
                }
                return c;
            });

            const totalFinal = finalCounts.reduce((s, c) => s + c, 0);
            if (totalFinal === n) {
                strokeRootMap = buildMapFromCounts(finalCounts);
                strokeRootMapForDisplay = [...strokeRootMap];
                return;
            }
        }
    }


}  // initStrokeRootMap 结束


// ==================== SVG 渲染 ====================
function renderSVG() {
    const svg = document.getElementById('char-svg');
    svg.innerHTML = '';

    // 白色背景
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('width', '1024');
    bg.setAttribute('height', '1024');
    bg.setAttribute('fill', '#fff');
    svg.appendChild(bg);

    // 创建变换组（hanzi-writer-data的y轴向上，需要翻转并居中）
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', 'translate(0, 900) scale(1, -1)');
    svg.appendChild(g);

    // 补码判断（仅用于小框着色，大框用字根颜色）
    const wubiDataForColor = WUBI[currentChar];
    const supIndicesForColor = wubiDataForColor?.sup || [];
    const endStrokeIdx = wubiDataForColor?.endStroke;
    const hasSup = supIndicesForColor.length > 0;

    // 绘制笔画
    strokes.forEach((d, i) => {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);

        const isHighlighted = highlightStroke === -1 || highlightStroke === i;
        // 使用统一颜色函数，确保与编码区、字根区一致
        const color = getStrokeColor(i);
        const isNonRoot = strokeRootMap[i] === undefined || strokeRootMap[i] < 0;

        if (isHighlighted) {
            path.setAttribute('fill', color);
            path.setAttribute('stroke', isNonRoot ? '#444' : '#333');
            path.setAttribute('stroke-width', highlightStroke === -1 ? (isNonRoot ? '0.3' : '0.5') : '1.5');
        } else {
            path.setAttribute('fill', isNonRoot ? '#777' : '#e8e8e8');
            path.setAttribute('stroke', isNonRoot ? '#666' : '#ccc');
            path.setAttribute('stroke-width', '0.3');
        }

        path.style.cursor = 'pointer';
        path.style.transition = 'fill 0.25s ease';
        path.dataset.strokeIndex = i;

        // 点击笔画 → 弹出字根选择
        path.addEventListener('click', (e) => {
            e.stopPropagation();
            showStrokeSelector(i, e);
        });

        g.appendChild(path);
    });

    // ========== 补码小框渲染 ==========
    const miniBox = document.getElementById('sup-mini-box');
    const miniSvg = document.getElementById('sup-mini-svg');
    
    // 自动判断：有sup就显示补码小框
    // 补码规则：有囗则取囗内部首的最后一笔，无囗则取整个字的最后一笔
    let actualEndStroke = strokes.length - 1;  // 默认取最后一笔
    if (endStrokeIdx !== undefined) {
        actualEndStroke = endStrokeIdx;
    } else if (wubiDataForColor?.r && Array.isArray(wubiDataForColor.r)) {
        // ========== 囗/匚 包围结构特殊处理 ==========
        const charRoots = wubiDataForColor.r;
        
        // 【囗】结构：取非囗字根的最后一笔
        if (charRoots.includes('囗')) {
            const weiIdx = charRoots.indexOf('囗');
            let lastNonWeiStroke = -1;
            for (let i = strokes.length - 1; i >= 0; i--) {
                const rootIdx = strokeRootMap[i];
                if (rootIdx !== undefined && rootIdx !== weiIdx && rootIdx >= 0) {
                    lastNonWeiStroke = i;
                    break;
                }
            }
            if (lastNonWeiStroke >= 0) actualEndStroke = lastNonWeiStroke;
        }
        // 【匚】外框包围结构：取内部字根的最后一笔
        // 注意：必须用展开后的全局 roots（包含匚），不能用 wubiDataForColor.r（原始的可能是['氵','区']）
        // 规则：含【匚】的字 → 补码/识别码笔画取匚内字根的末笔
        // 如【区】AQI（3码+识别码I，取乂末笔丶）
        // 如【沤】IAQY（4码，第4位Y=识别码，取乂末笔丶）
        if (hasSup && (roots||[]).includes('匚')) {
            const fuIdx = roots.indexOf('匚');  // 用全局展开后的 roots
            // 取非匚字根的最后一笔（即内部字根的末笔）
            let lastInnerStroke = -1;
            for (let i = strokes.length - 1; i >= 0; i--) {
                const rootIdx = strokeRootMap[i];
                if (rootIdx !== undefined && rootIdx !== fuIdx && rootIdx >= 0) {
                    lastInnerStroke = i;
                    break;
                }
            }
            if (lastInnerStroke >= 0) actualEndStroke = lastInnerStroke;
        }

        }

    // ========== 基于 swap 后 strokeRootMap 定位末笔 ==========
    // ========== 辶/廴 半包围结构补码小框高亮定位 ==========
    // 规则：含辶/廴的字，补码高亮应指向被包围部分的末笔
    // 如【过】FPI → 高亮寸的末笔；【辽】BPK → 高亮了(竖)的末笔
    // 逻辑：在 strokeRootMap 中找最后一个不属于辶/廴字根的笔画
    const walkRoots = (roots||[]);
    const walkIdx = walkRoots.indexOf('辶') !== -1 ? walkRoots.indexOf('辶') : (walkRoots.indexOf('廴') !== -1 ? walkRoots.indexOf('廴') : -1);
    if (walkIdx !== -1 && strokeRootMap && strokeRootMap.length > 0) {
        let innerLast = -1;
        for (let i = strokes.length - 1; i >= 0; i--) {
            const rootIdx = strokeRootMap[i];
            if (rootIdx !== undefined && rootIdx !== walkIdx && rootIdx >= 0) {
                innerLast = i;
                break;
            }
        }
        if (innerLast >= 0) actualEndStroke = innerLast;
    }

    // ========== swap 后补码定位修正 ==========
    // 当末字根有 swapLast 时，末两笔被交换，hardcode 取最后一笔会指错
    // 用 strokeRootMap 找到最后一个属于末字根的笔画
    // 例外：末字根为辶/廴时，补码应指向被包围部分末笔（已由上方逻辑处理），此处不覆盖
    if (strokeRootMap && strokeRootMap.length > 0 && (roots||[]).length > 0 && hasSup) {
        const lastRootIdx = roots.length - 1;
        const lastRootChar = roots[lastRootIdx];
        if (lastRootChar !== '辶' && lastRootChar !== '廴') {
            // 找到末字根的所有笔画
            let lastRootStrokes = [];
            for (let i = 0; i < strokes.length; i++) {
                if (strokeRootMap[i] === lastRootIdx) {
                    lastRootStrokes.push(i);
                }
            }
            
            // ===== 使用原始WUBI末字根做末两笔交换检测 =====
            // 展开后的roots中戈被拆成了一㇂丶丿等多个基本字根，
            // 丢了原始字根信息。用wubiData.r取原始末字根做检测
            const originalRoots = wubiDataForColor?.r || [];
            const lastOriginalRoot = originalRoots.length > 0
                ? originalRoots[originalRoots.length - 1] : lastRootChar;
            const checkWubi = WUBI[lastOriginalRoot];
            const hasGeHouPattern = checkWubi && checkWubi.r && checkWubi.r.length >= 3
                && (checkWubi.r.includes('㇂') || checkWubi.r.includes('乚'))
                && checkWubi.r[checkWubi.r.length - 2] === '丶'
                && checkWubi.r[checkWubi.r.length - 1] === '丿'
                && currentChar !== '线';
            
            if (hasGeHouPattern) {
                // 戈/戋类字根：末两笔为丶+丿，需确定丿的位置作为补码高亮
                // 不能用_getStrokeTypeFromPath判断，因为hanzi-writer数据中所有路径都以Z结尾
                // 改为检查swapLast是否已应用：swap后丿在末位(i2)，未swap则丿在倒数第二位(i1)
                if (lastRootStrokes.length >= 2) {
                    const i1 = lastRootStrokes[lastRootStrokes.length - 2]; // 倒数第二笔
                    const i2 = lastRootStrokes[lastRootStrokes.length - 1]; // 最后一笔
                    const lastRootCustom = CUSTOM_STROKE_ORDER[lastOriginalRoot];
                    const swapApplied = lastRootCustom && lastRootCustom.swapLast
                        && lastRootCustom.swapScope === 'roots'
                        && WUBI[lastOriginalRoot] && lastRootCustom.condition(WUBI[lastOriginalRoot], currentChar);
                    if (swapApplied) {
                        actualEndStroke = i2; // swap后丿在末位
                    } else {
                        actualEndStroke = i1; // 未swap，丿在倒数第二位（标准笔顺）
                    }
                } else {
                    actualEndStroke = strokes.length >= 2 ? strokes.length - 2 : strokes.length - 1;
                }
                console.log(`[补码DEBUG ${currentChar}] hasGeHouPattern=true, lastOriginalRoot=${lastOriginalRoot}, actualEndStroke=${actualEndStroke}, lastRootStrokes=${JSON.stringify(lastRootStrokes)}`);
                console.log(`[补码DEBUG2 ${currentChar}] roots=${JSON.stringify(roots)}, lastRootIdx=${lastRootIdx}, lastRootChar=${lastRootChar}, strokeRootMap=${JSON.stringify(strokeRootMap)}`);
            } else if (lastRootStrokes.length >= 2) {
                // 其他末字根取最后一笔
                actualEndStroke = lastRootStrokes[lastRootStrokes.length - 1];
            } else if (lastRootStrokes.length === 1) {
                actualEndStroke = lastRootStrokes[0];
            }
        }
    }

    // 调试输出：查看 actualEndStroke 的值
    console.log(`[补码小框DEBUG ${currentChar}] actualEndStroke=${actualEndStroke}, totalStrokes=${strokes.length}, hasSup=${hasSup}`);
    
    // 详细调试：输出末字根信息和末笔模式检测结果
    if (hasSup && strokeRootMap && strokeRootMap.length > 0 && (roots||[]).length > 0) {
        const _lrIdx = roots.length - 1;
        const _lrChar = roots[_lrIdx];
        const _lrStrokes = [];
        for (let _si = 0; _si < strokes.length; _si++) {
            if (strokeRootMap[_si] === _lrIdx) _lrStrokes.push(_si);
        }
        const _ow = WUBI[_lrChar];
        const _hasGHP = _ow && _ow.r && _ow.r.length >= 3
            && (_ow.r.includes('㇂') || _ow.r.includes('乚'))
            && _ow.r[_ow.r.length - 2] === '丶'
            && _ow.r[_ow.r.length - 1] === '丿';
        console.log(`[补码FULL ${currentChar}] roots=${JSON.stringify(roots)}, lastRootIdx=${_lrIdx}, lastRootChar="${_lrChar}", lastRootStrokes=${JSON.stringify(_lrStrokes)}, hasGeHouPattern=${_hasGHP}, strokesLen=${strokes.length}, strokeRootMap=${JSON.stringify(strokeRootMap)}`);
    }
    
    if (hasSup) {
        miniBox.style.display = 'block';
        miniSvg.innerHTML = '';
        
        // 白色背景
        const miniBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        miniBg.setAttribute('width', '1024');
        miniBg.setAttribute('height', '1024');
        miniBg.setAttribute('fill', '#fff');
        miniSvg.appendChild(miniBg);
        
        // 变换组
        const miniG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        miniG.setAttribute('transform', 'translate(0, 900) scale(1, -1)');
        miniSvg.appendChild(miniG);
        
        // 绘制笔画：末笔(补码)高亮，其他灰色
        strokes.forEach((d, i) => {
            if (currentChar === '战') console.log(`[战小框] stroke[${i}] i===actualEndStroke(${actualEndStroke})? ${i===actualEndStroke} d=${typeof d==='string' ? d.substring(0,50) : typeof d}`);
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', d);
            
            if (i === actualEndStroke) {
                // 末笔(补码)：青色高亮 + 加粗
                path.setAttribute('fill', '#00BCD4');  // Cyan500
                path.setAttribute('stroke', '#0097A7');  // Cyan700
                path.setAttribute('stroke-width', '10');
                path.setAttribute('stroke-linejoin', 'round');
                path.setAttribute('stroke-linecap', 'round');
            } else {
                // 非补码笔画：灰色
                path.setAttribute('fill', '#ccc');
                path.setAttribute('stroke', '#aaa');
                path.setAttribute('stroke-width', '0.5');
            }
            
            miniG.appendChild(path);
        });
    } else {
        miniBox.style.display = 'none';
    }

    // 更新笔画指示器
    document.getElementById('stroke-indicator').textContent =
        highlightStroke === -1
            ? `全部 ${strokes.length} 笔`
            : `第 ${highlightStroke + 1} / ${strokes.length} 笔`;
}

// ==================== 检查字根与编码一致性 ====================
function checkRootCodeConsistency() {
    if (!currentChar || !rootCode || rootCode === '—') return;
    
    const wubiData = WUBI[currentChar];
    if (!wubiData) return;
    
    const supIndices = wubiData.sup || [];
    const isSpecial = wubiData.special || false;
    const isKeyName = RADICAL_CHARS.has(currentChar);
    
    // 检查1：编码长度不能超过4
    const codeLen = rootCode.length;
    const rootsLen = roots.length;
    
    if (codeLen > 4) {
        console.error(`[错误] ${currentChar}: 编码长度${codeLen}>4，五笔最多4码`);
        console.error(`  编码: ${rootCode}`);
        console.error(`  修复建议: 取前3码+末1码: ${rootCode[0]}${rootCode[1]}${rootCode[2]}${rootCode[codeLen-1]}`);
    }
    
    // 检查2：字根数 > 4 时，编码应该只有4位
    if (rootsLen > 4 && codeLen !== 4) {
        console.error(`[错误] ${currentChar}: 字根数${rootsLen}>4，编码应该只有4位（前3+末1）`);
        console.error(`  编码: ${rootCode} (${codeLen}位)`);
        console.error(`  字根: ${JSON.stringify(roots)}`);
        console.error(`  修复建议: 编码改为 ${roots[0]}${roots[1]}${roots[2]}${roots[rootsLen-1]} 对应的编码`);
    }
    
    // 检查3：字根数 <= 4 时，编码长度应该等于字根数（或字根数+1，有补码时）
    // 键名字（如王GGGG）连按四下本键，codeLen=4 但 rootLen=1，跳过此检查
    if (!isKeyName && rootsLen <= 4 && codeLen !== rootsLen && codeLen !== rootsLen + 1) {
        console.warn(`[警告] ${currentChar}: 字根数${rootsLen}，编码长度${codeLen}，可能不匹配`);
        console.warn(`  编码: ${rootCode}`);
        console.warn(`  字根: ${JSON.stringify(roots)}`);
    }
    
    // 检查2：补码索引是否超出范围
    const maxSupIndex = Math.max(...supIndices, -1);
    if (maxSupIndex >= codeLen) {
        console.error(`[严重错误] ${currentChar}: 补码索引${maxSupIndex} 超出编码长度${codeLen}`);
        console.error(`  编码: ${rootCode} (索引0-${codeLen-1})`);
        console.error(`  补码索引: ${JSON.stringify(supIndices)}`);
        console.error(`  修复建议: 补码索引应该在 0-${codeLen-1} 范围内`);
        return;
    }
    
    // 检查3：编码区与字根区的数量是否对应
    // 编码区：非补码的编码数量
    let codeCount = 0;
    rootCode.split('').forEach((ch, i) => {
        const isSup = supIndices.includes(i);
        const isSpecialGray = isSpecial && i >= codeLen - 2;
        if (!isSup && !isSpecialGray) {
            codeCount++;
        }
    });
    
    // 字根区：非空字根、非补码的字根数量
    let rootCount = 0;
    roots.forEach((r, i) => {
        if (r !== '' && !supIndices.includes(i)) {
            rootCount++;
        }
    });
    
    // 报户口的字：第一个编码不计入字根
    if (isKeyName && codeCount > 0) {
        codeCount = codeCount - 1;
    }
    
    // 检查一致性（键名字四码同一键跳过；字根>4时取前3末1，编码数≠字根数是正常的）
    if (!isKeyName && codeCount !== rootCount && rootCount <= 4) {
        if (codeCount > rootCount && supIndices.length === 0) {
            // 编码数 > 字根数，但没有补码标记 → 自动检测会处理，仅debug级别提示
            // console.debug(`[补码提示] ${currentChar}: 编码${codeCount}个 > 字根${rootCount}个，补码将自动检测`);
        } else if (codeCount > rootCount) {
            // 有补码标记但数量仍不匹配
            console.warn(`[一致性警告] ${currentChar}: 编码区${codeCount}个 ≠ 字根区${rootCount}个 + 补码${supIndices.length}个`);
            console.warn(`  编码: ${rootCode}`);
            console.warn(`  字根: ${JSON.stringify(roots)}`);
            console.warn(`  补码: ${JSON.stringify(supIndices)}`);
        } else {
            // 编码数 < 字根数，可能是配置错误
            console.warn(`[一致性警告] ${currentChar}: 编码区${codeCount}个 < 字根区${rootCount}个`);
            console.warn(`  编码: ${rootCode}`);
            console.warn(`  字根: ${JSON.stringify(roots)}`);
            console.warn(`  补码: ${JSON.stringify(supIndices)}`);
        }
    }
}

// ==================== 信息渲染 ====================
function renderInfo() {
    // 补码索引
    const wubiData = WUBI[currentChar];
    const supIndices = wubiData?.sup || []; // 补码索引列表
    const isSpecial = wubiData?.special || false; // 特殊字（如乙NNLL）
    const isKeyName = RADICAL_CHARS.has(currentChar); // 成字字根
    
    // 构建颜色映射（供编码区、字根区使用）
    // 每个编码位置独立着色，补码用青色
    let colorIdx = 0;
    rootColorMap = {}; // 清空全局映射，重新构建
    const codeLen = rootCode ? rootCode.length : 0;
    if (rootCode && rootCode !== '—') {
        rootCode.split('').forEach((ch, i) => {
            const isSup = supIndices.includes(i);
            const isSpecialGray = isSpecial && i >= codeLen - 2;
            if (isSpecialGray) {
                rootColorMap[i] = '#999'; // 特殊字后两个用灰色
            } else if (isSup) {
                rootColorMap[i] = '#00BCD4';
            } else {
                rootColorMap[i] = ROOT_COLORS[colorIdx % ROOT_COLORS.length];
                colorIdx++;
            }
        });
    }

    // 构建字根索引→编码索引的映射（字根数 > 4 时：前3→前3，中间跳过，末→末）
    const rootToCodeIndex = [];
    
    // 每个编码位置按序号独立着色（1=红，2=蓝，3=绿，4=橙）
    // 注意：与rootToCodeIndex分开计算，互不干扰
    const colorIdxMap = rootCode.split('').map((_, i) => i);
    
    if (roots.length > 4) {
        // 检查 strokeRootMap 中是否有重复的字根索引（如㇂+丶+丿共享T键）
        const rootMapCounts = {};
        for (const ri of strokeRootMap) {
            rootMapCounts[ri] = (rootMapCounts[ri] || 0) + 1;
        }
        const hasRepeatedRoots = Object.values(rootMapCounts).some(c => c > 1);
        
        if (hasRepeatedRoots && roots.length <= codeLen) {
            // 有重复字根索引：按 strokeRootMap 中的实际映射来分配编码索引
            // 找出所有唯一的字根索引值，按顺序分配编码位置
            const uniqueRootIndices = Array.from(new Set(strokeRootMap.filter(r => r >= 0))).sort((a,b) => a-b);
            // 按字根索引升序排列，确保编码顺序与 roots 数组一致
            // 而不是按 strokeRootMap 的笔画顺序（swap后会扰乱）
            // uniqueRootIndices 是按笔画顺序出现的不重复字根索引
            // 例如 strokeRootMap=[0,0,1,2,4,4] → uniqueRootIndices=[0,1,2,4]
            // 编码索引分配：0→D(0), 1→N(1), 2→N(2), 4→T(3)
            const rootIndexToCodeIndex = {};
            let codePos = 0;
            for (const uri of uniqueRootIndices) {
                if (codePos < codeLen) {
                    rootIndexToCodeIndex[uri] = codePos;
                    codePos++;
                } else {
                    rootIndexToCodeIndex[uri] = -1;
                }
            }
            // 构建 rootToCodeIndex（按 roots 数组索引）
            for (let i = 0; i < roots.length; i++) {
                rootToCodeIndex.push(rootIndexToCodeIndex[i] !== undefined ? rootIndexToCodeIndex[i] : -1);
            }
        } else {
            // 无重复字根索引：原有逻辑
            for (let i = 0; i < 3; i++) rootToCodeIndex.push(colorIdxMap[i]);
            for (let i = 3; i < roots.length - 1; i++) rootToCodeIndex.push(-1);
            rootToCodeIndex.push(colorIdxMap[colorIdxMap.length - 1]);
        }
    } else {
        // roots.length <= 4：字根数等于或少于编码数
        // 当字根数少于编码数时（如歌=可+可+欠，3字根4键SKSW），
        // 最后一个字根对应末位编码（识别码），前面的字根按序对应
        if (roots.length < codeLen) {
            // 字根数 < 编码数：按非补码编码位置映射
            // 战=HKAT, sup=[3]：非补码编码[H,K,A]，3字根→0,1,2
            // 歌=SKSW, sup=[]：非补码编码[S,K,S,W]，3字根→0,1,3(末位)
            const rootCodeIndices = [];
            for (let i = 0; i < codeLen; i++) {
                if (!supIndices.includes(i)) rootCodeIndices.push(i);
            }
            for (let i = 0; i < roots.length - 1; i++) rootToCodeIndex.push(colorIdxMap[rootCodeIndices[i]]);
            rootToCodeIndex.push(colorIdxMap[rootCodeIndices[rootCodeIndices.length - 1]]);
        } else {
            for (let i = 0; i < roots.length; i++) rootToCodeIndex.push(colorIdxMap[i]);
        }
    }

    // 展开 rootToCodeIndex，与 strokeRootMapForDisplay 的展开字根对齐
    const expandedRootToCodeIndex = [];
    const KEY_NAMES_SET = new Set(Object.values(KEY_NAMES));
    const _isKeyNameRootSelf = WUBI[currentChar]?.r?.[0] === currentChar && !KEY_NAMES_SET.has(currentChar);
    let codeIdxCounter = (_isKeyNameRootSelf && roots.length > 1) ? 1 : 0;
    for (let i = 0; i < roots.length; i++) {
        const r = roots[i];
        const codeIdx = rootToCodeIndex[i];
        // 如果该字根被跳过（codeIdx === -1），其子字根也应该被跳过
        if (codeIdx === -1) {
            // 跳过的字根：如果有子字根，全部标记为-1
            if (WUBI[r] && WUBI[r].r && WUBI[r].r.length > 1 && WUBI[r].r[0] !== r && r !== currentChar) {
                for (const _sub of WUBI[r].r) {
                    expandedRootToCodeIndex.push(-1);
                }
            } else {
                expandedRootToCodeIndex.push(-1);
            }
        } else if (WUBI[r] && WUBI[r].r && WUBI[r].r.length > 1 && WUBI[r].r[0] !== r && r !== currentChar) {
            // 复合字根展开
            if (NON_CONTINUOUS_CHARS.has(r)) {
                // NC字根：使用NC字符自身的rootToCodeIndex，让各子字根获得不同颜色
                const ncCodeIndices = computeNcRootToCodeIndex(r);
                for (let j = 0; j < WUBI[r].r.length; j++) {
                    expandedRootToCodeIndex.push(ncCodeIndices[j] !== undefined ? ncCodeIndices[j] : -1);
                }
            } else if (WUBI[r].r.every(sub => RADICAL_CHARS.has(sub))) {
                // 子字根全是基本字根：沿用父字根的编码索引
                for (let j = 0; j < WUBI[r].r.length; j++) {
                    expandedRootToCodeIndex.push(codeIdx);
                }
            } else {
                // 普通复合字根：所有子字根用父字根的codeIdx，确保同色
                for (let j = 0; j < WUBI[r].r.length; j++) {
                    expandedRootToCodeIndex.push(codeIdx);
                }
            }
        } else if (_isKeyNameRootSelf && i === 0 && roots.length > 1) {
            expandedRootToCodeIndex.push(-1);
        } else {
            // roots.length > 4 时使用 rootToCodeIndex 的 codeIdx，
            // 避免 codeIdxCounter 递增超出编码长度（4）
            if (roots.length > 4) {
                expandedRootToCodeIndex.push(codeIdx);
            } else {
                expandedRootToCodeIndex.push(codeIdxCounter++);
            }
        }
    }
    // 复合字检测路径（prefix+base）的 buildEmbeddedMap 会递归展开NC子字根
    // （如 成→厂+㇆+㇂+丶+丿），产生超出 outer roots 展开范围的索引
    // 需要扩展 expandedRootToCodeIndex 以覆盖 strokeRootMapForDisplay 中的所有索引
    if (strokeRootMapForDisplay.length > 0) {
        const maxRi = Math.max(...strokeRootMapForDisplay.filter(v => v >= 0));
        while (expandedRootToCodeIndex.length <= maxRi) {
            // 溢出索引属于复合路径内部展开的根，使用最后一个编码索引
            expandedRootToCodeIndex.push(rootToCodeIndex[rootToCodeIndex.length - 1] || 0);
        }
    }

    // 构建笔画→颜色映射（供大框SVG使用）
    // 建立 strokeRootMapForDisplay 值到 roots 数组索引的映射
    // （buildEmbeddedMap 可能使用与展开后 roots 不同的内部索引）
    const uniqueRiValues = [...new Set(strokeRootMapForDisplay.filter(v => v >= 0))].sort((a, b) => a - b);
    const riRemap = {};
    let _rootArrayIdx = 0;
    for (const _ri of uniqueRiValues) {
        riRemap[_ri] = _rootArrayIdx++;
    }
    strokeColorMap = strokes.map((_, strokeIdx) => {
        const ri = strokeRootMapForDisplay[strokeIdx];
        if (ri === undefined || ri < 0) return '#555'; // 非编码笔画灰色
        // 报户口字：ri 值对应 expandedRootToCodeIndex 中的根索引（跳过报户口根0）
        // 非报户口字：riRemap 将非连续的值压缩到从0开始的索引
        const ri2 = _isKeyNameRootSelf ? ri : (riRemap[ri] !== undefined ? riRemap[ri] : ri);
        const codeIdx = expandedRootToCodeIndex[ri2];
        if (codeIdx === undefined || codeIdx < 0) return '#555'; // 跳过的字根灰色
        // 直接从rootColorMap取颜色字符串，避免存索引导致0值falsy问题
        return rootColorMap[codeIdx] || '#555';
    });
    if (currentChar === '哥' || currentChar === '奇' || currentChar === '孚' || currentChar === '酉' || currentChar === '戊' || currentChar === '戳' || currentChar === '靠' || currentChar === '摁' || currentChar === '鹵' || currentChar === '県' || currentChar === '歌' || currentChar === '战' || currentChar === '麥' || currentChar === '蘩' || currentChar === '繁' || currentChar === '海' || currentChar === '每' || currentChar === '嗨' || currentChar === '酶' || currentChar === '鳘' || currentChar === '毓' || currentChar === '敏' || currentChar === '蔬' || currentChar === '疏' || currentChar === '止' || currentChar === '嗇' || currentChar === '牆' || currentChar === '薔' || currentChar === '穡') {
        console.log('[DEBUG' + currentChar + '] strokeRootMapForDisplay=' + JSON.stringify(strokeRootMapForDisplay));
        console.log('[DEBUG' + currentChar + '] expandedRootToCodeIndex=' + JSON.stringify(expandedRootToCodeIndex));
        console.log('[DEBUG' + currentChar + '] strokeColorMap=' + JSON.stringify(strokeColorMap));
        console.log('[DEBUG' + currentChar + '] roots=' + JSON.stringify(roots));
        console.log('[DEBUG' + currentChar + '] rootCode=' + rootCode);
        console.log('[DEBUG' + currentChar + '] strokes.length=' + strokes.length);
        console.log('[DEBUG' + currentChar + '] rootColorMap=' + JSON.stringify(rootColorMap));
        console.log('[DEBUG' + currentChar + '] rootToCodeIndex=' + JSON.stringify(rootToCodeIndex));
        console.log('[DEBUG' + currentChar + '] riRemap=' + JSON.stringify(riRemap));
        console.log('[DEBUG' + currentChar + '] _isKeyNameRootSelf=' + _isKeyNameRootSelf + ' codeIdxCounter=' + codeIdxCounter);
        console.log('[DEBUG' + currentChar + '] supIndices=' + JSON.stringify(supIndices));
                if (currentChar === '麥') {

            for (let _si = 0; _si < strokes.length; _si++) {

        const codeHtml = rootCode.split('').map((ch, i) => {

        const realRoots = roots.filter(r => r !== '').length;

        // 自动计算识别码（用于显示判断依据）

        if (autoCalc && supIndices.length > 0) {

            if (actualSupCode && actualSupCode !== autoCalc.code) {
                // 不一致：显示自动计算的识别码
                autoSupInfo = `<span style="font-size:11px;color:#9C27B0;background:rgba(156,39,176,0.15);padding:2px 8px;border-radius:4px;margin-left:4px" title="自动判断：末笔${autoCalc.lastStrokeName}+${autoCalc.structureName}结构=${autoCalc.code}">→ ${autoCalc.code}</span>`;

            }

        wubiDiv.innerHTML = `

                ${structure ? `<span style="font-size:13px;font-weight:bold;padding:3px 10px;border-radius:6px;background:${structColor}33;color:${structColor};border:1px solid ${structColor}66">${structure}</span>` : ''}
                ${autoSupInfo}

            <div style="font-size:13px;color:#aaa">共 ${realRoots} 个字根，${strokes.length} 笔画${supIndices.length > 0 ? '，<span style="color:#00BCD4">' + supIndices.length + ' 个补码</span>' + supSource : ''}${grayCount > 0 ? '，<span style="color:#666">' + grayCount + ' 笔未编码</span>' : ''}</div>

        `;

    // 字根图例

    const nonRoots = wubiData?.nr || []; // 非编码部首列表
    
    if (roots.length > 0) {
        
        // 计算字根→编码的映射关系
        // 字根数 > 4 时：前3字根→前3编码，中间跳过，末字根→末编码
        const rootToCodeIndex = [];
        if (roots.length > 4) {
            // 前3字根→前3编码
            for (let i = 0; i < 3; i++) rootToCodeIndex.push(i);
            // 中间字根→跳过（-1）

        // swapLast 字：交换字根区末两笔的显示顺序，同时同步 rootToCodeIndex 保颜色对齐
        const rootCustom = CUSTOM_STROKE_ORDER[currentChar];
        let displayRoots = [...roots];
        if (rootCustom && rootCustom.swapLast && wubiData && rootCustom.condition(wubiData, currentChar) && displayRoots.length > 2) {
            const n = displayRoots.length;
            [displayRoots[n-2], displayRoots[n-1]] = [displayRoots[n-1], displayRoots[n-2]];

        }

        // 展开粗粒度字根用于显示（如 '非' → ['三','〢','三']）
        const _expDisp = [];

        legend.innerHTML = html;
    } else {
        legend.innerHTML = strokes.map((_, i) => {

}

// ==================== 键盘渲染 ====================
function renderKeyboard() {
    const wubiData = WUBI[currentChar];
    const supIndices = wubiData?.sup || [];
    const isSpecial = wubiData?.special || false; // 特殊字（如乙NNLL）
    
    // 构建位置→颜色映射（补码单独用青色）
    const positionColors = [];
    let colorIndex = 0;
    if (rootCode && rootCode !== '—') {
        const codeLen = rootCode.length;
        rootCode.split('').forEach((ch, i) => {
            const isSup = supIndices.includes(i);
            // 特殊字的后两个编码用灰色
            const isSpecialGray = isSpecial && i >= codeLen - 2;
            if (isSpecialGray) {
                positionColors[i] = { color: '#999', isActive: true, isSup: false, letter: ch, isSpecial: true };
            } else if (isSup) {
                // 补码始终用青色
                positionColors[i] = { color: '#00BCD4', isActive: true, isSup: true, letter: ch };
            } else {
                // 非补码：每个位置独立分配颜色（不再同一字母同色）
                positionColors[i] = { color: ROOT_COLORS[colorIndex % ROOT_COLORS.length], isActive: true, isSup: false, letter: ch };
                colorIndex++;
            }
        });
    }
    
    // 构建字母→颜色映射（用于键盘高亮，取该字母最后一次非补码的颜色）
    const codeColors = {};
    positionColors.forEach((info, i) => {
        if (info && !info.isSup) {
            codeColors[info.letter] = info;
        }
    });
    // 补码字母也要写入键盘映射（确保补码键高亮）
    positionColors.forEach((info, i) => {
        if (info && info.isSup) {
            codeColors[info.letter] = info;
        }
    });
    
    // 渲染每行键盘
    KB_ROWS.forEach((row, rowIdx) => {
        const rowDiv = document.getElementById(`kb-row-${rowIdx + 1}`);
        rowDiv.innerHTML = row.map(key => {
            const info = codeColors[key];
            const kouju = WUBI_KOuju[key] || '';
            const jianma = YIJI_JIANMA[key] || '';
            const keyName = KEY_NAMES[key] || '';
            
            if (info) {
                // 高亮状态
                const bgColor = info.color + '22';
                const borderColor = info.color;
                const textColor = info.color;
                return `<div class="key active" style="background:${bgColor};border-color:${borderColor};">
                    <div class="key-top">
                        <span class="key-jianma" style="color:#4FC3F7">${jianma}</span>
                        <span class="key-letter" style="color:${textColor}">${key}</span>
                        <span class="key-name" style="color:#66BB6A">${keyName}</span>
                    </div>
                    <span class="key-hint">${kouju}</span>
                </div>`;
            } else {
                // 普通状态
                return `<div class="key">
                    <div class="key-top">
                        <span class="key-jianma" style="color:#4FC3F799">${jianma}</span>
                        <span class="key-letter" style="color:#888">${key}</span>
                        <span class="key-name" style="color:#66BB6A99">${keyName}</span>
                    </div>
                    <span class="key-hint">${kouju}</span>
                </div>`;
            }
        }).join('');
    });
}

function renderCharLibrary() {
    const totalCount = ALL_CHARS.length;
    const totalPages = Math.ceil(totalCount / LIB_PAGE_SIZE);

    // 翻页边界检查
    if (libPage >= totalPages) libPage = totalPages - 1;
    if (libPage < 0) libPage = 0;

    if (!libPageOverride) {
        const currentIdx = ALL_CHARS.indexOf(currentChar);
        if (currentIdx >= 0) {

            if (charPage !== libPage) libPage = charPage;
        }
    }

    const pageStart = libPage * LIB_PAGE_SIZE;
    const pageChars = ALL_CHARS.slice(pageStart, pageStart + LIB_PAGE_SIZE);

    const mid = Math.ceil(pageChars.length / 2);

function renderAssignment() {
    const div = document.getElementById('stroke-assignment-side');
    const rootCount = Math.max(roots.length, 1);
    const wubiData = WUBI[currentChar];
    const supIndices = wubiData?.sup || [];

    // 按列排列：先左列从上到下，再右列从上到下
    const totalStrokes = strokes.length;
    const leftCount = Math.ceil(totalStrokes / 2);
    
    // 构建所有笔画项
    // 使用与 renderInfo 相同的 riRemap，确保索引一致
    const _uniqueRi = [...new Set(strokeRootMap.filter(v => v >= 0))].sort((a, b) => a - b);
    const _riRemap = {};
    let _rai = 0;
    for (const _ri of _uniqueRi) { _riRemap[_ri] = _rai++; }
    const items = strokes.map((_, i) => {
        const rawIdx = strokeRootMap[i];
        const idx = _riRemap[rawIdx] !== undefined ? _riRemap[rawIdx] : rawIdx;
        const isGray = idx < 0;
        const color = isGray ? '#555' : ROOT_COLORS[idx % ROOT_COLORS.length];
        return `<div class="assign-item">
            <span style="background:${color};width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-size:12px;">${i+1}</span>
            <select onchange="onAssignChange(${i}, this.value)">
                ${Array.from({length: rootCount}, (_, r) => {
                    const isSup = supIndices.includes(r);
                    const rawLabel = roots.length > 0 ? roots[r] : '组'+(r+1);
                    const label = rawLabel === '' ? '补码' : rawLabel;
                    return '<option value="' + r + '" ' + (r === idx ? 'selected' : '') + '>' + label + '</option>';
                }).join('')}
                <option value="-1" ${isGray ? 'selected' : ''}>灰色</option>
            </select>
        </div>`;
    });
    
    // 按列重排：左列(0,3,6...) + 右列(1,4,7...)
    // Grid两列按行填充，要让左列先满，需要交错排列
    const reordered = [];
    for (let i = 0; i < leftCount; i++) {
        reordered.push(items[i]); // 左列
        const rightIdx = leftCount + i;
        if (rightIdx < totalStrokes) {
            reordered.push(items[rightIdx]); // 右列
        }
    }
    
    if (div) div.innerHTML = reordered.join('');
}

// =================== 统一输入处理 ====================
function handleCharInput(val) {
    if (!val) return;
    // 提取所有汉字字符（含扩展区）
    const _chars = [];
    for (const _ch of val) {
        const _cp = _ch.codePointAt(0);
        if ((_cp >= 0x4E00 && _cp <= 0x9FFF) ||
            (_cp >= 0x3400 && _cp <= 0x4DBF) ||
            (_cp >= 0x20000 && _cp <= 0x2A6DF)) {
            _chars.push(_ch);
        }
    }
    if (_chars.length === 0) return;

    // 多字模式：输入多个汉字时显示拆分卡片，大框显示第一个字
    if (_chars.length > 1) {
        renderMultiCharCards(_chars);
        // 设置多字循环模式
        multiCharList = [..._chars];
        multiCharIndex = 0;
        // 大框显示第一个字
        const first = _chars[0];
        if (CHAR_LIST.includes(first)) {
            charIndex = CHAR_LIST.indexOf(first);
        }
        appReady = true;
        loadAndRender(first);
        charInput.value = '';
        return;
    }

    const single = _chars[0];
    // 单字输入时清除多字循环模式和卡片显示
    multiCharList = [];
    multiCharIndex = -1;
    clearMultiCharCards();
    if (!CHAR_LIST.includes(single)) {
        showFeedback('⏳ 「' + single + '」暂未录入字库，敬请期待版本更新，谢谢您！', 'wrong');
        charInput.value = '';
        setTimeout(() => clearFeedback(), 2500);
        return;
    }
    // 直接跳转到输入的汉字，保持输入框空白
    const idx = CHAR_LIST.indexOf(single);
    if (idx !== -1) charIndex = idx;
    appReady = true;
    
    if (single === currentChar) {
        // 输入的是当前汉字，显示烟花并跳转到下一个
        showFireworks();
        setTimeout(() => nextChar(), 1600);
    } else {
        // 输入的是其他汉字，直接跳转
        loadAndRender(single);
    }
    // 立即清空输入框
    charInput.value = '';
    // 保持输入框聚焦，系统键盘不收起，用户可连续输入
}

// IME 输入法：compositionend 时处理提交
charInput.addEventListener('compositionend', () => {
    const val = charInput.value.trim();
    if (!val) return;
    skipInputOnce = true;
    handleCharInput(val);
    charInput.value = '';
});

charInput.addEventListener('input', (e) => {
    if (e.isComposing) return;
    if (skipInputOnce) {
        skipInputOnce = false;
        if (!charInput.value.trim()) return;
    }
    const val = charInput.value.trim();
    if (!val) return;
    handleCharInput(val);
});

// 粘贴事件：提取粘贴文本中的所有汉字（支持多字模式）
charInput.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text');
    // 提取所有 CJK 汉字（含扩展区字符）
    const chars = [];
    for (const ch of text) {
        const cp = ch.codePointAt(0);
        if ((cp >= 0x4E00 && cp <= 0x9FFF) ||
            (cp >= 0x3400 && cp <= 0x4DBF) ||
            (cp >= 0x20000 && cp <= 0x2A6DF)) {
            chars.push(ch);
        }
    }
    if (chars.length === 0) return;
    skipInputOnce = false; // 粘贴已 preventDefault，不会再触发原生重复 input
    const joined = chars.join('');
    charInput.value = joined;
    handleCharInput(joined);
});

// ==================== 烟花动画 ====================
function showFireworks() {
    const container = document.getElementById('fireworks-container');
    const canvas = document.getElementById('fireworks-canvas');
    const zhenbang = document.getElementById('zhenbang-text');
    
    container.classList.add('active');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // 重置真棒文字动画
    zhenbang.classList.remove('show');
    void zhenbang.offsetWidth;
    zhenbang.classList.add('show');
    
    const ctx = canvas.getContext('2d');
    const particles = [];
    const rockets = [];
    const colors = ['#FF6B6B','#FFE66D','#4ECDC4','#45B7D1','#96E6A1','#DDA0DD','#FF9FF3','#54A0FF','#5F27CD','#FF9F43'];
    
    function randomRange(min, max) { return Math.random() * (max - min) + min; }
    
    function createRocket() {
        const x = randomRange(canvas.width * 0.15, canvas.width * 0.85);
        const targetY = randomRange(canvas.height * 0.15, canvas.height * 0.45);
        return { x, y: canvas.height, targetY, speed: randomRange(6, 10), color: colors[Math.floor(Math.random() * colors.length)], trail: [] };
    }
    
    function createExplosion(x, y, color) {
        const count = Math.floor(randomRange(50, 90));
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count + randomRange(-0.2, 0.2);
            const speed = randomRange(1.5, 6);
            const size = randomRange(1.5, 3.5);
            const life = randomRange(40, 80);
            particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, color, size, life, maxLife: life, gravity: 0.04 });
        }
        for (let i = 0; i < 15; i++) {
            const angle = randomRange(0, Math.PI * 2);
            const speed = randomRange(1, 3);
            particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, color: '#FFD700', size: randomRange(1, 2), life: randomRange(20, 40), maxLife: 40, gravity: 0.03 });
        }
    }
    
    rockets.push(createRocket());
    setTimeout(() => { if (container.classList.contains('active')) rockets.push(createRocket()); }, 200);
    setTimeout(() => { if (container.classList.contains('active')) rockets.push(createRocket()); }, 450);
    setTimeout(() => { if (container.classList.contains('active')) rockets.push(createRocket()); }, 700);
    setTimeout(() => { if (container.classList.contains('active')) rockets.push(createRocket()); }, 950);
    
    let animId;
    function animate() {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'lighter';
        
        for (let i = rockets.length - 1; i >= 0; i--) {
            const r = rockets[i];
            r.trail.push({ x: r.x, y: r.y });
            if (r.trail.length > 8) r.trail.shift();
            r.y -= r.speed;
            for (let j = 0; j < r.trail.length; j++) {
                const alpha = j / r.trail.length * 0.6;
                ctx.beginPath();
                ctx.arc(r.trail[j].x, r.trail[j].y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,200,100,${alpha})`;
                ctx.fill();
            }
            if (r.y <= r.targetY) {
                createExplosion(r.x, r.y, r.color);
                rockets.splice(i, 1);
            }
        }
        
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
            p.vx *= 0.985; p.vy *= 0.985; p.life--;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            const alpha = p.life / p.maxLife;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.globalAlpha = 1;
        }
        
        if (rockets.length > 0 || particles.length > 0) {
            animId = requestAnimationFrame(animate);
        } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            container.classList.remove('active');
            zhenbang.classList.remove('show');
        }
    }
    
    animate();
    setTimeout(() => {
        cancelAnimationFrame(animId);
        ctx.globalCompositeOperation = 'source-over';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        container.classList.remove('active');
        zhenbang.classList.remove('show');
    }, 3500);
}

function buildAllChars() {
    const keyNameSet = new Set(KEY_NAME_ORDER);
    const firstLevelSet = new Set(FIRST_LEVEL_ORDER);
    const seen = new Set();
    const result = [];

    function add(ch) {
        if (seen.has(ch)) return;
        seen.add(ch);
        result.push(ch);
    }

    // ① 键名字25个（顺序固定）
    KEY_NAME_ORDER.forEach(add);
    // ② 非键名的一级简码（顺序固定）
    FIRST_LEVEL_ORDER.filter(c => !keyNameSet.has(c)).forEach(add);
    // ③ 其余五笔字（按拼音排序）
    // 排除部分特殊字根（无法输入，不应在字库显示）
    Object.keys(WUBI).sort().filter(c => !keyNameSet.has(c) && !firstLevelSet.has(c) && c !== '𫩠' && c !== '𠦝' && c !== '龺' && c !== '𣬉').forEach(add);
    // ④ 其余hanzi-writer-data支持的汉字（无五笔数据，仅显示笔画）
    for (const ch of HANZI_ALL_CHARS) {
        if (!seen.has(ch)) add(ch);
    }

    return result;
}

function extractHanzi(text) {
    const result = [];
    for (const ch of text) {
        const cp = ch.codePointAt(0);
        if ((cp >= 0x4E00 && cp <= 0x9FFF) ||
            (cp >= 0x3400 && cp <= 0x4DBF) ||
            (cp >= 0x20000 && cp <= 0x2A6DF)) {
            result.push(ch);
        }
    }
    return result;
}

        document.getElementById('article-textarea').value = text.slice(0, 500); // 仅预览前500字

    reader.readAsText(file, 'utf-8');

}

function jumpToArticleChar(idx) {
    if (idx < 0 || idx >= articleChars.length) return;
    articleIndex = idx;
    const ch = articleChars[idx];
    // 同步 charIndex 到全局列表（方便补码等功能正常工作）
    const globalIdx = CHAR_LIST.indexOf(ch);
    if (globalIdx !== -1) charIndex = globalIdx;
    currentChar = ch;
    appReady = true;
    loadAndRender(ch);
    // 更新预览高亮
    updateArticleChipsHighlight();
    // 更新计数
    const counter = document.getElementById('article-char-counter');
    counter.textContent = (idx + 1) + ' / ' + articleChars.length;
    counter.style.display = 'inline';
}

function renderArticlePreview() {
    const preview = document.getElementById('article-chars-preview');
    preview.innerHTML = '';
    articleChars.forEach((ch, i) => {
        const chip = document.createElement('span');
        chip.className = 'article-char-chip' + (WUBI[ch] ? '' : ' no-wubi');
        chip.textContent = ch;
        chip.title = WUBI[ch] ? (ch + '：' + WUBI[ch].c) : (ch + '（无五笔数据）');
        chip.onclick = () => jumpToArticleChar(i);
        chip.dataset.idx = i;
        preview.appendChild(chip);
    });
    preview.style.display = 'flex';
    // 折叠输入区，显示添加按钮
    document.getElementById('article-input-area').style.display = 'none';
    document.getElementById('article-clear-btn').style.display = 'inline';
    document.getElementById('article-add-btn').style.display = 'inline';
    updateArticleChipsHighlight();
}

function updateArticleChipsHighlight() {
    const chips = document.querySelectorAll('.article-char-chip');
    chips.forEach(chip => {
        const idx = parseInt(chip.dataset.idx);
        chip.classList.toggle('active', idx === articleIndex);
    });
    // 滚动到当前chip（手机竖屏禁用，避免 scale 容器内跳动）
    const activeChip = document.querySelector('.article-char-chip.active');
    if (activeChip && !(window.innerWidth <= 800 && window.innerHeight > window.innerWidth)) {
        activeChip.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }
}

// ==================== 文章持久化存储 ====================
const STORAGE_KEY = 'wubi_saved_articles';

function getSavedArticles() {
    try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch(e) { return []; }
}

function saveArticleList(articles) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(articles));
}

function saveCurrentArticle() {
    if (articleChars.length === 0) return;
    const titleInput = document.getElementById('article-title-input');
    let title = titleInput.value.trim();
    if (!title) {
        // 自动生成标题：取前10个字符+"…"
        title = articleChars.slice(0, 10).join('') + (articleChars.length > 10 ? '…' : '');
    }
    const articles = getSavedArticles();
    // 检查标题是否已存在
    const existing = articles.findIndex(a => a.title === title);
    const entry = {
        title: title,
        text: articleChars.join(''),  // 保存完整的汉字序列（而非被截断的textarea内容）
        chars: articleChars.join(''),
        count: articleChars.length,
        timestamp: Date.now()
    };
    if (existing !== -1) {
        articles[existing] = entry; // 覆盖
        showToast('已更新文章：' + title);
    } else {
        articles.push(entry);
        showToast('已保存文章：' + title);
    }
    saveArticleList(articles);
    renderSavedArticles();
}

function deleteSavedArticle(title) {
    let articles = getSavedArticles();
    articles = articles.filter(a => a.title !== title);
    saveArticleList(articles);
    renderSavedArticles();
}

function loadSavedArticle(entry) {
    document.getElementById('article-textarea').value = entry.text;
    // 设置标题（不触发自动保存）
    const titleInput = document.getElementById('article-title-input');
    titleInput.value = entry.title;
    // 恢复预览区文字（自动保存会跳过，因为标题匹配已有条目）
    applyArticleChars(entry.text || entry.chars);
    renderSavedArticles();
}

/** 进入编辑模式：将已保存文章内容回填到输入框，修改后重新保存 */
function editSavedArticle(entry) {
    document.getElementById('article-textarea').value = entry.text;
    document.getElementById('article-title-input').value = entry.title;
    // 显示输入区，隐藏预览区
    document.getElementById('article-input-area').style.display = 'flex';
    document.getElementById('article-chars-preview').style.display = 'none';
    document.getElementById('article-chars-preview').innerHTML = '';
    document.getElementById('article-clear-btn').style.display = 'none';
    document.getElementById('article-add-btn').style.display = 'none';
    document.getElementById('article-char-counter').style.display = 'none';
    renderSavedArticles();
    showToast('请在输入区修改内容后，点击「载入文章」重新保存');
}

function renderSavedArticles() {
    const list = document.getElementById('article-saved-list');
    const articles = getSavedArticles();
    if (articles.length === 0) {
        list.style.display = 'none';
        return;
    }
    list.style.display = 'flex';
    list.innerHTML = '<div style="font-size:12px;color:#88aaff;margin-bottom:2px;">📚 已保存文章</div>';
    for (let i = 0; i < articles.length; i++) {
        const a = articles[i];
        const item = document.createElement('div');
        item.className = 'article-saved-item';
        item.dataset.idx = i;
        const titleSpan = document.createElement('span');
        titleSpan.className = 'article-saved-item-title';
        titleSpan.textContent = a.title;
        const countSpan = document.createElement('span');
        countSpan.className = 'article-saved-item-count';
        countSpan.textContent = a.count + '字';
        const delBtn = document.createElement('button');
        delBtn.className = 'article-saved-item-del';
        delBtn.textContent = '✕';
        delBtn.onclick = function(e) {
            e.stopPropagation();
            deleteSavedArticle(a.title);
        };
        const editBtn = document.createElement('button');
        editBtn.className = 'article-saved-item-del';
        editBtn.textContent = '✎';
        editBtn.style.marginRight = '4px';
        editBtn.style.color = '#88aaff';
        editBtn.onclick = function(e) {
            e.stopPropagation();
            editSavedArticle(a);
        };
        item.appendChild(editBtn);
        item.appendChild(titleSpan);
        item.appendChild(countSpan);
        item.appendChild(delBtn);
        item.onclick = function() { loadSavedArticle(a); };
        list.appendChild(item);
    }
}

/** 覆盖 prevChar / nextChar：文章模式时在文章序列中导航 */
function prevChar() {
    // 多字循环模式
    if (multiCharList.length > 0 && multiCharIndex >= 0) {
        multiCharIndex = (multiCharIndex - 1 + multiCharList.length) % multiCharList.length;
        const ch = multiCharList[multiCharIndex];
        if (CHAR_LIST.includes(ch)) charIndex = CHAR_LIST.indexOf(ch);
        appReady = true;
        loadAndRender(ch);
        return;
    }
    if (articleIndex !== -1 && articleChars.length > 0) {
        jumpToArticleChar((articleIndex - 1 + articleChars.length) % articleChars.length);
        return;
    }
    charIndex = (charIndex - 1 + CHAR_LIST.length) % CHAR_LIST.length;
    const ch = CHAR_LIST[charIndex];
    currentChar = ch;
    appReady = true;
    loadAndRender(ch);
}

function nextChar() {
    // 多字循环模式
    if (multiCharList.length > 0 && multiCharIndex >= 0) {
        multiCharIndex = (multiCharIndex + 1) % multiCharList.length;
        const ch = multiCharList[multiCharIndex];
        if (CHAR_LIST.includes(ch)) charIndex = CHAR_LIST.indexOf(ch);
        appReady = true;
        loadAndRender(ch);
        return;
    }
    if (articleIndex !== -1 && articleChars.length > 0) {
        jumpToArticleChar((articleIndex + 1) % articleChars.length);
        return;
    }
    charIndex = (charIndex + 1) % CHAR_LIST.length;
    const ch = CHAR_LIST[charIndex];
    currentChar = ch;
    appReady = true;
    loadAndRender(ch);
}

// ==================== 键盘上下滚动 ====================
document.addEventListener('keydown', function(e) {
    var tag = document.activeElement.tagName;
    // 左右方向键：切换上一个/下一个字（全局生效，包括焦点在输入框时）
    if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prevChar();
        return;
    }
    if (e.key === 'ArrowRight') {
        e.preventDefault();
        nextChar();
        return;
    }
    // 上下方向键：在侧边栏中按行跳转（每行5个字）
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        var step = 5; // 每行5个字
        if (e.key === 'ArrowDown') {
            charIndex = (charIndex + step) % CHAR_LIST.length;
        } else {
            charIndex = (charIndex - step + CHAR_LIST.length) % CHAR_LIST.length;
        }
        var ch = CHAR_LIST[charIndex];
        currentChar = ch;
        appReady = true;
        loadAndRender(ch);
    }
});
