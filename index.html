<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>汉字五笔字根·笔画着色 V2.2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Times New Roman', 'KaiTi', '楷体', 'STKaiti', '华文楷体', serif; }
html { font-size: 16px; }
/* 媒体查询已由 JS scale-wrapper 统一处理，避免双重缩放 */
body {
    font-family: 'KaiTi', '楷体', 'STKaiti', '华文楷体', serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #eee;
    min-height: 100vh;
    padding: 10px 20px 20px 20px;
    margin: 0;
}
.container { max-width: 68.75rem; margin: 0 auto; }
h1 { text-align: left; font-size: 1.625rem; margin-bottom: 0.25rem; color: #c8c8ff; }
.subtitle { text-align: left; font-size: 0.8125rem; color: #888; margin-bottom: 0; }
/* 标题独立容器 - 固定在页面最左侧 */
.title-container {
    position: fixed;
    left: 20px;
    top: 20px;
    z-index: 100;
}

/* 输入区 */
.input-section {
    display: flex; gap: 0.625rem; justify-content: center; align-items: center;
    width: 22rem; margin: 6px 0 0 0; padding: 0;
}
#char-input {
    font-size: 1.75rem; padding: 0.375rem 1rem; border: 2px solid #556;
    border-radius: 0.625rem; background: #2a2a4a; color: #fff;
    width: 7.5rem; text-align: center; ime-mode: active;
}
#prev-btn, #next-btn {
    font-size: 1rem; padding: 0.5rem 1.25rem; background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 0.625rem; cursor: pointer;
    font-weight: bold; transition: transform 0.15s;
}
#prev-btn:hover, #next-btn:hover { transform: scale(1.05); }

/* 主显示区 */
.main-display { display: flex; gap: 1.75rem; align-items: flex-start; justify-content: center; flex-wrap: wrap; margin-top: 0; padding-top: 0; min-width: 0; }
.char-row { display: flex; gap: 1.25rem; align-items: flex-start; }
.stroke-assign-panel { width: 16rem; padding: 0.5rem; background: rgba(40, 40, 70, 0.85); border-radius: 0.5rem; border: 1px solid rgba(100, 100, 180, 0.25); }
.stroke-assign-panel #stroke-assignment-side { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stroke-assign-panel .assign-item { display: flex; align-items: center; gap: 6px; padding: 4px 8px; background: #3a3a5a; border-radius: 6px; font-size: 13px; }
.stroke-assign-panel select { background: #4a4a6a; color: #ddd; border: 1px solid #555; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

/* SVG 容器 */
.char-display {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px;
}
.svg-wrap {
    background: #fff; border-radius: 1rem; padding: 0.75rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4); position: relative;
}
#char-svg { width: 22rem; height: 22rem; display: block; }
.stroke-nav {
    display: flex; gap: 8px; align-items: center; margin: 0;
}
.stroke-nav button {
    padding: 4px 14px; font-size: 14px; background: #3a3a5a;
    color: #ddd; border: 1px solid #555; border-radius: 6px; cursor: pointer;
}
.stroke-nav button:hover { background: #5a5a8a; }
.stroke-nav span { font-size: 14px; color: #aaa; }

/* 信息面板 */
.info-panel { flex: 1; max-width: 22rem; min-width: 15rem; }
.info-card {
    background: rgba(40, 40, 70, 0.85); border-radius: 0.75rem;
    padding: 1rem 1.125rem; margin-bottom: 0.875rem;
    border: 1px solid rgba(100, 100, 180, 0.25);
    overflow: hidden;
    word-break: break-all;
}
.info-card h3 {
    font-size: 15px; margin-bottom: 10px; color: #aab8ff;
    border-bottom: 1px solid rgba(100,100,180,0.2); padding-bottom: 6px;
}

/* 字根颜色列表 */
.root-legend { list-style: none; }
.root-legend li {
    padding: 5px 10px; margin: 3px 0; border-radius: 6px;
    display: flex; align-items: center; gap: 10px; font-size: 16px;
}
.root-color-dot {
    width: 18px; height: 18px; border-radius: 4px;
    display: inline-block; border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
}
.root-name { font-weight: bold; min-width: 30px; }
.root-code { color: #888; font-size: 12px; }
.root-stroke-count { color: #aaa; font-size: 12px; margin-left: auto; }

/* 笔画分配 */
.assign-row {
    display: flex; align-items: center; gap: 8px; padding: 4px 0;
    font-size: 13px; border-bottom: 1px solid rgba(100,100,150,0.15);
}
.assign-row:last-child { border-bottom: none; }
.assign-stroke-num {
    width: 22px; height: 22px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 11px;
    font-weight: bold; color: #fff; flex-shrink: 0;
}
.assign-select {
    padding: 2px 6px; border-radius: 4px; background: #3a3a5a;
    color: #fff; border: 1px solid #556; font-size: 12px;
    cursor: pointer;
}
.assign-hint { font-size: 11px; color: #666; margin-top: 6px; }

/* 加载状态 */
.loading {
    text-align: center; padding: 40px; color: #888; font-size: 16px;
}
.error { color: #e74c3c; }

/* 预览字符大字 */
.char-preview {
    text-align: center; font-size: 120px; font-family: 'KaiTi', '楷体', serif;
    color: rgba(255,255,255,0.08); line-height: 1; margin-bottom: -20px;
    pointer-events: none; user-select: none;
}

/* 文章模式面板 */
#article-panel {
    background: rgba(30,30,60,0.85);
    border: 1px solid rgba(100,120,200,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 10px;
    margin-top: 4px;
}
#article-panel-header {
    display: flex; align-items: center; margin-bottom: 8px;
}
#article-panel-title {
    font-size: 13px; font-weight: bold; color: #aac4ff;
}
#article-input-area {
    display: flex; flex-direction: column; gap: 6px;
}
#article-textarea {
    width: 100%; box-sizing: border-box;
    font-size: 13px; padding: 6px 10px;
    background: #1e1e3e; color: #ddd; border: 1px solid #445;
    border-radius: 7px; resize: vertical; outline: none;
    font-family: inherit; line-height: 1.5; min-height: 60px;
}
#article-textarea:focus { border-color: #667eea; }
#article-btns {
    display: flex; flex-direction: row; gap: 6px;
}
#article-load-btn {
    font-size: 12px; padding: 5px 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; border: none; border-radius: 6px; cursor: pointer;
    font-weight: bold; white-space: nowrap;
}
#article-load-btn:hover { opacity: 0.9; }
#article-file-label {
    font-size: 12px; padding: 5px 12px;
    background: rgba(80,100,180,0.25); color: #99aadd;
    border: 1px solid #445; border-radius: 6px; cursor: pointer;
    white-space: nowrap; text-align: center;
}
#article-file-label:hover { background: rgba(80,100,180,0.4); }
#article-file-label input { display: none; }
#article-chars-preview {
    margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px;
    overflow-x: hidden; overflow-y: auto; white-space: normal;
    padding-bottom: 4px; max-height: 90px;
}
#article-title-row {
    margin-bottom: 6px;
}
#article-title-input {
    width: 100%; box-sizing: border-box;
    font-size: 13px; padding: 5px 10px;
    background: #1e1e3e; color: #ddd; border: 1px solid #445;
    border-radius: 7px; outline: none; font-family: inherit;
}
#article-title-input:focus { border-color: #667eea; }
#article-title-input::placeholder { color: #667; }
#article-saved-list {
    margin-top: 8px; display: flex; flex-direction: column; gap: 4px;
    max-height: 175px; overflow-y: auto;
}
.article-saved-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; border-radius: 6px; cursor: pointer;
    background: rgba(60,60,100,0.5); border: 1px solid transparent;
    transition: background 0.15s;
}
.article-saved-item:hover { background: rgba(80,100,180,0.35); border-color: rgba(100,120,200,0.3); }
.article-saved-item-title {
    flex: 1; font-size: 12px; color: #ccd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.article-saved-item-count {
    font-size: 11px; color: #88aaff; margin-right: 4px;
}
.article-saved-item-del {
    font-size: 13px; color: #e74c3c88; cursor: pointer; padding: 0 4px;
    border: none; background: none; line-height: 1;
}
.article-saved-item-del:hover { color: #e74c3c; }
.article-char-chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 5px; font-size: 14px;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
    background: rgba(60,60,100,0.7); color: #ccc;
    border: 1px solid transparent;
}
.article-char-chip:hover { background: rgba(100,120,200,0.5); color: #fff; }
.article-char-chip.active {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: #fff; border-color: #aac; transform: scale(1.1);
}
.article-char-chip.no-wubi { color: #555; cursor: default; }

/* 五笔键盘 */
.wubi-keyboard {
    background: rgba(30,30,60,0.8);
    border-radius: 12px;
    padding: 8px;
    margin-top: 20px;
    position: relative;
}
.keyboard-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 4px;
}
.key {
    flex: 1;
    max-width: 5.5rem;
    min-width: 3.5rem;
    height: 5.5rem;
    background: #3a3a5a;
    border: 2px solid #555;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}
.key.active {
    transform: scale(1.05);
    border-width: 3px;
}
.key-hint {
    font-size: 0.75rem;
    color: #aaa;
    text-align: center;
    line-height: 1.4;
    padding: 0 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.key-top {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 10px;
}
.key-letter {
    font-size: 2rem;
    font-weight: bold;
    font-family: 'Courier New', monospace;
}
.key-jianma {
    font-size: 0.875rem;
    color: #4FC3F7;
    font-family: 'KaiTi', '楷体', serif;
}
.key-name {
    font-size: 0.875rem;
    color: #66BB6A;
    font-family: 'KaiTi', '楷体', serif;
}

/* ========== 跨屏幕自适应缩放 ========== */
#scale-wrapper {
    position: relative;
    transform-origin: top left;
    width: 100%;
    /* 允许内容溢出本区域，由外层（body）处理滚动 */
    overflow: visible;
}
body {
    overflow-y: auto;
}

/* ========== 两侧字库面板 ========== */
.side-panel {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 240px;
    max-height: 765px;
    background: rgba(18, 18, 38, 0.95);
    border: 1px solid rgba(100, 100, 180, 0.25);
    border-radius: 14px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.3s ease;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    overflow: hidden;
}
.side-panel.collapsed {
    opacity: 0;
    pointer-events: none;
}
.side-panel-left {
    left: 6px;
    top: 55%;
}
.side-panel-left.collapsed {
    transform: translateY(-50%) translateX(-260px);
}
.side-panel-right {
    right: 12px;
    top: 55%;
}
.side-panel-right.collapsed {
    transform: translateY(-50%) translateX(260px);
}
.side-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(100,100,180,0.2);
    flex-shrink: 0;
}
.side-panel-title {
    font-size: 13px;
    color: #aab8ff;
    font-weight: bold;
}
.side-panel-count {
    font-size: 11px;
    color: #666;
}
.side-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    scrollbar-width: thin;
    scrollbar-color: rgba(100,100,180,0.3) transparent;
}
.side-panel-body::-webkit-scrollbar { width: 4px; }
.side-panel-body::-webkit-scrollbar-track { background: transparent; }
.side-panel-body::-webkit-scrollbar-thumb { background: rgba(100,100,180,0.3); border-radius: 4px; }
.char-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
}
.char-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 56px;
    border-radius: 8px;
    border: 1.5px solid rgba(100,100,150,0.15);
    background: rgba(30,30,60,0.5);
    cursor: pointer;
    transition: all 0.15s;
}
.char-cell:hover {
    border-color: #88f;
    background: rgba(60,60,110,0.6);
}
.char-cell.active {
    border-color: #0097A7;
    background: rgba(0,188,212,0.12);
}
.char-cell-char {
    font-size: 22px;
    color: #eee;
    font-family: 'KaiTi', '楷体', serif;
    line-height: 1.2;
}
.char-cell-code {
    font-size: 9px;
    color: #888;
    margin-top: 1px;
}
.char-cell.no-wubi .char-cell-char { color: #aaa; }
.char-cell.no-wubi .char-cell-code { color: #ccc; font-style: italic; }
.char-cell.active .char-cell-char { color: #00BCD4; }

/* 字库切换按钮 */
.lib-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 200;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(100,100,180,0.35);
    background: rgba(18, 18, 38, 0.9);
    color: #aab8ff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    line-height: 1;
}
.lib-toggle:hover {
    background: rgba(40, 40, 80, 0.95);
    border-color: #88f;
    transform: scale(1.08);
}

/* 字库当前字高亮 */
.lib-btn-active {
    outline: 2px solid #f0c040 !important;
    background: rgba(240,192,64,0.15) !important;
}

/* 底部滑入提示框 */
.toast-notification {
    position: fixed;
    bottom: -80px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 9999;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    display: flex;
    align-items: center;
    gap: 10px;
}
.toast-notification.show {
    bottom: 30px;
    opacity: 1;
}
.toast-notification .toast-icon {
    font-size: 20px;
}

/* ==================== 烟花+真棒动画 ==================== */
#fireworks-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10000;
    display: none;
}
#fireworks-container.active {
    display: block;
}
#fireworks-canvas {
    width: 100%;
    height: 100%;
}
#zhenbang-text {
    position: fixed;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%) translateY(80px) scale(0.5);
    font-size: clamp(32px, 10vw, 72px);
    font-weight: 900;
    color: #FFD700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 165, 0, 0.5), 0 4px 8px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    z-index: 10001;
    font-family: 'KaiTi', '楷体', 'STKaiti', '华文楷体', serif;
    letter-spacing: clamp(4px, 1.8vw, 12px);
    transition: none;
}
#zhenbang-text.show {
    animation: zhenbang-pop 1.8s ease-out forwards;
}
@keyframes zhenbang-pop {
    0% { opacity: 0; transform: translateX(-50%) translateY(80px) scale(0.5); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.2); }
    25% { transform: translateX(-50%) translateY(0) scale(1); }
    60% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-60px) scale(1.1); }
}

/* ========== 手机竖屏独立布局（不用 transform scale，原生流式布局） ========== */
@media (max-width: 800px) and (orientation: portrait) {
    body { padding: 6px 8px 8px 8px; }

    /* 标题改为 static，不固定定位 */
    .title-container { position: static; left: auto; top: auto; padding: 4px 0 6px 0; }
    h1 { font-size: 1.05rem; }
    .subtitle { font-size: 0.7rem; }

    /* container 不限宽，flex 布局控制 main-display 和 keyboard 顺序 */
    .container { max-width: 100%; display: flex; flex-direction: column; }

    /* main-display 单列堆叠，文章面板排最后 */
    .main-display { flex-direction: column; align-items: center; gap: 8px; }

    /* 文章面板全宽，移到五笔编码区下面 */
    #article-panel { width: 100%; flex-shrink: 0; order: 2; }

    /* 多字拆分卡片移到文章模式前面（通过JS在手机端移动元素位置） */

    /* SVG 缩小 */
    .svg-wrap { padding: 6px; }
    #char-svg { width: 180px; height: 180px; }
    /* 补码框缩小，避免压到汉字 */
    #sup-mini-box { top: 4px !important; right: 4px !important; padding: 2px !important; border-radius: 4px !important; }
    #sup-mini-box > div { font-size: 7px !important; margin-bottom: 1px !important; }
    #sup-mini-svg { width: 32px !important; height: 32px !important; }

    /* 笔画导航缩小 */
    .stroke-nav { gap: 4px; }
    .stroke-nav button { padding: 3px 10px; font-size: 12px; }
    .stroke-nav span { font-size: 12px; }

    /* 输入区全宽，font-size≥16px 防止 iOS 自动缩放 */
    .input-section { width: 100%; }
    #char-input { font-size: 16px; width: 6rem; padding: 0.25rem 0.5rem; }
    #prev-btn, #next-btn { font-size: 0.85rem; padding: 0.35rem 0.8rem; }

    /* 信息面板全宽；五笔编码和字根着色交换位置 */
    .info-panel { max-width: 100%; min-width: 0; width: 100%; display: flex; flex-direction: column; }
    .info-panel .info-card:nth-child(2) { order: -1; }  /* 字根着色提到五笔编码前面 */

    /* 键盘缩小 */
    .wubi-keyboard { padding: 5px; margin-top: 8px; }
    .keyboard-row { gap: 2px; margin-bottom: 2px; }
    .key { min-width: 28px; max-width: 38px; height: 42px; border-width: 1px; }
    .key.active { border-width: 2px; }
    .key-top { margin-bottom: 1px; gap: 2px; }
    .key-letter { font-size: 0.9rem; }
    .key-jianma { font-size: 0.625rem; }
    .key-hint { font-size: 0.5rem; line-height: 1.1; }

    /* 字库切换按钮缩小 */
    .lib-toggle { width: 32px; height: 32px; font-size: 14px; top: 6px; right: 6px; }

    /* 字库侧边栏手机端窄一些 */
    .side-panel { width: 140px; }

    /* 字根着色区缩小字号和间距 */
    .root-legend li { font-size: 13px; padding: 3px 6px; gap: 6px; }
    .root-name { font-size: 16px; min-width: 20px; }
    .root-color-dot { width: 12px; height: 12px; }
    .root-code { font-size: 11px; }
    .root-kouju { font-size: 11px !important; margin-left: 4px !important; }
    .root-stroke-count { font-size: 10px; }
    /* 补码标签缩小 */
    .sup-badge { font-size: 8px !important; padding: 0 2px !important; margin-left: 2px !important; }
}

/* ==================== 多汉字拆分卡片 ==================== */
#multi-char-cards {
    display: none;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    align-items: flex-start;
    margin-top: 16px;
    padding: 14px 12px;
    background: rgba(30,30,60,0.6);
    border-radius: 12px;
    border: 1px solid rgba(100,100,180,0.25);
}
.multi-cards-header {
    width: 100%;
    text-align: center;
    color: #aaa;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.multi-clear-btn {
    font-size: 11px;
    padding: 2px 8px;
    background: rgba(231,76,60,0.2);
    color: #e74c3c;
    border: 1px solid rgba(231,76,60,0.45);
    border-radius: 4px;
    cursor: pointer;

// 全局常量：需要非连续笔画分配的字（万、母、那）
// 注：含'匚'字根的字（区、欧、沤等）由 roots.includes('匚') 自动检测，无需列入
const NON_CONTINUOUS_CHARS = new Set(['万','母','那','非','丧','啬','嗇','可','兆','乘','或','肃','尤','戊','酉','止','式','武','忒','甙','貳','贰','弒','來','舞','戈','凸','戒','戎','戜','衰','爽','龙','䜌','必','婁','垂','喪','噩','爾','畿','帶','齊','樂','盥','無','韋','甴','㠯','燕','翰','犮']);

// ==================== 计算五笔识别码 ====================
// 根据末笔和字型计算识别码
// 返回：识别码字母，如果没有返回 null
function calcIdentificationCode(char) {
    const wubi = WUBI[char];
    if (!wubi) return null;
    
    // 1. 获取字型结构
    const structure = CHAR_STRUCTURE[char] || '独体';
    let structureType;
    if (structure === '左右') structureType = 1;
    else if (structure === '上下') structureType = 2;
    else structureType = 3; // 杂合
    
    // 2. 获取末笔类型（需要知道笔画数据）
    // 末笔类型：横=1, 竖=2, 撇=3, 捺=4, 折=5
    // 这个需要等 strokes 数据加载后才能计算
    // 所以我们返回 null，让调用者处理
    return null; // 暂时返回 null，等笔画数据加载后计算
}

// 根据末笔类型和字型计算识别码字母
function getIdentificationLetter(lastStrokeType, structureType) {
    // 识别码表（五笔86标准）：行=末笔类型(1-5)，列=字型(1-3)
    const table = {
        1: { 1:'G', 2:'F', 3:'D' }, // 横
        2: { 1:'H', 2:'J', 3:'K' }, // 竖
        3: { 1:'T', 2:'R', 3:'E' }, // 撇
        4: { 1:'Y', 2:'U', 3:'I' }, // 捺(丶)
        5: { 1:'N', 2:'B', 3:'V' }  // 折
    };
    return table[lastStrokeType]?.[structureType] || null;
}

const KEY_NAME_CHARS = new Set('王土大木工目日口田山禾白月人金言立水火之已子女又纟'.split(''));

// 单笔画字：特殊编码，无识别码
const SINGLE_STROKE_CHARS = new Set('一乙丨丿乛丶'.split(''));

/**
 * 计算五笔识别码（补码）
 * 规则：识别码 = 末笔类型 × 3 + 字结构类型
 * 
 * 末笔类型：横(1)、竖(2)、撇(3)、捺(4)、折(5)
 * 字结构：左右(1)、上下(2)、杂合/独体(3)
 * 
 * 识别码字母表：
 *   横：G(11) F(12) D(13)
 *   竖：H(21) J(22) K(23)
 *   撇：T(31) R(32) E(33)
 *   捺：Y(41) U(42) I(43)
 *   折：N(51) B(52) V(53)
 */
function calculateSupplementCode(lastStrokeType, structureType) {
    // 识别码字母矩阵（五笔86标准）
    const SUPPLEMENT_MAP = {
        1: { 1: 'G', 2: 'F', 3: 'D' }, // 横
        2: { 1: 'H', 2: 'J', 3: 'K' }, // 竖
        3: { 1: 'T', 2: 'R', 3: 'E' }, // 撇
        4: { 1: 'Y', 2: 'U', 3: 'I' }, // 捺
        5: { 1: 'N', 2: 'B', 3: 'V' }  // 折
    };
    
    return SUPPLEMENT_MAP[lastStrokeType]?.[structureType] || null;
}

/**
 * 判断笔画类型
 * @param {string} stroke - 笔画名称（㇐㇑㇒㇓㇔等）
 * @returns {number} 1=横, 2=竖, 3=撇, 4=捺, 5=折
 */
function _getStrokeTypeFromRootName(rootName) {
    if (!rootName) return null;
    if (/[㇐一]/.test(rootName)) return 1;
    if (/[㇑丨]/.test(rootName)) return 2;
    if (/[㇒丿]/.test(rootName)) return 3;
    if (/[㇓㇔丶]/.test(rootName)) return 4;
    if (/[㇕㇖㇗㇘㇙㇚㇛㇜㇝乙乛亅]/.test(rootName)) return 5;
    return 5; // 默认折
}

// 通过SVG路径数据判断笔画类型（用于戈/戋末两笔区分丿和丶）
// 返回 3=撇, 4=捺/点, null=不确定
function _getStrokeTypeFromPath(pathStr) {
    if (typeof pathStr !== 'string') return null;
    // 丶（点）通常是闭合形状（以Z结尾），丿（撇）是开放路径
    const endsWithZ = /\s*Z\s*$/i.test(pathStr.trim());
    if (endsWithZ) return 4; // 丶/点
    // 开放路径：检查方向判断是否为撇
    const parts = pathStr.split(/(?=[MLQCZmlqcz])/);
    if (parts.length < 2) return null;
    const mNums = parts[0].match(/-?\d+\.?\d*/g);
    if (!mNums || mNums.length < 2) return null;
    const startX = parseFloat(mNums[0]);
    const startY = parseFloat(mNums[1]);
    // 找最后一个带坐标的命令
    let lastNums = null;
    for (let i = parts.length - 1; i >= 1; i--) {
        const nums = parts[i].match(/-?\d+\.?\d*/g);
        if (nums && nums.length >= 2) { lastNums = nums; break; }
    }
    if (!lastNums) return null;
    const endX = parseFloat(lastNums[lastNums.length - 2]);
    const endY = parseFloat(lastNums[lastNums.length - 1]);
    const dx = endX - startX;
    const dy = endY - startY;
    // 撇：向左下方（dx<0, dy>0）
    if (dx < -20 && dy > 20) return 3;
    // 其他开放路径默认为撇（戈/戋的开放路径只有撇）
    if (Math.abs(dx) > 50 || Math.abs(dy) > 50) return 3;
    return null;
}

function getStrokeType(stroke) {
    // 若stroke是对象（hanzi-writer笔画路径数据），通过五笔分解推断末笔类型
    if (typeof stroke !== 'string') {
        if (rootCode && WUBI[currentChar] && strokeRootMapForDisplay && strokeRootMapForDisplay.length > 0) {
            // 取最后一个编码笔画所对应的字根索引
            const lastRi = strokeRootMapForDisplay[strokeRootMapForDisplay.length - 1];
            if (lastRi < 0) return null;
            // 获取该字根的展开列表
            const expanded = recursivelyExpandRoots(WUBI[currentChar].r || [], currentChar);
            const lastRootName = expanded[lastRi];
            if (!lastRootName) return null;
            // 如果字根本身有WUBI分解（如戈→戈一㇂丶丿），取分解中的最后一笔（跳过报户口自身）
            const lastRootWubi = WUBI[lastRootName];
            if (lastRootWubi && lastRootWubi.r && lastRootWubi.r.length >= 2) {
                const sub = lastRootWubi.r;
                // 报户口字：r[0]==自身，取r[last]；非报户口：取r[last]
                const lastSub = (sub[0] === lastRootName) ? sub[sub.length - 1] : sub[sub.length - 1];
                if (currentChar === '战') console.log('[DEBUG战] lastRi=', lastRi, 'lastRootName=', lastRootName, 'sub=', sub, 'lastSub=', lastSub, 'type=', _getStrokeTypeFromRootName(lastSub));
                const result = _getStrokeTypeFromRootName(lastSub);
                if (currentChar === '战') alert('战补码检测: 末笔=' + lastSub + ' type=' + result + ' 结构=左右(1) 预期=T');
                return result;
            }
            // 直接检测字根名是否是笔画名
            const type = _getStrokeTypeFromRootName(lastRootName);
            if (type !== null) return type;
        }
        return null;
    }
    // 横类：㇐ 一
    if (/[㇐一]/.test(stroke)) return 1;
    // 竖类：㇑ 丨
    if (/[㇑丨]/.test(stroke)) return 2;
    // 撇类：㇒ 丿
    if (/[㇒丿]/.test(stroke)) return 3;
    // 捺类：㇓ ㇔ 丶
    if (/[㇓㇔丶]/.test(stroke)) return 4;
    // 折类：㇕ ㇖ ㇗ ㇘ ㇙ ㇚ ㇛ ㇜ ㇝ 乙 乛 亅
    if (/[㇕㇖㇗㇘㇙㇚㇛㇜㇝乙乛亅]/.test(stroke)) return 5;
    
    // 无法识别时返回null，避免误判导致补码显示错误
    return null;
}

/**
 * 获取字的末笔类型
 * @param {string} char - 汉字
 * @returns {number} 1=横, 2=竖, 3=撇, 4=捺, 5=折
 */
function getLastStrokeType(char) {
    // 从笔画数据获取末笔
    if (strokes && strokes.length > 0) {
        const wubiData = WUBI[char];
        if (wubiData && roots && roots.length > 0) {
            // ========== 【囗】包围结构特殊处理 ==========
            // 规则：含囗的字 → 补码取非囗字根的末笔（不是整字的最后一笔/封口横）
            const weiIdx = roots.indexOf('囗');
            if (weiIdx !== -1 && strokeRootMap && strokeRootMap.length > 0) {
                let innerLastStrokeIdx = -1;
                for (let i = 0; i < strokeRootMap.length; i++) {
                    if (strokeRootMap[i] !== weiIdx) {
                        innerLastStrokeIdx = Math.max(innerLastStrokeIdx, i);
                    }
                }
                if (innerLastStrokeIdx !== -1) {
                    return getStrokeType(strokes[innerLastStrokeIdx]);
                }
            }

            // ========== 【匚】结构特殊处理 ==========
            // 规则：含【匚】且有补码的字 → 补码取匚内字根的末笔（包围结构）
            // 如【区】AQI（匚+乂，补码取乂末笔）
            // 如【沤】IAQY（氵+匚+乂，补码取乂末笔）
            // 【欧】AQQW 4码无补码，不会进入此分支
            const fuIdx = roots.indexOf('匚');
            const hasSup = wubiData.sup && wubiData.sup.length > 0;
            if (fuIdx !== -1 && hasSup && strokeRootMap && strokeRootMap.length > 0) {
                // 取非匚字根的最后一笔（即内部字根的末笔）
                let innerLastStrokeIdx = -1;
                for (let i = 0; i < strokeRootMap.length; i++) {
                    if (strokeRootMap[i] !== fuIdx) {  // 非匚的笔画 = 内部字根
                        innerLastStrokeIdx = Math.max(innerLastStrokeIdx, i);
                    }
                }
                if (innerLastStrokeIdx !== -1) {
                    return getStrokeType(strokes[innerLastStrokeIdx]);
                }
            }

            // ========== 【辶/廴】结构特殊处理 ==========
            // 规则：含辶/廴的字 → 补码取被包围部分的末笔（不是辶的最后一笔）
            // 如【迈】DNPV（万+辶，取万末笔）
            // 如【这】YPI（文+辶，取文末笔）
            const zouIdx = roots.indexOf('辶');
            const yanIdx = roots.indexOf('廴');
            const walkIdx = zouIdx !== -1 ? zouIdx : yanIdx;
            if (walkIdx !== -1 && strokeRootMap && strokeRootMap.length > 0) {
                let innerLastStrokeIdx = -1;
                for (let i = 0; i < strokeRootMap.length; i++) {
                    if (strokeRootMap[i] !== walkIdx) {
                        innerLastStrokeIdx = Math.max(innerLastStrokeIdx, i);
                    }
                }
                if (innerLastStrokeIdx !== -1) {
                    return getStrokeType(strokes[innerLastStrokeIdx]);
                }
            }

        }
        
        // 默认：通过五笔字根分解推断末笔类型
        // 优先从 strokeRootMapForDisplay 获取末笔对应的字根来确定笔画类型
        if (strokeRootMapForDisplay && strokeRootMapForDisplay.length > 0 && roots && roots.length > 0) {
            const lastRootName = roots[roots.length - 1];
            if (lastRootName) {
                const lastRootWubi = WUBI[lastRootName];
                if (lastRootWubi && lastRootWubi.r && lastRootWubi.r.length >= 2) {
                    const sub = lastRootWubi.r;
                    const lastSub = sub[sub.length - 1];
                    const type = _getStrokeTypeFromRootName(lastSub);
                    if (type !== null) return type;
                }
                const type = _getStrokeTypeFromRootName(lastRootName);
                if (type !== null) return type;
            }
        }
        // 回退：尝试从最后一笔SVG路径推断
        const lastStroke = strokes[strokes.length - 1];
        return getStrokeType(lastStroke);
    }
    
    // 从hanzi-writer数据推断（如果有）
    // TODO: 从hanzi-writer-data获取笔画信息
    
    return null;
}

/**
 * 获取字结构类型
 * @param {string} char - 汉字
 * @returns {number} 1=左右, 2=上下, 3=杂合/独体
 */
function getStructureType(char) {
    const structure = CHAR_STRUCTURE[char];
    if (!structure) return 3; // 默认杂合
    
    if (structure === '左右') return 1;
    if (structure === '上下') return 2;
    // 全包围、半包围、独体 都是杂合
    return 3;
}

/**
 * 自动计算补码（识别码）
 * @param {string} char - 汉字
 * @returns {object} { code: 补码字母, lastStrokeType: 末笔类型, structureType: 结构类型 }
 */
function autoCalculateSupplement(char) {
    const lastStrokeType = getLastStrokeType(char);
    if (char === '戛') console.log('[DEBUG戛 补码] lastStrokeType=' + lastStrokeType + ' strokeRootMapForDisplay=' + JSON.stringify(strokeRootMapForDisplay));
    const structureType = getStructureType(char);
    
    if (!lastStrokeType) {
        console.warn(`[补码计算] ${char}: 无法确定末笔类型`);
        return null;
    }
    
    const code = calculateSupplementCode(lastStrokeType, structureType);
    
    const strokeNames = { 1: '横', 2: '竖', 3: '撇', 4: '捺', 5: '折' };
    const structNames = { 1: '左右', 2: '上下', 3: '杂合' };
    
    
    return {
        code,
        lastStrokeType,
        structureType,
        lastStrokeName: strokeNames[lastStrokeType],
        structureName: structNames[structureType]
    };
}

/**
 * 批量检查所有字的补码是否正确
 */
function checkAllSupplements() {
    const results = [];
    
    for (const char in WUBI) {
        const wubi = WUBI[char];
        const code = wubi.c;
        const roots = wubi.r;
        const supIndices = wubi.sup || [];
        
        // 只检查有补码的字
        if (supIndices.length === 0) continue;
        
        // 计算应有的补码
        const calculated = autoCalculateSupplement(char);
        if (!calculated) continue;
        
        // 获取当前补码字母
        const supIndex = supIndices[0];
        const currentSupCode = code[supIndex];
        
        // 比较是否一致
        if (currentSupCode !== calculated.code) {
            results.push({
                char,
                current: currentSupCode,
                expected: calculated.code,
                reason: `末笔${calculated.lastStrokeName}+${calculated.structureName}`
            });
            console.warn(`[补码错误] ${char}: 当前${currentSupCode} 应为${calculated.code} (${calculated.lastStrokeName}+${calculated.structureName})`);
        }
    }
    
    if (results.length === 0) {
        console.log('[补码检查] 所有补码均正确！');
    } else {
        console.table(results);
    }
    
    return results;
}

/**
 * 验证补码配置是否合理
 * 补码定义：末笔识别码，用于字根数 < 4 且编码不足4位的情况
 * 
 * 规则：
 * 1. 编码长度不能超过4（五笔最多4码）
 * 2. 字根数 > 4 → 无补码（取前3+末1，中间跳过但不叫补码）
 * 3. 字根数 = 4 → 无补码（取前3+末1刚好对应）
 * 4. 字根数 < 4 且编码长度 > 字根数 → 有补码（末笔识别码）
 * 5. 字根数 < 4 且编码长度 = 字根数 → 无补码（简码）
 */
function validateSupplementConfig() {
    const errors = [];
    
    for (const char in WUBI) {
        const wubi = WUBI[char];
        const code = wubi.c;
        const roots = wubi.r;
        const hasSup = wubi.sup && wubi.sup.length > 0;
        
        // 过滤空字根和补码字母，得到有效字根数
        const effectiveRoots = roots.filter(r => r !== '' && !['G','F','D','H','J','K','T','R','E','Y','U','I','N','B','V'].includes(r));
        const effectiveRootLen = effectiveRoots.length;
        const codeLen = code.length;
        
        // 规则1: 编码长度不能超过4
        if (codeLen > 4) {
            errors.push({
                char,
                type: '编码超长',
                reason: `编码长度${codeLen}>4，五笔最多4码`,
                current: code,
                suggested: `取前3码+末1码: ${code[0]}${code[1]}${code[2]}${code[codeLen-1]}`
            });
            console.warn(`[验证] ${char}: 编码长度${codeLen}>4，应修正为${code[0]}${code[1]}${code[2]}${code[codeLen-1]}`);
        }
        
        // 规则2: 字根数 >= 编码数，不应有补码
        if (effectiveRootLen >= codeLen && hasSup) {
            errors.push({
                char,
                type: '不应有补码',
                reason: `字根数${effectiveRootLen}>=编码数${codeLen}，无补码`,
                current: wubi.sup,
                suggested: '删除sup字段'
            });
            console.warn(`[验证] ${char}: 字根数${effectiveRootLen}>=编码数${codeLen}，不应有补码`);
        }
        
        // 规则3: 字根数 < 编码数，应有补码
        if (effectiveRootLen < codeLen && !hasSup) {
            // 但要排除键名字、成字字根、单笔画字、报户口字
            if (!KEY_NAME_CHARS.has(char) && 
                !RADICAL_CHARS.has(char) && 
                !SINGLE_STROKE_CHARS.has(char) &&
                !SINGLE_ROOT_REPORT.has(char)) {
                errors.push({
                    char,
                    type: '缺少补码',
                    reason: `字根数${effectiveRootLen}<编码数${codeLen}，应有补码`,
                    current: null,
                    suggested: `添加sup:[${effectiveRootLen}]`
                });
                console.warn(`[验证] ${char}: 应有补码但缺失`);
            }
        }
    }
    
    if (errors.length === 0) {
        console.log('[验证通过] 所有补码配置正确');
    } else {
        console.table(errors);
    }
    
    return errors;
}

/**
 * 自动判断补码（基于五笔规则）
 * 
 * 补码条件：编码数 > 字根数 → 最后一个编码对应的笔画是补码
 * 如戏(CAT, 3码>2根) → 第3位编码T是补码
 */
function autoDetectSupplement(char, expandedRoots) {
    const wubi = WUBI[char];
    if (!wubi) return null;
    
    const code = wubi.c;
    const codeLen = code.length;
    
    // 例外：键名字 → 无补码
    if (KEY_NAME_CHARS.has(char)) return { sup: [], endStroke: null };
    
    // 例外：报户口的字 → 无补码
    if (RADICAL_CHARS.has(char)) return { sup: [], endStroke: null };
    
    // 展开字根（内联 recursivelyExpandRoots 逻辑）
    let effectiveRoots;
    if (expandedRoots) {
        effectiveRoots = expandedRoots.filter(r => r !== '');
    } else {
        const KEY_NAMES_SET = new Set(Object.values(KEY_NAMES));
        let roots = wubi.r;
        let changed = true;
        let iterations = 0;
        while (changed && iterations < 5) {
            changed = false;
            iterations++;
            const next = [];
            for (const root of roots) {
                const wubiEntry = WUBI[root];
                if (wubiEntry && wubiEntry.r && wubiEntry.r.length >= 2
                    && !KEY_NAMES_SET.has(root)
                    && !RADICAL_CHARS.has(root)
                    && !RADICAL_CHARS.has(root)
                    && root !== char) {
                    // 展开时不过滤组件自身的sup（sup只对字本身有意义）
                    next.push(...wubiEntry.r);
                    changed = true;
                } else {
                    next.push(root);
                }
            }
            roots = next;
        }
        effectiveRoots = roots.filter(r => r !== '');
    }
    const effectiveRootLen = effectiveRoots.length;
    
    // 补码判断：编码数 > 字根数 → 有补码（最后一个编码对应笔画）
    // 如戏(CAT, 3码>2根) → sup:[2]
    if (codeLen > effectiveRootLen) {
        return { sup: [effectiveRootLen], endStroke: null };
    }
    
    return { sup: [], endStroke: null };
}

// 获取所有需要校对的字
function getCharsNeedingReview() {
    const result = [];
    for (const char in WUBI) {
        const wubi = WUBI[char];
        const codeLen = wubi.c.length;
        const rootLen = wubi.r.length;
        
        // 可能需要补码的字：编码长度 > 字根数量，且没有手动设置sup
        if (codeLen > rootLen && !wubi.sup) {
            result.push(char);
        }
    }
    return result;
}

// ==================== 精确笔画→字根映射 ====================
/**
 * 自动识别囗结构（外面是大框）的汉字并生成笔画映射
 * 规则：外框字根囗对应第1、2笔和最后一笔，内部字根按笔画数分配中间笔画
 * 
 * 囗结构笔画顺序：
 * - 第1笔：竖（左边）
 * - 第2笔：横折（上边+右边上半）
 * - 中间笔画：内部字根
 * - 最后一笔：横（封口）
 * 
 * @param {string} char - 汉字
 * @param {object} wubiData - 五笔数据对象
 * @param {number} totalStrokes - 总笔画数
 * @returns {array|null} 笔画映射数组，如果不是囗结构返回null
 */
function detectWeiStructureSimple(char, wubiData, totalStrokes, expandedRoots) {
    try {
    // 使用展开后的字根列表（如果提供），否则回退到原始 r
    // 展开后的字根索引与 renderInfo 中的 roots 一致，确保颜色分配正确
    const radicals = expandedRoots || (wubiData?.r && Array.isArray(wubiData.r) ? wubiData.r : []);
    if (!radicals.length || !radicals.includes('囗')) return null;

    // 收集所有囗的位置
    const weiIndices = [];
    radicals.forEach((r, i) => { if (r === '囗') weiIndices.push(i); });

    const map = new Array(totalStrokes).fill(-1);

    if (weiIndices.length === 1) {
        // ===== 单囗：自动检测或手动 weiStart/weiEnd =====
        const weiIdx = weiIndices[0];
        
        // 自动检测 weiStart：囗之前字根的总笔画数
        let autoWeiStart = 0;
        for (let i = 0; i < weiIdx; i++) {
            autoWeiStart += RADICAL_STROKES[radicals[i]] || 1;
        }
        // 自动检测 weiEnd：囗前2笔 + 囗内容笔画数 + 囗底横(1笔)
        // 默认认为囗后面的字根都在框内；遇到“囗+㐅+外部后续字根”时，只把㐅判为框内
        let weiInnerEnd = radicals.length;
        const weiTailAfterCross = radicals.slice(weiIdx + 2);
        const crossOnlyInWei =
            radicals[weiIdx + 1] === '㐅' &&
            (weiTailAfterCross.length > 0 ||
             (weiTailAfterCross[0] === '八' && weiTailAfterCross[1] === '夂') ||
             (weiTailAfterCross[0] === '𠄌' && weiTailAfterCross[1] === '⺀'));
        // 昷结构：囗+人+皿，囗只包围人，皿在框外
        const renMinInWei =
            radicals[weiIdx + 1] === '人' && radicals[weiIdx + 2] === '皿';
        // 恩/因结构：囗+大+心，囗只包围大，心在框外
        const daXinInWei =
            radicals[weiIdx + 1] === '大' && radicals[weiIdx + 2] === '心';
        if (crossOnlyInWei || renMinInWei || daXinInWei) {
            weiInnerEnd = weiIdx + 2;
        }
        let autoWeiEnd = autoWeiStart + 2;
        for (let i = weiIdx + 1; i < weiInnerEnd; i++) {
            autoWeiEnd += RADICAL_STROKES[radicals[i]] || 1;
        }
        
        const weiStart = wubiData.weiStart !== undefined ? wubiData.weiStart : autoWeiStart;
        const weiEnd = wubiData.weiEnd !== undefined ? wubiData.weiEnd : autoWeiEnd;

        map[weiStart] = weiIdx;
        if (weiStart + 1 < totalStrokes) map[weiStart + 1] = weiIdx;
        if (weiEnd < totalStrokes) map[weiEnd] = weiIdx;

        let strokeIdx = 0;
        for (let i = 0; i < weiIdx; i++) {
            const r = radicals[i];
            const strokes = RADICAL_STROKES[r] || 1;
            for (let s = 0; s < strokes && strokeIdx < weiStart; s++) {
                map[strokeIdx] = i;
                strokeIdx++;
            }
        }

        strokeIdx = weiStart + 2;
        for (let i = weiIdx + 1; i < radicals.length; i++) {
            const r = radicals[i];
            const strokes = RADICAL_STROKES[r] || 1;
            for (let s = 0; s < strokes; s++) {
                while (strokeIdx === weiEnd) strokeIdx++;
                if (strokeIdx >= totalStrokes) break;
                map[strokeIdx] = i;
                strokeIdx++;
            }
        }

        // ===== 囗内非连续字根修正 =====
        // 检查囗内的连续字根是否匹配某个 NON_CONTINUOUS_CHARS 的拆分
        // 如國=囗+或，或展开为[戈,口,㇀]，需用非连续映射替代连续分配
        const innerRadicals = radicals.slice(weiIdx + 1, weiInnerEnd);
        for (const ncChar of NON_CONTINUOUS_CHARS) {
            const ncWubi = WUBI[ncChar];
            if (ncWubi && ncWubi.r && ncWubi.r.length === innerRadicals.length
                && ncWubi.r.every((r, i) => r === innerRadicals[i])) {
                // 匹配：获取非连续映射
                const innerStart = weiStart + 2;
                const innerCount = weiEnd - innerStart;
                const ncMap = autoDetectNonContinuous(ncChar, ncWubi.r, innerCount, ncWubi.sup || [], 0);
                if (ncMap && ncMap.length === innerCount && !ncMap.includes(-1)) {
                    // 替换内部区域的连续分配为非连续映射
                    for (let si = 0; si < innerCount; si++) {
                        map[innerStart + si] = weiIdx + 1 + ncMap[si];
                    }
                }
                break;
            }
        }
    } else {
        // ===== 多囗嵌套：正扫分配前两笔，反扫填末笔 =====
        let strokeIdx = 0;
        const weiStack = []; // {idx, start}

        for (let i = 0; i < radicals.length; i++) {
            const r = radicals[i];
            if (r === '囗') {
                weiStack.push({ idx: i, start: strokeIdx });
                map[strokeIdx] = i;
                strokeIdx++;
                if (strokeIdx < totalStrokes) {
                    map[strokeIdx] = i;
                    strokeIdx++;
                }
            } else {
                const strokes = RADICAL_STROKES[r] || 1;
                for (let s = 0; s < strokes; s++) {
                    if (strokeIdx >= totalStrokes) break;
                    map[strokeIdx] = i;
                    strokeIdx++;
                }
            }
        }

        // 从后往前收集空位
        const emptySlots = [];
        for (let i = totalStrokes - 1; i >= 0; i--) {
            if (map[i] === -1) emptySlots.push(i);
        }

        // 从最后一个囗开始，依次分配末笔
        for (let w = weiStack.length - 1; w >= 0; w--) {
            const end = emptySlots.pop();
            if (end !== undefined) {
                map[end] = weiStack[w].idx;
            }
        }
    }

    return map;
    } catch (e) {
        console.error('[ERROR] detectWeiStructureSimple failed for ' + char + ':', e);
        return null;
    }
}

/**
 * 获取字根笔画数（支持展开复合字根）
 * 原 V10 函数，V11 删除 RADICAL_EXPAND_MAP 后误删，现恢复
 */

function autoDetectGaoJingStructure(char, wubiData, totalStrokes) {
    const radicals = wubiData.r || [];
    if (!Array.isArray(radicals) || !radicals.includes('亠')) return null;

    const supIndices = wubiData.sup || [];
    // 亠是第一个字根(index=0)，固定对应前2笔
    const map = new Array(totalStrokes).fill(-1);
    const GAO_STROKES = 2;

    // 分配前2笔给亠（index=0）
    for (let i = 0; i < GAO_STROKES && i < totalStrokes; i++) map[i] = 0;

    // 剩余笔画按字根笔画数分配给内部字根
    const innerStrokes = totalStrokes - GAO_STROKES;
    const innerRadicals = [];
    for (let i = 1; i < radicals.length; i++) {
        if (radicals[i] === '' || supIndices.includes(i)) continue;
        innerRadicals.push({ codeIndex: i, strokes: RADICAL_STROKES[radicals[i]] || 1 });
    }

    if (innerRadicals.length === 0) return null;

    let si = GAO_STROKES;
    for (const ir of innerRadicals) {
        ir.start = si;
        for (let k = 0; k < ir.strokes && si < totalStrokes; k++) {
            map[si++] = ir.codeIndex;
        }
    }
    // 修正最后一个内部字根（吸收所有剩余笔画）
    if (innerRadicals.length > 0) {
        for (let k = 0; k < totalStrokes; k++) {
            if (map[k] === -1) {
                map[k] = innerRadicals[innerRadicals.length - 1].codeIndex;
            }
        }
    }

    return map;
}


// RADICAL_EXPAND_MAP/expandRadicals removed —拆分功能由其他代码实现

/**
 * 自动识别含"母"子字根的笔画映射（处理不连续笔画合并+灰色判定）
 * 
 * 母(5笔) → 母框(2笔) + 一(1笔) + 冫(2笔)
 * 笔画顺序：框(1,2) 点(3) 横(4) 点(5) → 夹心结构
 * 
 * 灰色判定：编码数 = code长度 - sup数，超出编码位的字根 → 灰色(-1)
 * - 母(XGUI)：3编码位-1补码=3，3个字根全部参与 → 无灰色
 * - 海(ITXU)：3编码位-1补码=3，5个字根中后2个 → 灰色
 * 
 * @param {array} roots - 字根数组
 * @param {number} n - 总笔画数
 * @returns {array|null} 笔画映射数组或null
 */
function autoDetectMuStructure(roots, n, supCount = 0) {
    const kuangIdx = roots.indexOf('母框');
    const hengIdx = roots.indexOf('一');
    const dianIdx = roots.indexOf('冫') !== -1 ? roots.indexOf('冫') : roots.indexOf('⺀');
    if (kuangIdx < 0 || hengIdx < 0 || dianIdx < 0) return null;

    // 计算编码位数（总编码 - 补码数），超出此位数的字根为灰色
    const totalCodes = 4;  // 假设4码
    const codingSlots = totalCodes - supCount; // 参与编码的字根数

    // 判断每个字根是否参与编码
    // 字根数 > 4 时：前3参与，中间跳过，末1参与
    // 字根数 <= 4 时：索引 < codingSlots 的参与
    const isCoding = (idx) => {
        if (roots.length > 4) {
            // 前3字根参与，中间跳过，末字根参与
            if (idx < 3) return true;
            if (idx === roots.length - 1) return true;
            return false;
        } else {
            return idx < codingSlots;
        }
    };

    // 母之前其他字根占的笔画数
    let strokeOffset = 0;
    for (let i = 0; i < kuangIdx; i++) {
        strokeOffset += RADICAL_STROKES[roots[i]] || 0;
    }

    // 母5笔的固定夹心映射（不参与编码的子字根映射为-1）
    // 笔1-2→母框, 笔3→冫, 笔4→一, 笔5→冫
    const muMap = [
        isCoding(kuangIdx) ? kuangIdx : -1,
        isCoding(kuangIdx) ? kuangIdx : -1,
        isCoding(dianIdx)  ? dianIdx  : -1,
        isCoding(hengIdx)  ? hengIdx  : -1,
        isCoding(dianIdx)  ? dianIdx  : -1,
    ];

    // 母之后其他字根占的笔画数
    let afterMu = 0;
    for (let i = kuangIdx + 3; i < roots.length; i++) {
        afterMu += RADICAL_STROKES[roots[i]] || 0;
    }

    // 验证总笔画数
    const expectedTotal = strokeOffset + 5 + afterMu;
    if (expectedTotal !== n) return null;

    // 构建完整映射
    const result = [];
    // 母之前：正常顺序分配
    for (let i = 0; i < kuangIdx; i++) {
        const cnt = RADICAL_STROKES[roots[i]] || 1;
        for (let j = 0; j < cnt; j++) result.push(i);
    }
    // 母：固定夹心映射（可能含-1灰色）
    for (let j = 0; j < 5; j++) result.push(muMap[j]);
    // 母之后：正常顺序分配（不参与编码的→-1）
    for (let i = kuangIdx + 3; i < roots.length; i++) {
        if (!isCoding(i)) {
            const cnt = RADICAL_STROKES[roots[i]] || 1;
            for (let j = 0; j < cnt; j++) result.push(-1);
        } else {
            const cnt = RADICAL_STROKES[roots[i]] || 1;
            for (let j = 0; j < cnt; j++) result.push(i);
        }
    }

    return result.length === n ? result : null;
}


/**
 * 自动识别非连续笔画分配模式（万、区、那、亡、欧、娜、哪、迈、沤 等结构）
 *
 * 共同特征：
 * - 第一个字根的笔画分散在不连续位置（position 0 和 n-sc[0]）
 * - 中间字根用 round-robin 填充中间位置
 * - 最后一个字根占剩余位置
 *
 * 核心算法（2026-05-14 重新推导）：
 * 1. 从 RADICAL_STROKES 查找第一个字根的笔画数 sc[0]
 * 2. 分配公式：
 *    - r=2：first=[0, n-sc[0]-1]，last=[n-sc[0], n-1]
 *    - r≥3：first=[0, n-sc[0]-1]，middle=[round-robin]，last=[剩余]
 *
 * 算法验证：
 * - 万(3笔)：sc[0]=2, last=1 → [0,1,0] ✅ 一,丿:0,2  ㇆:1 // 一丿注释
 * - 区(4笔)：sc[0]=2, last=2 → [0,1,1,0] ✅ 匚:0,3  乂:1,2
 * - 亡(3笔)：sc[0]=2, last=1 → [0,1,0] ✅ 亠:0,2  ㇟:1
 * - 那(6笔)：sc[0]=2, mid=2,last=2 → [0,1,1,0,2,2] ✅ 刀:0,3  二:1,2  阝:4,5
 * - 迈(6笔)：sc[0]=2, mid=2,last=2 → [0,1,0,2,2,2] ✅ 一,丿:0,3  ㇆:1,2  辶:4,5 // 一丿注释
 * - 欧(8笔)：sc[0]=4, eachMid=2,last=2 → [0,1,1,0,2,2,3,3] ✅ 区:0,3  欠:4,7
 * - 娜(9笔)：已修正为VVFB，4字根无补码，走常规笔画数推断路径
 * - 哪(9笔)：已修正为KVFB，4字根无补码，走常规笔画数推断路径
 * - 沤(7笔)：sc[0]=2, last=4 → [0,1,0,0,2,2,2] ✅ 冫:0,2,3  之:1,4,5,6
 *
 * @param {string} currentChar - 当前字符
 * @param {string[]} roots - 字根数组（已展开）
 * @param {number} n - 总笔画数
 * @param {number[]} supIndices - sup 笔画索引（1-based）
 * @param {number} strokeOffset - 第一个字根之前的笔画偏移
 * @returns {number[]|null} 笔画映射数组或null
 */
function autoDetectNonContinuous(currentChar, roots, n, supIndices, strokeOffset, isEmbedded = false) {
    console.log(`[DEBUG NC入口] currentChar=${currentChar}, roots=${JSON.stringify(roots)}, n=${n}, isEmbedded=${isEmbedded}`);
    // 自动检测十+戈相邻模式（哉、栽、載、截、戴、载等），需在展开前检测
    const hasShiGeOrig = roots.some((_, i) =>
        i + 1 < roots.length && roots[i] === '十' && roots[i+1] === '戈'
    );
    // 展开粗粒度字根（如 '非' → ['三','〢','三']），使 hasFei 等分支能正确触发
    // 保存原始（未展开的）roots 用于NC检查
    const _origRoots = [...roots];
    const _exp = [];
    for (const _r of roots) {
        if (WUBI[_r] && WUBI[_r].r && WUBI[_r].r.length > 1 && WUBI[_r].r[0] !== _r && _r !== currentChar) {
            _exp.push(...WUBI[_r].r);
        } else {
            _exp.push(_r);
        }
    }
    roots = _exp;
    const r = roots.length;
    if (r < 2 || n < 2) return null;
    // 含匚的字不需要 sup 也能走非连续映射（外框结构决定）
    // 白名单字符（万、母、那等）也不需要 sup，强制走非连续
    const hasKuang = (roots||[]).includes('匚');
    // 精确匹配'非'字根展开后的连续序列：三+〢+三
    const hasFei = roots.some((_, i) => 
        i + 2 < roots.length && roots[i] === '三' && roots[i+1] === '〢' && roots[i+2] === '三'
    );
    // 精确匹配末尾三字根为 ㇂+丶+丿 的模式（如"成"的末三字根）
    const hasShaDianPie = roots.length >= 3 && 
        roots[roots.length - 3] === '㇂' && 
        roots[roots.length - 2] === '丶' && 
        roots[roots.length - 1] === '丿';
    // 额外检查：roots 中是否有白名单字根
    const hasNCRoot = roots.some(r => NON_CONTINUOUS_CHARS.has(r));
    if (currentChar === '戎') console.log('[DEBUG戎 NC] roots=' + JSON.stringify(roots) + ' n=' + n + ' r=' + r + ' sha=' + hasShaDianPie + ' ncRoot=' + hasNCRoot);
    // 检查原始（未展开的）roots 是否含 NC 字根（如麥的來）
    const _rawNCRoot = _origRoots.some(r => NON_CONTINUOUS_CHARS.has(r));
    if (!NON_CONTINUOUS_CHARS.has(currentChar) && !hasKuang && !hasFei && !hasNCRoot && !hasShaDianPie && !hasShiGeOrig && !_rawNCRoot) return null;

    // ===== 婁字特殊处理 =====
    // 婁：第一个字根(口)占笔画0,1,3，第二个字根(一)占笔画2
    // 后续字根按笔画顺序连续分配
    // 适用于婁本身和包含婁作为部件的复合字（數、僂、嘍等）
    if (roots[0] === '口' && roots[1] === '一' && roots.length >= 5) {
        const result = new Array(n);
        let pos = 0;
        result[pos++] = strokeOffset + 0;  // 笔画0 → 口
        result[pos++] = strokeOffset + 0;  // 笔画1 → 口
        result[pos++] = strokeOffset + 1;  // 笔画2 → 一
        result[pos++] = strokeOffset + 0;  // 笔画3 → 口
        for (let ri = 2; ri < r; ri++) {
            let sc = RADICAL_STROKES[roots[ri]];
            if (sc === undefined) {
                const entry = WUBI[roots[ri]];
                if (entry && entry.r && entry.r.length > 0) {
                    const parts = (entry.r.length > 1 && entry.r[0] === roots[ri]) ? entry.r.slice(1) : entry.r;
                    sc = parts.reduce((sum, sub) => sum + (RADICAL_STROKES[sub] || 1), 0);
                } else sc = 1;
            }
            for (let j = 0; j < sc && pos < n; j++) result[pos++] = strokeOffset + ri;
        }
        if (pos === n) return result;
    }

    // ===== 嗇字特殊处理 =====
    // 嗇：展开后 roots=['土','人','人','囗','口']，13笔
    // 笔画顺序：人(1,2) → 人(3,4) → 土(5,6,7) → 囗(8,9) → 口(10,11,12) → 囗底横(13)
    // 即第5,6,7笔属于第1字根土（非连续，在两个人之后才写）
    // 回=囗+口，囗包围口，底横在最后（与 detectWeiStructureSimple 相同的囗结构）
    // 适用于嗇本身和包含嗇作为部件的复合字（墻、穡、薔、牆等）
    if (currentChar === '嗇' && roots.length >= 5
        && roots[0] === '土' && roots[1] === '人' && roots[2] === '人'
        && roots[3] === '囗' && roots[4] === '口') {
        const result = new Array(n);

        && roots[roots.length - 4] === '丨' && roots[roots.length - 3] === '口'
        && roots[roots.length - 2] === '匸' && roots[roots.length - 1] === '丨') {
        const weiStartIdx = roots.length - 5;  // 韋部分在roots中的起始索引
        // 计算韋之前的笔画数（前缀部分连续分配）
        let prefixStrokes = 0;
        for (let i = 0; i < weiStartIdx; i++) {
            const sc = RADICAL_STROKES[roots[i]] || 1;
            prefixStrokes += sc;
        }
        // 韋部分9笔，总笔画应为 prefixStrokes + 9
        if (n === prefixStrokes + 9) {
            const result = new Array(n);
            let pos = 0;
            // 前缀部分：连续分配
            for (let ri = 0; ri < weiStartIdx; ri++) {
                const sc = RADICAL_STROKES[roots[ri]] || 1;
                for (let j = 0; j < sc && pos < n; j++) {
                    result[pos++] = strokeOffset + ri;
                }
            }
            // 韋部分：非连续映射（9笔）
            result[pos++] = strokeOffset + weiStartIdx + 1;  // 第1笔 → 丨(索引weiStartIdx+1)
            result[pos++] = strokeOffset + weiStartIdx;      // 第2笔 → コ(索引weiStartIdx)
            result[pos++] = strokeOffset + weiStartIdx;      // 第3笔 → コ(索引weiStartIdx)
            result[pos++] = strokeOffset + weiStartIdx + 2;  // 第4笔 → 口(索引weiStartIdx+2)
            result[pos++] = strokeOffset + weiStartIdx + 2;  // 第5笔 → 口
            result[pos++] = strokeOffset + weiStartIdx + 2;  // 第6笔 → 口
            result[pos++] = strokeOffset + weiStartIdx + 3;  // 第7笔 → 匸(索引weiStartIdx+3)
            result[pos++] = strokeOffset + weiStartIdx + 3;  // 第8笔 → 匸
            result[pos++] = strokeOffset + weiStartIdx + 4;  // 第9笔 → 丨(索引weiStartIdx+4)
            if (pos === n) return result;
        }
    }

    // 查找第一个字根的笔画数（从 RADICAL_STROKES，含 OVERRIDE）
    // 注意：roots 是局部字根列表，strokeOffset 是全局起始索引，
    // 所以应取 roots[0] 而非 roots[strokeOffset]
    const firstRoot = roots[0];
    if (!firstRoot) return null;
    const sc0 = RADICAL_STROKES[firstRoot];
    if (!sc0 || sc0 < 1) return null;

    const firstRootIdx = strokeOffset;
    const lastRootIdx = strokeOffset + r - 1;
    const midRootCount = r - 2;

    // 分配笔画数
    // 第一个字根占 sc[0] 个位置：[0, n-sc[0]-1]
    // 最后一个字根占 n - sc[0] 个位置（r=2）或剩余位置（r≥3）
    const result = new Array(n);
    const getRootStrokeCount = (root) => {
        if (RADICAL_STROKES[root] !== undefined) return RADICAL_STROKES[root];
        const entry = WUBI[root];
        if (entry && entry.r && entry.r.length > 0) {
            const parts = (entry.r.length > 1 && entry.r[0] === root) ? entry.r.slice(1) : entry.r;
            return parts.reduce((sum, sub) => sum + getRootStrokeCount(sub), 0);
        }
        return 1;
    };

    // 匚在组件中封口，而不是包住整字：如 臣=匚+丨+コ+丨、頤=匚+丨+口+丨+頁
    // 映射为：前缀 → 匚起笔 → 中间组件 → 匚封口 → 后缀，避免把整字最后一笔误归给匚
    const kuangIdxForComponent = roots.indexOf('匚');
    if (kuangIdxForComponent >= 0 &&
        kuangIdxForComponent + 3 < r &&
        roots[kuangIdxForComponent + 1] === '丨' &&
        (roots[kuangIdxForComponent + 2] === '口' || roots[kuangIdxForComponent + 2] === 'コ') &&
        roots[kuangIdxForComponent + 3] === '丨') {
        let pos = 0;
        for (let ri = 0; ri < kuangIdxForComponent; ri++) {
            const sc = getRootStrokeCount(roots[ri]);
            for (let j = 0; j < sc && pos < n; j++) result[pos++] = firstRootIdx + ri;
        }
        result[pos++] = firstRootIdx + kuangIdxForComponent;
        for (let ri = kuangIdxForComponent + 1; ri <= kuangIdxForComponent + 3; ri++) {
            const sc = getRootStrokeCount(roots[ri]);
            for (let j = 0; j < sc && pos < n; j++) result[pos++] = firstRootIdx + ri;
        }
        result[pos++] = firstRootIdx + kuangIdxForComponent;
        for (let ri = kuangIdxForComponent + 4; ri < r; ri++) {
            const sc = getRootStrokeCount(roots[ri]);
            for (let j = 0; j < sc && pos < n; j++) result[pos++] = firstRootIdx + ri;
        }
        if (pos === n) return result;
    }

    // 通用弋字根非连续映射：弋 → 所在组件的起始笔 + 该组件末两笔，中间字根填充组件中段
    // 适用于 式、武、忒、甙、贰/貳、弒 等；连续分配的字（如代、鸢/鳶）不加入白名单，不受影响
    const yiIdx = roots.indexOf('弋');
    if (yiIdx >= 0 && NON_CONTINUOUS_CHARS.has(currentChar) && r >= 2 && currentChar !== '弋') {
        let pos = 0;
        for (let i = 0; i < yiIdx; i++) {
            const sc = RADICAL_STROKES[roots[i]] || 1;
            for (let j = 0; j < sc && pos < n - 2; j++) result[pos++] = firstRootIdx + i;
        }
        if (pos < n - 2) result[pos++] = firstRootIdx + yiIdx;
        for (let ri = yiIdx + 1; ri < r; ri++) {
            const sc = RADICAL_STROKES[roots[ri]] || 1;
            for (let j = 0; j < sc && pos < n - 2; j++) result[pos++] = firstRootIdx + ri;
        }
        while (pos < n - 2) result[pos++] = lastRootIdx;
        result[n - 2] = firstRootIdx + yiIdx;
        result[n - 1] = firstRootIdx + yiIdx;
        return result;
    }

    // 通用戈字根非连续映射：戈(第1或第2根) → 前缀后第1笔 + 末3笔：首根戈 → 第1笔 + 末3笔，中间字根填剩余
    // 适用于 戒(戈+廾)、戎(戈+𠂇)、戜(戈+口+X) 等戈为首字根的汉字
    // 十+戈模式中，十展开为一+丨后戈在索引2，需放宽到 geIdx <= 2
    // 戈非末字根模式（如職=耳+立头+戈+日）：戈在中间位置包裹后续字根，hasNCRoot触发
    // 注：hasNCRoot仅在戈不是首字根时才触发包裹逻辑，避免划(戈+刂)等左右结构误判
    const geIdx = roots.indexOf('戈');
    const _geAsMiddle = hasNCRoot && geIdx >= 1;
    if (geIdx >= 0 && geIdx <= ((hasShiGeOrig || _geAsMiddle) ? 3 : 1) && (NON_CONTINUOUS_CHARS.has(currentChar) || hasShiGeOrig || _geAsMiddle) && r >= 2 && currentChar !== '戈' && geIdx < r - 1) {
        let pos = 0;
        for (let i = 0; i < geIdx; i++) {

            for (let j = 0; j < sc; j++) result[pos++] = firstRootIdx + i;
        }
        result[pos++] = firstRootIdx + geIdx;
        for (let ri = geIdx + 1; ri < r; ri++) {
            const sc = RADICAL_STROKES[roots[ri]] || 1;
            for (let j = 0; j < sc && pos < n-3; j++) result[pos++] = firstRootIdx + ri;
        }
        result[n-3] = firstRootIdx + geIdx;
        result[n-2] = firstRootIdx + geIdx;
        result[n-1] = firstRootIdx + geIdx;

        // 兆字模式：r=['氺侧','儿']，6笔首尾交替 [1,0,0,1,0,0]

    // 乘字模式：r=['禾','北'] 展开后=['禾','丬','匕']，r=3,n=10
    // 禾的笔画分布在首尾，中间被北展开的丬和匕填充

        result[1] = 0;   // 笔2 → 禾

        result[7] = 2;   // 笔8 → 匕

    // 可字模式：r=['丁','口']，5笔首尾包裹 [0,1,1,1,0]

    if (currentChar === '可' && roots[0] === '丁' && roots[1] === '口' && n === 5) {

    // 衰字模式：r=['亠','口','一','𧘇']，10笔 [0,0,1,1,2,1,3,3,3,3]
    // 亠=2笔(第1,2笔)；口=3笔(第3,4,6笔，非连续)；一=1笔(第5笔)；𧘇=4笔(第7-10笔)
    if (currentChar === '衰' && roots[0] === '亠' && roots[1] === '口' && roots[2] === '一' && roots[3] === '𧘇' && n === 10) {
        result[0] = firstRootIdx;       // 第1笔 → 亠(索引0)
        result[1] = firstRootIdx;       // 第2笔 → 亠(索引0)

        result[3] = firstRootIdx + 1;   // 第4笔 → 口(索引1)
        result[4] = firstRootIdx + 2;   // 第5笔 → 一(索引2)
        result[5] = firstRootIdx + 1;   // 第6笔 → 口(索引1)
        result[6] = firstRootIdx + 3;   // 第7笔 → 𧘇(索引3)
        result[7] = firstRootIdx + 3;   // 第8笔 → 𧘇(索引3)
        result[8] = firstRootIdx + 3;   // 第9笔 → 𧘇(索引3)
        result[9] = firstRootIdx + 3;   // 第10笔 → 𧘇(索引3)

    // 爽字模式：r=['大','㐅','㐅','㐅','㐅']，11笔 [0,1,1,2,2,3,3,4,4,0,0]
    // 大=3笔(第1,10,11笔，非连续)；4个㐅各2笔(第2-3,4-5,6-7,8-9笔)
    if (currentChar === '爽' && roots[0] === '大' && n === 11) {

        result[8] = firstRootIdx + 4;   // 第9笔 → 㐅(索引4)
        result[9] = firstRootIdx;       // 第10笔 → 大(索引0)

    // 或字模式：r=['戈','口','㇀']，8笔 [0,1,1,1,2,0,0,0]
    // 戈=横+斜钩+撇+点(第1,6,7,8笔)，口=竖+横折+横(第2,3,4笔)，㇀=提(第5笔)
    if (currentChar === '或' && roots[0] === '戈' && roots[1] === '口' && roots[2] === '㇀' && n === 8) {
        result[0] = firstRootIdx;       // 第1笔(一) → 戈(索引0)
        result[1] = firstRootIdx + 1;   // 第2笔(丨) → 口(索引1)
        result[2] = firstRootIdx + 1;   // 第3笔(𠃍) → 口(索引1)
        result[3] = firstRootIdx + 1;   // 第4笔(一) → 口(索引1)

        result[6] = firstRootIdx;       // 第7笔(丿) → 戈(索引0)
        result[7] = firstRootIdx;       // 第8笔(丶) → 戈(索引0)
        return result;
    }

    // 戒字模式：r=['戈','廾']，7笔 [0,1,1,1,0,0,0]
    // 戈=横+斜钩+撇+点(第1,5,6,7笔)，廾=横+撇+竖(第2,3,4笔)
    if (currentChar === '戒' && roots[0] === '戈' && roots[1] === '廾' && n === 7) {

        result[1] = firstRootIdx + 1;   // 第2笔 → 廾
        result[2] = firstRootIdx + 1;   // 第3笔 → 廾
        result[3] = firstRootIdx + 1;   // 第4笔 → 廾
        result[4] = firstRootIdx;       // 第5笔(斜钩) → 戈
        result[5] = firstRootIdx;       // 第6笔(撇) → 戈
        result[6] = firstRootIdx;       // 第7笔(点) → 戈
        return result;
    }

    // 䜌字模式：r=['糹','言','糹']，19笔，言占前7笔，两个糹各6笔紧随其后

    if (currentChar === '䜌' && roots[0] === '糹' && roots[1] === '言' && roots[2] === '糹' && n === 19) {

        for (let i = 7; i < 13; i++) result[i] = firstRootIdx;          // 第8-13笔 → 糹(左)
        for (let i = 13; i < 19; i++) result[i] = firstRootIdx + 2;     // 第14-19笔 → 糹(右)
        return result;
    }

    // 畿字模式：r=['幺','幺','戈','田']，15笔

    if (currentChar === '畿' && roots[0] === '幺' && roots[1] === '幺' && roots[2] === '戈' && roots[3] === '田' && n === 15) {
        for (let i = 0; i < 3; i++) result[i] = firstRootIdx;          // 第1-3笔 → 幺(左)
        for (let i = 3; i < 6; i++) result[i] = firstRootIdx + 1;      // 第4-6笔 → 幺(右)
        result[6] = firstRootIdx + 2;                                    // 第7笔 → 戈
        for (let i = 7; i < 12; i++) result[i] = firstRootIdx + 3;       // 第8-12笔 → 田
        for (let i = 12; i < 15; i++) result[i] = firstRootIdx + 2;     // 第13-15笔 → 戈

    if (roots[0] === '心' && roots[1] === '丿' && n === 5) {

        result[2] = firstRootIdx;       // 第3笔 → 心

    if (currentChar === '戎' && roots[0] === '戈' && roots[1] === '𠂇' && n === 6) {

        result[0] = firstRootIdx;       // 第1笔(一) → 戈

        result[2] = firstRootIdx + 1;   // 第3笔 → 𠂇

    // 彐=横折+横+横(第1,2,3笔)，𡭔(小)=第4,7,8笔(非连续)，〢(川)=竖+竖(第5,6笔)
    if (currentChar === '肃' && roots[0] === '彐' && roots[1] === '𡭔' && roots[2] === '〢' && n === 8) {

        result[2] = firstRootIdx;       // 第3笔 → 彐(索引0)
        result[3] = firstRootIdx + 1;   // 第4笔 → 𡭔/小(索引1)
        result[4] = firstRootIdx + 2;   // 第5笔 → 〢/川(索引2)
        result[5] = firstRootIdx + 2;   // 第6笔 → 〢/川(索引2)
        result[6] = firstRootIdx + 1;   // 第7笔 → 𡭔/小(索引1)

    if (currentChar === '尤' && roots[0] === '尤前' && roots[1] === '㇟' && n === 4) {

    // 龙的笔顺：一(1) 丿(2) 乚(3) 丿(4) 丶(5)

    if (currentChar === '龙' && roots[0] === '尤前' && roots[1] === '匕' && n === 5) {
